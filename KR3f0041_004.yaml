body:
  text: 數學九章卷四上宋秦九韶撰測望按測望之法見於晉劉徽海島算經原名重差其書一卷九題法簡數宻此卷本其法而擴充之於古人之意實多所發明然其中譌舛之處較他卷尤甚今悉為正之至術有未合者更設法以附其後焉望山高逺問名山去城不知高逺城外平地有木一株高二丈三尺假為前表乃立後表與木齊高相去一百六十四歩先退前表三丈九寸次退後表三丈一尺三寸斜望山峯各與其表之端參合人目高五尺里法三百六十歩歩法五尺欲知山高及逺各㡬何答曰髙二十里半零三歩五分歩之三逺二十七里三百二十八歩五百七十五分歩之六十七按術數誤後入目距山係三十五里二百三十九歩一尺三寸其故詳後術曰以勾股求之重差入之置二退表相減餘為高法通表間併法於上以目高減表高餘乗上為寔寔如法而一得山高以法乗表高為逺法按此條法誤應以法乗表高與人目去地之較以退後表乗髙寔為逺寔寔如法而一得山逺望山髙逺圖按舊圖畫山木在術前今山改移於此草曰置後退表三丈一尺三寸減前退表三丈九寸餘四寸為高法置表去木一百六十四歩以歩法五十寸通得八千二百寸為表間併法四寸得八千二百四寸於上以目髙五尺減表高二丈三尺餘通之為一百八十寸乗上得一百四十七萬六千七百二十寸為髙實實如髙法四寸而一得三十六萬九千一百八十寸為積寸次以歩法五十寸約之得七千三百八十三寸五分歩之三次以里法三百六十歩約之得二十里一百八十三歩五分歩之三為山髙按此所得係人目上之山高若加人目高則多一歩次以法四寸乘表高二丈三尺得九百二十為逺法按誤同前以退後表三丈一尺三寸乗髙實一百四十七萬六千七百二十寸得四億六千二百二十一萬三千三百六十寸為逺實實如逺法九百二十寸而一得五十萬二千四百五寸二十三分寸之一十九為積寸乃以歩法五十寸乗逺法九百二十得四萬六千寸為法亦除逺實得一萬四十八歩不盡五千三百六十與法求等得八十俱以約之得五百七十五分歩之六十七又以里法三百六十歩約得二十七里三百二十八歩五百七十五分歩之六十七為山去後表入立望處等圖如後按術中求山髙法合其求逺以表髙乗高法為逺法則誤葢本法應即以高法為逺法以退後表乗表問并法為寔即得後人目距山之逺今以退後表乗髙寔為寔而髙寔乃目高減表高乗表減併法之數則逺法亦當以目髙減表髙乗髙法今即以表髙乗之則法數大故得數小也乃以頭位八千二百四寸乗中一百八十寸得一百四十七萬六千七百二十寸為髙寔乃以歩法五十寸乗中位逺法九百二十寸得下位四萬六千寸為後圖中位歩寸法乃以中除上得下位里數及零歩其不盡寸與法求得八十俱約之為歩分母子之數臨臺測水問臨水城臺立髙三丈其上架樓其下址側脚濶二尺謢岸排沙下橋去址一丈二尺外椿露土髙五尺與址下平遇水漲時浸至址今水退不知多少人從樓上欄杆腰中駕一竿出外斜望水際得四尺一寸五分乃與竿端參合人目髙五尺欲知水退立深涸岸斜長自臺址至水際各幾何按算題固不厭其難然必簡而不漏繁而不贅始為合作如此題本意謂竿端與臺址上下懸直則側脚闊二尺句已贅又不明言人目距臺邊逺近皆故為黯黮也術曰以勾股變法兼少廣求之求涸岸斜長置出竿乘臺髙為叚以去基乘叚為闊泛以岸髙乘叚為淺泛以目髙乘去基為約泛三泛可約者約之為定率不可約徑為率以闊率自乘為闊冪以淺率自乘為淺冪併闊淺二冪共為竣冪復乘闊冪於上以臺髙冪乘上為竣實次以闊率乘淺率為寄以臺髙數乘闊率又乘約率得數内減寄餘自乘為竣隅騐峻實峻隅兩者可約求等約之為峻定實峻定隅開同休連枝平方得峻岸斜長同休格先以隅開平方得數名同隅以同隅乘定實開之得數為寔以同隅為法除之得竣斜除按此條誤草中乃即以定實開平方得數以同隅之為竣斜也求水退深基岸髙冪乘竣定實為深實以去岸冪併岸為冪乗竣定為深隅其深實深可約約之仍以同休格入之開連枝平方得水退深臨䑓測水圖按舊圖畫樓䑓不畫正髙在術前今改正移于此草曰以出竿四十一寸五分乘䑓髙三十尺得一百二十四尺五寸為段以去址一十二尺乘叚得一千四百九十四以為闊泛以䕶岸髙五尺乘段一百二十四尺五寸得六百二十二尺五寸為淺泛以目髙五尺乗去址一十二尺得六十尺為約泛以闊泛淺約泛三者求等等得一尺五寸皆以約其闊泛得九百九十六尺為闊率其淺泛得四百一十五尺為淺率其約泛得四十尺為約率以闊率九百九十六自乗得九十九萬二千一十六尺為闊冪以淺率四百一十五自乗得一十七萬二千二百二十五尺為淺冪倂闊淺二冪得一百一十六萬四千二百四十一為竣冪以闊冪九十九萬二千一十六尺乘竣冪得一萬一千五百四十九億四千五百六十九萬九千八百五十六尺於上又以臺髙三十尺自乘得九百尺為臺髙冪乗上得一千三十九萬四千五百一十一億二千九百八十七萬四百尺為竣實次以闊率九百九十六乘淺率四百一十五得四十一萬三千三百四十為寄以臺髙三十乘闊率九百九十六得二萬九千八百八十文乘約率四十得一百一十九萬五千二百内减寄餘七十八萬一千八百六十尺自乗得六千一百一十三億五百五萬九千六百尺為隅以隅與竣實求等得二千四百八十萬四百俱以約之得四千一百九十一萬二千六百七十六尺為竣定實得二萬四千六百四十九為竣定隅開同休連枝平方得竣岸至水際斜長驗同休格乃以定隅二萬四千六百四十九萬為實先以一為隅開平方得一百五十七為同休法次以竣定實四千一百九十一萬二千六百七十六尺為實亦以一為隅開平方得六千四百七十四尺為同休實實如同休法一百五十七而一求等得一俱以一各約之其法與餘只得此數乃直命之得四丈一尺一百五十七分尺之三十七為涸岸斜長至水際求退水深置岸髙五尺自乗得二十五為岸髙冪乗竣定實四千一百九十一萬二千六百七十六尺得一十億四千七百八十一萬六千九百為深泛以去岸一十二尺自乗得一百四十四尺為去岸冪併岸髙幕二十五尺得一百六十九尺以乗竣定隅二萬四千六百四十九得四百一十六萬五千六百八十一為隅泛置二泛求等得一百六十九俱約二泛得六百二十萬一百為定實得二萬四千六百四十九為深定隅開連枝平方得水退立深驗同休格乃以深定隅二萬四千六百四十九為實先以一為隅開平方得一百五十七為同休法次以深實實六百二十萬一百為實亦以一為隅開平方得二千四百九十為同休實實如法一百五十七而一得一十五尺不盡一百三十五與法求等得一俱以一各約法與只得此數乃直命之得一丈五尺一百五十七分尺之一百三十五為水退立深數也按此條術雖甚繁理數皆極精宻非兼通於勾股通分之法者不能立也但累乗累除錯綜變換皆未嘗明言其不能無金鍼不度之疑今繪圖以之並條拆其乘除各數于後如圖甲乙為䑓正髙乙丙為樁去䑓址丙丁為岸髙乙戊為臺址至水際即為峻斜己庚為人目髙甲庚為出竿戊癸為水面正深題有甲乙䑓髙乙丙樁去址丙丁去樁甲庚出竿己入庚目髙求乙辛竣斜自丁㸃與丙丁平行相等作丁辛線自乙㸃與丙丁並行作丁作乙辛線自丁㸃與戊甲平行作丁壬㸃得壬丁辛勾股形内有乙丁辛勾股形一與乙丙丁辛等有乙丁壬三角形一與甲乙戊形同式法當以己庚小股乗庚辛大勾以甲庚小勾除之得壬辛大股次以乙丁三小角形下斜邉乗甲乙戊形直邉以乙辛减壬辛餘壬乙為乙丁壬形直邉為法除之得乙戊為甲乙戊形下斜邉即所求䑓址至水際之峻斜其法只用丨除两次甚屬易簡即遇數不盡者以通分御之冄加一二次乗除可以乃必增至十餘次多者始欲窮數之變就一題以為諸法之例非徒為繁難也試依術内逓次乗除之數逐條細論之出竿甲庚乗髙䑓甲乙為段去址乙丙乗段為闊率原名闊泛約之為闊率今即為闊率為去址乗䑓髙出竿長冪之數闊率自乗為闊冪即如去址冪乗䑓髙出竿長冪自乗之數又即如去址冪乗䑓髙冪又乗出竿冪之數岸髙丙丁乗段為淺率原名淺泛約之為淺令即淺淺率為岸髙乗䑓髙出竿長冪之數淺率自乗為淺冪即如岸髙冪乗臺髙出竿長冪自乗之數又即如岸髙冪乗䑓髙冪又乗出竿冪之數併闊冪淺冪為淺冪為竣冪乙丁冪乗臺髙出竿長冪自乗之數又即如小斜冪乗䑓冪又乗出竿竿冪之數闊冪峻冪相乗為上數即如小斜冪乗去址冪又乗臺髙冪自乗又乗出竿冪自乗之數闊率淺率相乗為寄數即土去址岸髙相乗又乗䑓髙冪又乗出竿冪之數去址目髙己庚相乗為約率即如出竿乗壬辛臺髙乗闊率即如去址乗臺髙冪又乗出竿之數又以約率乗之即如去址壬辛相乗冪又乗臺髙冪又乗出竿冪之數内减寄數餘去址壬乙相乗冪又乗臺髙冪又乗出竿冪之再自乗之隅數即如壬乙冪乗去址冪又乗臺髙冪自乗又乗出竿冪自乗之數上數隅數内去址冪臺髙冪自乗出竿冪自乗各數皆同則用上數乗隅數除即如用小斜冪乗壬乙冪除矣以䑓髙冪乗上數若以隅數除之即得竣斜乙戊冪但數不能盡故約之帶隅數開平方所謂連枝同休法也至闊泛淺用于乗數約泛用于除數故可两邉同約又為省算也求水立深同此陟岸測水問行師遇水須計篾䌫搭造浮橋今垂繩量陟岸髙山丈人立其上欲測水面六闊以六尺為矩平持去目下五今矩本抵頤遥望水彼岸與矩端岸相合又望水此岸沙際入矩端三尺四寸人目髙五尺其水面闊幾何答曰水闊二十三丈四尺六寸按應二十三丈八尺術曰以勾股重差求之置短去目下寸為法以人目併岸髙減去法按減法誤餘乗人矩端為實如法而一得水闊陡岸測水圗按舊圗畫岸水視緑不能在術前令改正移於此草曰置矩本去目下五寸為法以入目髙五尺併岸髙三丈得三丈五尺通為寸得三百五十寸减去五寸餘三百四十五寸乗沙際入矩端三十四寸得一萬一千七百三十寸為實實如法五寸而一得二千三百四十六寸展為二十三丈四尺六寸為水闊合問按測望諸線皆合于人目之一㸃其髙正當自人目計之今减去人目距矩自矩下計之不得其理矣表望方城問敵城不知廣逺傍城南山原林間房之林際有木二株南北相去一百六十步遥與城東方面参相直乃于二水之東相對立两表表間與木四方平人目以繩維之人自東後表向西行一十步望城東北隅入東前表一十五步又望城東南隅入東前表四十八歩強半歩里法三百六十欲知其方廣及相去幾何答曰城東廣各一十二里三百二十步城去木九里三百二十歩按答數皆誤今推得城方廣各一十一里二百二十歩又三十一分步之二十城東南隅至北木一里九十九歩又三十一分歩之一十二術曰以勾股重差求之置城東南隅景入表减表間餘乗表間為城去木寔以西方歩減城東北隅景入表餘為法按此句法誤得城去木數以城東北隅景入表減表間餘乗表間為廣實實如前法而一得城廣按此所得乃城東北隅至前木之逺以為城廣數誤也表望方城圖按舊圖畫城南二木與城東面不城一直線在術前今改正移于此草曰以西行一十步減東北隅入表一十五步餘五歩為法以城東南隅景入表四十八步七分半減表間一百六十步餘一百一十一歩二分半乗表間一表六十歩得一萬七千八百為城去木寔以法五歩除之按誤同上得三千五百六十歩以里法三百六十約之得九里三百二十步為城去木里及步數次置城東北隅京十表一十五步减表間一百六十餘一百四十五歩乗表間一百六十得二萬三千二百為减實以以前法五步除之得四千六百四十歩以里法三百六十約之為一十二里三百二十歩即城方廣里及歩數按誤亦同上合問按此題之要在二本與城東面成一直面方城與表木方形各邉俱平西行減城東南隅入表之較與表間成小勾股形城東南隅入表間表間之表與城東南隅至前木成大勾股形此二形同式可以相比故術草中第二求以城東北隅入表減表間之餘乗表間為實以西行步減城東北隅入表之餘為法除實是也但所得為城東北隅至前木之逺以為城廣則誤矣又西行步減城東南隅入表之較與表間成小勾股形城東南隅入表減表間之較與城東南隅至前木成大勾股形此二形亦同式可以相比以城東南隅入表減表間之餘乗表間為實應以西行步減城東南隅入表之為法除之即得城東南隅之前木之逺術草中以西行步減城東北隅入表之餘為法故得數大七倍餘既得城東面南北二隅距前木之逺則相減為城廣可知矣遥度城問有圓城不知周徑四門中開北外三里有喬木出南門便折東門九里乃見木欲知城周徑各幾何圓用故法答曰徑九里周二十七里術曰以勾股夕桀求之一為從隅五因北外里為從七亷置北里冪八因為從五亷以北里冪為正率以東行冪為負率二率差四乗北里為益從從三亷倍負率成五亷為益上亷以北里乗上亷為實開玲瓏九乗方得數自乗為徑以三因徑得周遥度圓城圖舊圖畫城掛在術前今刪改移于此草曰以一為從隅以五因北三里得一十五里為從七亷以北三里自乗得九里為正率以八因率得七十二為從五亷以西行見里自乗得八十一為負率以正率九減負率餘七十二位負差以四因之得二百八十八以乗北三里得八百六十四係負差所乗者為益三亷倍負率八十一得一百六十二乗五㢘七十二得一萬一千六百六十四為益上亷以北三里乗上亷得三萬四千九百九十二為實置實亷隅玲瓏空隅位方亷以約實衆法不可超進乃于實上定商三里其隅與商相生得三為從下亷又與商相生入從七亷共得二十四為星亷又與商相生得七十二為從六亷又與商相生入五内共得二百八十八又與商相生得八百六十四為從四亷又與商相生得二千五百九十二為正三亷内消益三亷八百六十四訖餘一千七百二十八為從三亷又與商相生得五千一百八十四為從二亷又與商相生得一萬五千五百八十二為從上亷内消益上亷一萬一千六百六十四訖餘三千八百八十八為正上亷又與商相生得一萬一千六百六十四為從方乃命上商三里除實適盡得三里以自乗之得九里為城圓徑之里數又以故法圓率三因之得二十七為城周以上求率圖以後開方圖實與益皆負畫黑商與從皆正畫朱按商實負字旁書已明今皆用黒按凡勾股難題用立天元一法取之多至三乗方而至元李冶測圓海鏡一百七十問僅一題取至五乗方猶自以為煩此題非甚難者乃取至九乗方蓋未得其要也細校術草中亷隅積實之數與立天元一法自然相生者廻殊且凡立天元一法開方後未有不得所求之數者今得數自乗始為所之數尤于古人立法之意不合爰另立取法並歩算之式於後法立天元一為圓城徑加三里得三里多一元為大股自之得九里多六元多一平方為大股冪九里為大勾自得之八十一里為大勾冪相併得九十里多六元多一年方為大弦冪又以大股為小勾弦和三里為小勾弦較和較相乗得九里多三元為小股冪二分天元之一為小勾加小勾三里得三里多二分元之一為小弦自得之九里多三元多四分平方之一為小弦冪乃以小冪與大股冪相乗得八十一里多八十一元多二十九平方又四分平方之一多四立方又二分之一多四分三乗方之一寄之又以大弦冪與小股冪相乗得八百一十里多三百二十四元二十七平方三立方與寄數等両邉各减八十一里三百二十四元二十七平方三立方得四分三乗方之一多一立方二平方又四分平方之一少二百四十三元與七百二十九里等各以四乗之得一三乗方多六立方九平方九百七十二元與二千九百一十六里等乃以里數為實以元數為益方平方數為從上亷立方数為從下亷三乗方数為隅開帯縱三乘方得九里為城徑開方式附後法列寔及方亷隅数約商九里乃以隅生商得九入下亷得一十五又以下亷生商得一百三十五入上亷得一百四十四又以商生上亷得一千二百九十六以消益方得二百二十四為從方以商生從方得二千九百一十六減實恰盡為開得三乘方為九里即城徑也數學九章卷四上欽定四庫全書數學九章卷四下宋秦九韶撰測望望敵圓營問敵臨河為圎營不知大小自河南岸至其地七里於其地立兩表相去二步其西表與敵營南北相直人退西表一十二步遥望東表適與敵營圓邉參合圓法用密率里法三百六十欲知其營周及徑各㡬何答曰營周六里一百二步七分步之六徑二里按答數有誤營周係六里七十六步又一萬一千九百二十一分步之四千九百四十八徑係一里三百五十一步又一千七百零三分步之九百九十九術曰以勾股夕桀求之置表間自乗為勾冪以退表自乗為股冪併二冪為弦冪置里通步自之乗勾冪為率自乗為泛實按此數當即為實開𢃄從方今不開平方乃以合此數自乗並以此數升他數開𢃄從三乗方不半弦冪乗率為泛從上亷按半弦冪即半弦自乗又倍之之數以勾冪減股冪餘四約之按此即半勾半股各自乗相減之數自乗為泛益隅三泛可約之為定開連枝三乗玲瓏方得營徑以密率二千二乗七除為周草曰置表間二步自乗得四為勾冪以退表一十二步自乗得一百四十四為股冪以勾股二冪併之得一百四十八為弦冪置七里以里法三百六十步通之得二千五百二十步自乗得六百三十五萬四百乗勾冪四得二千五百四十萬一千六百為率以率自乗得六百四十五萬二千四百一十二億八千一百五十六萬為之實乃半弦冪得七十四乗率二千五百四十萬一千六百得一十八億七千九百七十一萬八千四百為泛從上亷以勾冪四減股冪一百四十四餘一百四十以四約之得三十五以自乗得一千二百二十五為泛益隅置三泛求等得一千二百二十五按即泛益隅俱以約之得五千二百六十七億二千七百五十七萬七千六百為定實一百五十三萬四千四百六十四為從上亷一為定益隅開玲瓏三乗方乃以亷隅超二度約啇置七百上亷為一百五十三億四千四百六十四益隅為一億乃以上啇生隅得七億為益下亷又以上啇生益亷減從亷餘一百四億四千四百六十四萬為從上亷又以上啇生從亷得七百三十一億一千二百四十八萬為從方乃命上啇除實實餘一百四十九億四千二十一萬七千六百又以上啇生益隅入下亷得一十四億為益下亷又以上啇生益亷得益上亷減從亷餘六億四千四百六十四萬為上亷又以上啇生上亷入方得七百七十六億二千四百九十六萬為方又以上啇生益隅入下亷得二十一億又以上啇生下亷為益上亷減從亷餘一百四十億五千五百三十六萬為益上亷又以上啇生益隅入下亷得二十八億諸法皆退方一退為七十七億六千二百四十九萬六千益上亷再退為一億四千五十五萬三千六百益下亷三退為二百八十萬益隅四退為一萬乃於上啇之次續啇置二十步以續啇生隅入下亷為二百八十二萬又以續啇生下亷入上亷為一億四千六百一十九萬三千六百又以續啇生上亷減從方餘七十四億七千一十萬八十八百乃命續啇除實適盡所得七百二十步以里法約之得二萬為營徑次以密率二十二乗七百二十得一萬五千八百四十為實以七除之得二千二百六十二步七分步之六以里法約之得六里一百二步七分步之六為營周按此題用平方可矣術中所謂率者即平方實也乃復加自乗開三乗方徒為繁冗耳且乗從亷用半弦自乗之倍數乗隅數應用半股自乗之數今用勾股冪較四分之一即用半股冪半勾冪之較比半股自乗數小一半勾自乗數故得數較大若轉求表間及退步必與原數不合試以相去七里為大勾弦和營徑三里為倍大勾相減得五里為大勾弦較和相乗得較三十五為大股冪大勾弦里自之仍得一為大勾冪置小勾冪四步以大股冪乗之得百百四十步以大勾冪除之仍得一百四十步為小股冪比原小股冪少四步其術之疎可知矣設用平方法如左法立天元一為營徑相去七里通為二千五百二十步為大勾弦和相減得二千五百二十步少一元為大勾弦較和較相乗得六百三十五萬零四百步二千五百二十元為大少股冪天元一半之以減相去步得二千五百二十步少二分天元之一為大弦自之得六百三十五萬零四百步少二千五百二十元多四分平方之一為大弦冪退步十二為小股自之得一百四十四步為小股冪表間二步為小勾自之得四步為小勾冪相併得一百四十八步為小弦冪以小弦冪乗大股冪得九億三千九百八十五萬九千二百步少三十七萬二千九百六十元寄之又以小股冪乗大弦冪得九億一千四百四十五萬七千六百步少三十六萬二千八百八十元多三十六平方與寄數為相等兩邉各減九億一千四百四十五萬七千六百步各加三十七萬二千九百六十元得二千五百四十萬零一千六百步即術中率數與三十六平方多一萬零八十元等三數求總等得三十六約步數得七十萬零五千六百為長方積為實約元數得二百八十為從方為長闊較約平方數得一為隅用𢃄從平方法開得闊七百一十一步又一千七百零三分步之九百九十九為營徑步以密率用二十二乗之徑七除之得二千二百三十六步又一萬一千九百二十一分步之四千九百四十八為營周步各以里率収之得營周六里七十六步又一萬一千九百二十一分步之四千九百四十八營徑一里三百五十一步又一千七百零三分步之九百九十九還原之法置營徑步數通分納子得一二一一八三二分為倍大勾分數又以分母通相去步得四二九一五六分為大勾弦和分數二數相減餘三七九七二八分為大勾弦較分數和較分數相乗得一三二一六八三七四五九六八分為大股冪分倍大勾分折半得六五九一六自之得三六七一三四一九九五六分為大勾冪分及以小勾冪四步乗大股冪分得五二八六七三四九九八二七二分以大勾冪分除之得一百四十四步為小股冪與原數合此猶用西表相去步也若細較之當用人目相去步則營周當多十二步餘營徑當多四步不足也望知敵衆問敵為圓營在水北平沙不知人數諜稱彼營布卒占地方八尺我軍在水南山原於下立表髙八丈與原山腰等平自表端引䋲虚量平至人足三十步人立其處望彼營北陵與表端參合又望營南陵入表端八尺人目髙四尺八寸以圓密率入重差求敵衆合得㡬何答曰敵衆八百四十九人按數不合應二百七十三人其故詳草後術曰以勾股乗之置人退表步按此條誤法應置表髙乗入表為實以人目髙為法除之得徑以密周率乗徑得數為實以密徑率因人立為法約之得外周人數餘収為一副置加六以乗副得數為實如一十二而一餘亦収為全望知敵衆圖按舊圖畵山水在術前今刪改移於此草曰置人立退表三十步以步法五尺展為五十寸通之得一千五百寸乗入表八尺得一十二萬寸為實以人目髙四十八寸為法除之以密率周法二十二乗徑二千五百得五萬五千寸為實以密率徑法七因諜稱人立八尺得五百六十為法以法五百六十寸約實五萬五千寸得九十八人為外周人數不盡一百二十寸棄之副置外周九十八人加六得一百四人乗副為實按此術應置表髙加人目髙以入表棄之誤置退步以入表乗之故人數差多二倍盖思省偶未至耳至求人數先用密率次用束箭法亦未盡合題問今依其數各步於後求營徑置表髙八丈加人目髙四尺八寸得八丈四尺八寸以入表八尺乗之得六萬七千八百四十寸以人目髙除之得一十四丈一尺三寸又三分寸之一為營徑盖以表髙加人目髙為大股營徑為大勾較人目髙為小股入表為小勾較置大股以小勾較乗之以小股除之即得大勾較也求人數用密率置徑為實倍每人占地八尺得一十六尺為法除實得八為外層數加最内一層得九為共層數餘一十三尺三寸又三分寸之一為最内徑以最内徑與最外徑即營陘相加以九層乗之折半得六百九十六尺為九層共徑數以密周率二十二乗之得一萬五千三百一十二尺為實以密率七乗每人占地八尺得五十六尺為法除之得二百七十三人餘三尺又七分尺之三棄之此法應先求得内外圓周再求九層共周數今先求九層共徑數然後變為圓周其理一也望敵逺近問敵軍處北山下原不知相去逺近乃於平地立一表髙四尺人退表九百步步法五尺遥望山原適與表端參合人目髙四尺八欲之敵軍相去㡬何答曰一十二里半術曰以勾股求之重差入之置人目髙以表髙減之餘為法置退表乗表髙為實實如法而一草曰置人目髙四尺八寸減表髙四尺餘八寸為法置退表九百步以步五十寸通之得四萬五千寸乗表髙四十寸得一百八十萬寸為實如法八寸而一得二十二萬五千寸以步法五十寸約之得四千五百步為相去步以里法三百六十步約之得一十二里半為敵去表所合問表望浮圖問有浮圖欹側欲換塔心木不知其髙去塔六丈有刹竿亦不知其髙竿本去地九尺二寸始釘鋦按鋦原本作鈎今改正鋦一十四枚枚長五寸每鋦下股相去二尺五寸就竿為表人退竿三丈遥望浮圖尖適與竿端斜合又望相輪之本影鋦第七枚上股人目入去地四尺八寸心木放三尺為㔼按㔼原本作今改正卯剪截欲求塔髙輪髙合用塔心木長各㡬何答曰塔髙一十一丈七尺相輪髙三丈塔身髙八丈七尺竿髙四丈二尺二寸塔心木九丈内三尺為剪截穿鑿㔼卯按塔髙竿髙二數合相輪髙塔身髙塔心木長三數俱誤相輪髙四丈五尺塔身髙七丈二尺塔心木長七丈五尺説詳草後術曰以勾股求之重差入之置鋦數減一餘乗鋦相去數併一枚長數加竿本共為表竿髙以退表為法以人目髙減表竿髙餘乗竿去塔為實實如法而一得數加表竿髙共為塔髙置相輪入本鋦數減一餘乗鋦相去又乗竿去塔為實實如法而一得相輪髙按未加入鋦人數法誤以減塔髙餘為塔身髙以益㔼卯尺數為塔心木長草曰置鋦一十四枚減一餘一十三以乗鋦相去二尺五寸得三百二十五寸併最上鋦一枚長五寸得三百三十寸又加竿本九尺二寸共得四百二十二尺為表竿髙以人退表三丈通為三百寸為法次以人目髙四尺八寸減表竿髙四百二十二寸餘三百七千四寸以乗竿去塔六丈得二十二萬四千四百寸為實實如法三百兩一得七百四十八寸加表竿髙四百二十二寸得一千一百七十寸以十約之為一十一丈七尺為塔髙置相輪本入第七鋦減一餘六以乗鋦相去二尺五寸得一百五十寸又乗竿去塔六丈得九萬寸為實實如前法三百寸而一得三百寸約為三丈得相輪髙按不加入鋦即為相輪髙誤以相輪髙三丈減塔髙一十一丈七尺餘八丈七尺為塔身髙按此數及塔心木數皆因上數而誤益三尺為剪截㔼卯共得九丈為塔心木長合前問按此皆大小形同式相求法也人目去塔為總勾人目上塔尖髙塔身皆為總股髙相輪髙為總股較人目去竿為分小勾人目上竿髙及相輪本入竿髙俱為分小股相輪本入竿為小股較竿去塔為分大勾術以竿去塔分大勾與小勾股乗除得大股數加小股為總股故塔尖髙數合以大勾與小勾小股較乗除得大股較數即為總股較故相輪髙數少一小股較一丈五尺也塔身髙塔心木長皆本此數加減而得故誤數相等數學九章卷四下
