body:
  text: 數學九章卷一上宋秦九韶撰大衍按大衍術以各分數之竒零求各分數之總數大而天行小而物數皆可御之其法有求元求定求術求竒求乘求用之目大約以數之竒偶為根而以諸數相度之盡不盡為用有求彼此不能度盡之諸數者元數定數是也有求諸數皆能度盡之一數者衍母數是也有求諸數皆能度盡而一數不能度盡之數者各衍數是也其不盡之數即竒數也有求二數相度餘一之數者乘數是也有求二數相度餘一而諸數又能度盡之數者用數是也求元數定數初與約分法相似終變二數務使其等數為一蓋以一為等數始能度盡二數是他數俱不能度盡二數而二數相度益不能盡也以定數竒數求乘數之法名曰大衍求一中有立天元一於左上之語下載立天元一算式按立天元一法見於元郭守敬之厯源李冶之測圓海鏡及四海之借根方者皆虛設所求之數為一與所有實數反覆推求歸於少廣諸乘方得其積數與邊數或正負亷隅數而止次用除法或開方法得所求數此數命定數為一與竒數反覆商較至餘一實數而止其竒數所積即為乘數蓋其用不同而法則無二也然其極和較之用窮竒偶之情則有為元法西法所未及者但原本法解煩雜圖式訛舛今詳加改定並釋其義俾學者易見焉大衍數術大衍總數術曰置諸問數類名有四一曰元數謂尾位見單零者本門揲蓍酒息斛糶砌甎失米之類是也二曰牧數謂尾位見分釐者假令冬至三百六十五日二十五刻欲與甲子六十日為一會而求積日之類三曰通數謂諸數各有分子母者本門問一會積年是也四曰復數謂尾位見十或百及千以上者本門築隄并急足之類是也按此言問題有是四類元數者先以兩連環求等約竒弗約偶或約得五而彼有十乃約偶而弗約竒或元數俱偶約畢可存一位見偶或皆約而猶有類數存姑置之俟與其他約遍而後乃與姑置者求等約之或諸數皆不可盡類則以諸元數命曰復按復應作定數以復按同上數格入之按此以元數求定數法也連環求等者於諸數中逐次取二數相度得一數可以度盡者為等數為法只約一數約竒弗約偶專為等數為偶者言之若等數為竒者則約偶弗約竒而等數為五與十者又有或約竒或約偶者矣皆約而猶有類俟約遍求等約之者逐條兩兩取約畢猶有二數可約者求得等數為續等見後續等約一數必復乘一數蓋等數為二數之較或二數展轉之較可約續等乃已約之較不可冉約不可約而兩數又不可使有等故約一數乘一數猶之不約也術內未詳收數者乃命尾位分釐作單零以進所問之數定位訖用元數格入之或如意立數為母收進分厘以從所問用通數格入之按收數者單位下有竒零之數也進位者以竒零之末位為單位也若立分母通之反不如用原數為簡通數者置問數通分內子互乘之皆曰通數求總等不約一位約衆位得各原法數用元數格入之或諸母數繁就分從省通之者皆不用元各母仍求總等存一位約衆位亦各得原法數亦用元法數格入之按通數與收數相似但單數有分母竒零為分子耳通分納子即進尾數為單位之義因加互乘一次故加總等一約然後為元數也又按求總等不拘通數復數但題中有三數可以一等數度盡者即可用總等法存一數約衆數然後為元數凡度之後等數仍可約者此數必當存之復數者問數尾位見十以上者以諸數求總等存一位約衆位始得元數兩兩連環求等約竒弗約偶復乘偶或約偶或約竒復乘竒按此四語有誤應作約竒弗約偶復乘偶或約偶弗約竒弗乘竒然皆續等下用之此處可省或彼此可約而猶有類數存者又相减以求續等以續等約彼則必復乘此乃得定數所有元數收數通數三格皆有復乘求定之理悉可入之按復數者諸問數皆至十或百或千而止也右各假皆云以某格入之此又云三格悉可入之大約古算必有其程式也求定數勿使兩位見偶勿使見一太多見一多則借用繁不欲借則任得一按勿使兩位見偶者蓋衆數連乘中有兩偶數則所得總數以一偶數除之必仍得偶數不能求餘一之乘數也勿使見一太多見一多則借數繁者蓋見一多因數本如此且見一即不必推乃云勿使太多又云借數皆塗人之耳目也故曰不欲借則任得一以定相乘為衍母以各定約衍母得各衍數或列各定數於右行各立天元一為子於左行以母互乘子亦得衍數諸衍數各滿定母去之不滿曰竒以竒與定用大衍求一入之以求乘率或竒得一即為乘率按諸定數連乘為衍母即為諸定數皆能度盡之數亦為總數最大之限凡總數在限內者各定數之差皆不等若過限外則各定數之差有與限內相等者其兩總數之差必為衍母之倍數各衍母者即諸數度盡一數度不盡之數也竒數者定數度衍數不盡之數也定數原為彼此不能度盡之數衍數為他定數連乘之數以此一定數度之必不能盡也大衍求一數云置竒右上定居右下立天元一於左上先以右上除右下所得商數與左上一相生入左下然後乃以右行上下以少除多遞互除之所得商數隨即遞互纍乘歸左行上下須使右上末後竒一而止乃驗左上所得以為乘率或竒數已見單一者便為乘率按此二語重上按此以定數竒數求乘數也其法必使以定數度竒數僅餘一數而竒數之倍數即乘數也置竒右上定右下者初次以定為實竒為法也立天元一於左上者以一為竒之倍數也得商數與左上相生入左下者以竒商定得商數即竒之倍數以乘天元一而書於下也隨以竒數與商數相乘以减定數為餘實次以竒為實减餘為法置前左下於左上以法約實得商乘左上又併前之左上為左下隨以法乘商减實又為餘實次又以前餘為實次餘為法置前左下於左上得商數乘左上又並前左上為左下隨以法乘商减實如此展轉相求合兩次為一算至餘實一乃視左下天元數即乘數也若未至兩次餘實一者仍以一為法上餘數為實實二則商一實三則商二如上求之復得餘一其天元數方為乘數原文遞互乘除之語未詳置各乘率對乘衍數得泛用併泛課衍母多一者為正用或泛多衍母倍數者驗元數竒偶同者損其半倍或三處同類以三約衍母於三處損之同衍母者為無用當驗元數同類者而正用至多處借之以元數兩位求等以等約衍母為借數以借數損有以益其無為正用或數處無者如意立數為母約衍母所得以如意子乘之均借補之或欲從省勿借任之為空可也按此求各用數法也其各乘率乘各衍數得用數者即一數餘一諸數度盡之數也其云併泛用過衍母倍數驗元數同類損之此語似有誤當云驗問數同偶而用數相併過衍母者損之蓋取用皆問數非元數也凡偶數减偶仍餘偶减竒仍餘竒其數有定竒數减竒則餘偶又或餘竒减偶則餘竒又或餘偶其數無定故惟偶數可驗也定數一者即無用數必虛為借數未免徒滋煩擾然後以其餘各乘正用為各總併總滿衍母去之不滿為所求率數按此既得各用數以題中所問之竒零求總數也以各餘數乘各用數者蓋用數為諸數度盡一數餘一之數以幾數乘之必為諸數度盡一數餘幾數之數也併各條而以各數度之必各數仍餘幾數也餘數悉合則總數必合矣然衍母為諸數度盡之數纍加一衍母衆餘數皆不變故滿衍母去之得在衍母內者其數最小為第一數若大於此數者遞加一衍母數無不合者按右大衍本法也原書入於蓍䇿發微題問答之後殊失其序今修冠於卷首蓍卦發微問易曰大衍之數五十其用四十有九又曰分而為二以象兩卦一以象三揲之以四以象四時三變而成爻十有八變而成卦欲知所衍之術及其數各幾何按揲蓍之法載於易傳啓蒙言之甚明算術以竒偶相生取名大衍可也竟欲以此易古法則過矣答曰衍母十二衍法三一元衍數二十四二元衍數一十二三元衍數八四元衍數六已上四位衍數計五十一楪用數一十二二楪用數二十四三楪用數四四揲用數九已上四位用數四十九按此附會五十四十九之數與本衍已牽强不合觀後可知水火木金始此四數以揲隂陽象數圖老陽少隂少陽老隂終此四者為爻按此條與數無取義可刪本題術曰置諸元數兩兩連環求等約竒弗約偶遍約畢乃變元數皆曰定母列右行各立天元一為子列左行以諸定母互乘左行之子各得名曰衍數次以各定母滿去衍數各餘名曰竒數以竒數與定母用大衍術求一大衍求一術云以竒於右上定母於右下立天元一於左上先以右行上下兩位以少除多所得商數乃遞互乘歸左行使右上得一而止左上為乘率得各乘率以乘衍數各得用數驗次所揲餘幾何以其餘數乘諸用數併之名曰總數滿衍母去之不滿為所求數以為實易以三才為衍法以法除實所得為象數如實有餘或一或二皆命作一同為象數其象數得一為老陽得二為少隂得三為少陽得四為老隂得老陽畫重爻得少隂畫拆爻得少陽畫單爻得老隂畫交爻凡六畫乃成卦按此即前大衍法末以三歸取爻象亦屬附會草曰一二三四列右行立天元一列左行元數右行天元左行以右行一二三四互乘左行異子一弗乘對位本子各得衍數元數右行上副次下衍數左行併之得五十乃併左行衍數四位共計五十故易曰大衍之數五十算理不可以此五十為用蓋分之為二則左右手之數竒偶不同見隂陽之伏數必須復求用數先名此曰衍數以為限率遂乃復以一二三四之元數求等數約定按前術以兩兩相連環求等約之先以一與二求等一與三求等一與四求等皆得一各約竒弗約偶數不變次以二與三求等亦得一約竒弗約偶數亦不變及以二與四求等乃得二此二只約副數二變為一而弗約四次以三與四求等亦得一約竒亦不變所得一一三四各為定數母列右行仍各立天元一為子列左行定母右行天行左行以右行定母一一三四互乘左行各子一惟不對乘本子畢左上得一十二左副得一十二左次得四次下得三皆曰衍數定母右行以右定母滿去左衍數左行衍衍餘各為竒數次以各母去衍數其一母去衍一十二竒一其副母一亦去副子一十二亦各竒一其次母三去次衍四亦竒一其下母四欲去下子三則不滿便以三為左下竒數定母右行竒數左行凡竒數得一者便為乘率今左下衍是三乃與本母四用大衍求一術入之列衍竒三於右上定母於右下立天元一於左上空其左下衍竒定母商天元先以右上少數三除右下多數四得一為商以商一乘左上天元一只得一歸左下其右下餘一商衍竒定母餘天元歸數次以右下少數一除右上多數三須使右上必竒一算乃止遂於右行最上商二以除右衍必竒一乃以上商命右下定餘一除之右衍餘一商衍竒餘定母餘天元歸數次以商二與左下歸數相乘得二加入左上天元一內共得三今驗右上衍餘得一當止乃以左上三為乘率與前三者乘率各一與衍定圖衍數對列之通計三行定母衍數乘率以乘率對乘左行畢左上得一十二左副得一十二左次得四左下得九皆曰泛用數定母衍母泛用次以右行一二三四相乘得一十二名曰衍母復推元用等數二約副母二為一今乃復歸之為二遂用衍母一十二益於左副一十二內共為二十四元數定用今驗用數圖右行之一二三四即是所揲之數左行一十二併二十四及四與九併之得四十九名曰用數用為蓍草數故易曰其用四十有九是也假今用蓍四十九信手分之為二則左手竒右手必偶左手偶右手必竒欲使蓍數近大衍五十非四十九或五十一不可二數信手分之必有一竒一偶故所以用四十九取七七之數始有左副二十四內益十二就其三十七泛為用數但三十七無意義兼蓍少太露是以用四十有九凡揲蓍求一爻之數欲得一二三四出於無餘必令揲者不得知故以四十九蓍分之為二只用左手之數假令左手分得三十三自一一楪之必竒一故不繁楪乃徑掛一故易曰分而為二以象兩掛一以象三次後又令筮人以二二揲之其三十三亦竒一故歸奇於㧅又令之以三三揲之其三十三必奇三故歸奇於㧅又令之以四四揲之又奇一亦歸奇於㧅與前掛一併三度揲通有四㧅乃得一一三一其掛一者乘用數圖左上用數一十二其二揲㧅一者乘左副用數二十四其三揲㧅三者乘左次用數四得一十二其四揲一者乘左下用數九用數左行三㧅謂之三變掛一得一十二㧅一得二十四㧅三得一十二又㧅一得九並為總數併此四總得五十七不問所握幾何乃滿衍母一十二去之得不滿者九或使知其所握五十七亦滿衍母去之亦只得九數以為實用三才衍法約之得三乃畫少陽單爻或不滿得八得七為實皆命為三他皆倣此術意謂揲二楪三楪四者凡三度復以三十三從頭數揲之故曰三變而成爻既卦有六爻必有十八變故曰十有八變而成卦按此條强援蓍卦牽附衍數致本法反晦今以本法列於前則其弊自見矣古厯會積問古厯冬至以三百六十五日四分日之一朔䇿以二十九日九百四十分日之四百九十九甲子以六十日各為一周假令至淳祐丙午十一月丙辰朔初五日庚申冬至初九日甲子欲求古厯氣朔甲子一會積年積月積日及厯過未至年數各幾何按此題嵗實朔䇿皆古法用數淳祐丙午嵗合朔冬至干支乃宋開禧法所步題數已不相蒙即推算無誤亦未合况不能無誤耶答曰一會積一萬八千二百四十年二十二萬五千六百月六百六十六萬二千一百六十日厯過九千一百六十三年未至九千七十七年按答數皆不合術曰同前置問數有分者通之互乘之得通數求總等不約一位約衆位各得元法連環求等約竒弗約偶各得定母本題欲求一會不復乘偶以定相乘為衍母定除母得衍數滿定去衍得竒以大衍入之得乘率以乘衍數得泛用數併諸泛以課衍母如泛內多倍數者損之乃驗元數竒偶同類處各損半倍或三位同類者三約衍母損泛各得正用然後推氣朔不及或所遇甲子日數乘正用加减之為總滿衍去之餘為所求厯過率實如紀元法而一為厯過以氣元法除衍母得一會積年以氣周日刻乘一會年得一會積日以朔元法除衍母得一會積月數按如紀元法而一以氣元法除衍母二語皆誤故得數不合皆當以氣分為法蓋氣分即嵗實分也右本題問氣朔甲子相距日數係開禧厯推倒或甲子日在氣朔之間及非十一月前後者其總數必滿母贅去之所得厯過年數尾位雖倫首位必異今設問以明大衍之理初不計其前多後少之厯過按此數語蓋因得數不合而自解之然算家終以得數為凖得數不合則無以取信於人矣草曰置問數冬至三百六十五日四分日之一朔䇿二十九日九百四十分日之四百九十九甲子六十日各通分內子互乘之列三等位具圖如後冬至得一千四百六十一朔實得二萬七千七百五十九甲子無母只是六十列三行互乘之具圖如後氣通母總等不約紀分以三行互乘右得一百三十七萬三千三百四十為氣分中得一十一萬一千三十六為朔分左得二十二萬五千六百為紀分先求總等得一十二按十二乃朔分紀分所求等數亦可為氣分等數故為總等乃存紀分一位不約只以等一十二約氣分得一十一萬四千四百四十五又約朔分得九千二百五十三皆為元法乃以連環求等次以紀元二十二萬五千六百與朔元九千二百五十三求等得一不約又以紀元與氣元一十一萬四千四百四十五求等得二百三十五只約氣元得四百八十七次以氣元四百八十七與朔元九千二百五十三求等得四百八十七只約朔元九千二百五十三得一十九約偏畢得四百八十七為氣定得一十九為氣定得二十二萬五千六百為紀定以三定相乘得二十億八千七百四十七萬六千八百為衍母具圖如後各以定數約衍母各得衍數氣得四百二十八萬六千四百朔得一億九百八十六萬七千二百紀得九千二百五十三寄左行各滿定數去之各得竒數氣竒得三百一十三朔竒得四紀竒得九千二百五十三各與定數用大衍求一各得乘數列右行對寄左行衍數具圖如後各以大數入之氣乘率得四百七十三朔乘率得五紀乘率得一十七萬二千七百一十七對左行衍數以右行乘率對乘左行衍數氣泛得二十億二千七百四十六萬七千二百朔泛得五億四千九百三十三萬六千紀泛得一十五億九千八百一十五萬四百一十具圖如後右列用數併之共得四十一億七千四百九十五萬三千六百一為泛用數與衍母二十億八千七百四十七萬六千八百驗之在衍母以上就以衍母除泛得二乃知泛內多一倍母數當於各用內損去所多一倍按術驗法元圖內諸元數奇偶同類者各損其半今驗法元圖氣元尾數是五紀元尾數是六百為俱五同類乃以術母二十億八千七百四十七萬六千八百折半得一十億四千三百七十三萬八千四百以損泛用圖內氣泛紀泛畢其朔泛不損各得氣朔紀正用數其氣正用得九億八千三百七十二萬八千八百朔正用五億四千九百三十三萬六千紀正用五億五千四百四十一萬二千一列為正用圖在前既得正用數次驗問題十一月朔日丙辰冬至初五日庚申初九日甲子乃以初一减初九甲子餘八日為朔不及次以初五亦减初九甲子餘四日為氣不及以二不及各乘正用得數具圖如後先以氣不及甲子四日以乘氣正用數九億八千三百七十二萬八千八百得三十九億三千四百九十一萬五千二百為氣總次以朔不及甲子八日數以乘其朔正用數五億五千九百三十三萬六千得四十三億九千四百六十八萬八千為朔總併之得八十三億二千九百六十萬三千二百為總數滿母二十億八千七百四十七萬六千八百去之不滿二十億六千七百一十七萬二千八百為所求率實具圖如後按求積嵗應以甲子距冬至前之日分乘紀用數為紀總以合朔距冬至前之日分乘朔用數為朔總併紀總朔總滿衍母去之以嵗實分除之即已過積年草內以冬至距甲子前之日分乘氣用數合朔距甲子前之日分乘朔用數併之乃求紀周法非求嵗周法也故不合置所得率實二十億六千七百一十七萬二千八百如法元圖紀元法二十二萬五千六百而一得九千一百六十三年為厯過年數次置衍母二十億八千七百四十七萬六千八百為實如法元圖氣元一十一萬四千四百四十五為法而一得一萬八千二百四十年為氣朔甲子一會積年內减厯過九千一百六十三年餘九千七十七年為未至年數次以冬至周日三百六十五日二十五刻乘積一會年一萬八千二百四十得六百六十六萬二千一百六十日為一會積日又以術母為實如法元圖朔元法九千二百五十二而一得二十二萬五千六百月為一會積月合問按此紀元即紀分以紀分除率實乃紀周數非已過年數也求一會積年當以氣分為法以氣元為法亦誤此二數既誤餘數無是者矣然題已不合既法合數亦不能合也今改設一題於後以明其法焉設古法嵗實三百六十五日四分日之一朔䇿二十九日九百四十分日之四百九十九甲子六十日假令十一月平朔辛巳日四百七十分日之一百一十三冬至癸卯日子正初刻問距前後甲子日子正初刻合朔冬至之年數各幾何答曰距前八百七十六年距後六百四十四年法按前法求至正用乃以冬至癸卯距甲子後三十九日為紀餘以日法即氣分母朔分母相乘之數三千七百六十分通之得十四萬六千六百四十為紀餘分以乘紀正用得紀總八十一兆二千九百八十九億七千五百八十二萬六千六百四十次以平朔辛巳距甲子十七日又四百七十分之一百一十三與冬至距甲子三十九日相减得二十一日又四百七十分日之三百五十七以日法三千七百六十通之得八萬一千八百一十六為朔餘分以乘朔正用得朔總四十四兆九千四百四十四億七千四百一十七萬六千併二總數滿衍母去之得率實十二億零三百零四萬五千八百四十為實以嵗實一百三十七萬三千三百四十為法除之得八百七十六年為距前氣朔甲子會積之年數又以衍母為實以嵗實分為法除之得一千五百二十年為前會積距後會積之年數减去距前會積之年數餘六百四十四年為距後會積之年數既得積年若欲還原求題中干支時刻則以前會之積年與嵗實相乘得三十一萬九千九百五十九為積日滿紀法六十去之餘三十九日自初日起甲子得冬至為癸卯日子正初刻又置積日以朔䇿日分九百四十通之為實以朔䇿通分納子為法除之得一萬零八百三十四為積朔餘二萬零四百五十四又為實以朔䇿日分九百四十為法除之得二十一日又九百四十分之七百一十四約之為四百七十分日之三百五十七為距冬至前日數與甲子距冬至前三十九日相减得一十七日又四百七十分日之一百一十三為距甲子後日數自初日起甲子得辛巳為平朔干支悉與題合推庫額錢問有外邑七庫日納息足錢適等遞年成貫整納近緣見錢稀少聽各庫照當處市陌凖解舊會其甲庫有零錢一十文丁庚二庫各零四文戊庫零六文餘庫無零錢甲庫所在市陌一十二文遞减一文至庚庫而止欲求諸庫日息原納足錢展省及今納舊會并大小月分各幾何按題意係七邑日納共錢同數以各邑市陌數計之或適足或有餘多寡不同甲陌十二則餘十乙陌十一丙陌十則無餘丁陌九則餘四戊陌八則餘六己陌七則無餘庚陌六則餘四以求共錢同數此本術也又問展省舊會按草中展省乃官省陌以七十七為一百所展日息共錢之數舊會乃以各陌數為一百所升日息共錢之數二者在本術中已贅且不明言展省舊會用數求法皆故為溟涬也答曰諸庫納日息足錢二十貫九百五十文展省三十五貫文甲庫日息舊會二百二十四貫五百一十文按應作五百文又六分文之五大月舊會六千七百三十七貫五百文按少二十五文小月舊會六千五百一十二貫九百二文按應作六千五百一十貫五百又六分文之一乙庫日息舊會二百四十五貫文大月舊會七千三百五十貫文小月舊會七千五百貫文按應作七千一百五貫丙庫日息舊會二百六十九貫五百文大月舊會八千八十五貫文小月舊會七千八百一十五貫五百文丁庫日息舊會二百九十九貫四百四文按應作四百四十四文又九分文之四大月舊會八千九百八十三貫三百三文按少三十文又三分文之一小月舊會八千六百八十三貫八百八文按少八十文又九分文之八戊庫日息舊會三百三十六貫八百六文按應作七十五文大月舊會一萬一百六貫二百四文按應作二百五十文小月舊會九千七百六十九貫三百六文按應作七十五文己庫日息舊會三百八十五貫文大月舊會一萬一千五百五十貫文小月舊會一萬一千一百六十貫文按少五貫庚庫日息舊會四百四十九貫一百四文按應作一百六十六文又分三文之二大月舊會一萬三千四百七十五貫文小月舊會一萬三千二十四貫八百二文按應作二萬三千二十五貫一八百三十三文又三分文之術曰以大衍求之置甲庫市陌以庫减庫减之各得諸庫原陌連環求等約竒弗約偶按此特為等數為偶者言之若等數為竒者則約偶弗約竒得定母諸定相乘為衍母以定約衍母得衍數衍數同衍母者去之為無無者借之同類其各滿定母去餘為竒數以竒定用大衍求乘率乘衍數為用數無者則以原數同類者求等約衍母得數為借數次置有零文庫零錢數乘本用數併為總數滿衍母去之不滿為諸庫日息足錢各大小月日數乘之各為實各以原陌約為舊會草曰置甲庫市陌一十二遞减一得一十一為乙庫陌十一為丙庫陌九為丁庫陌八為戊庫陌七為己庫陌六為庚庫陌得諸庫原陌甲乙丙丁戊己庚以連環求等約訖甲得一乙得十一丙得五丁得九戊得八己得七庚得一各為定母立各一為子按此法之要在於求定而術中獨略之今詳其式於後法列七庫陌數於前先以甲與乙相約無等數與丙數相約得等數二偶約丙十得五竒與丁數相約得等數三奇約甲十二得四偶與戊數相約得等數四偶約甲四得一奇甲數既為一不能冉約即為與諸數遍約畢次以乙與下五數相約俱無等次以丙與下四數相約亦俱無等次以丁與戊己二數相約俱無等與庚數相約得等數三奇約庚六得二偶次以戊與己相約無等與庚相約得等數二偶約庚二得一奇庚既為一己亦不能與之相約乃為連環求等畢得定數為甲一乙十一丙五丁九戊八己七庚一也後凡求定數倣此定母先以諸定相乘得二萬七千七百二十為衍母次以諸定互乘諸子甲得二萬七千七百二十乙得二千五百二十丙得五千五百四十四丁得三千八百戊得三千四百六十五己得三千九百六十庚得二萬七千七百二十各為衍數定母右行次驗諸衍數有同衍母者皆去之為無衍數次各滿定母去各本衍各得奇數甲無乙得一丙得四丁得二戊得一己得五庚無各為竒數次驗有奇數者得一便以一為乘率或得二數以上者各以奇數於右上定母於右下立天元一於左上用大衍求一之數入之驗乘除至右上餘一而止皆以左上所得為乘率甲無乙得一丙得四丁得五戊得一己得四庚無各為乘率列右行以對寄左衍數以兩行對乘之為用數甲無乙得二千五百二十丙得二萬二千一百七十六丁得一萬五千四百戊得三千四百六十五巳得一萬一千八百八十庚無次推無用數者惟甲庚合於同類處借之其同類謂原陌列而視之今視甲一十二庚六皆與丙一十戊八俱偶為同類其戊用數三千四百六十五其數少不可借惟丙一十之用數係二萬二千一百七十六為最多當以借之乃以甲一十二丙一十庚六求等得二以等數二約衍母二萬七千七百二十得一萬三千八百六十為借數乃减丙用二萬二千一百七十六餘八千三百一十六為丙用數乃以所借出之數一萬三千八百六十為實以原等二為法除之得六千九百三十為甲用數以甲用數减借出數餘亦得六千九百三十為庚用數今不欲甲庚之借數同乃驗得出數一萬三千八百六十可用幾約如意乃立三取三分之一得四千六百二十為甲用取三分之二得九千二百四十為庚用列右行一零數左行乃視諸庫有無零錢數驗得乙丙己三庫無先去其用數乃以甲子戊庚四庫零錢列左行對乘本用甲得四萬六千二百丁得六萬一千六百戊得二萬七百九十庚得三萬六千九百六十合為總併此四總得一十六萬五千五百五十滿衍母二萬七千七百二十去之不滿二萬六千九百五十為所求率以貫約為二十六貫九千五十文為諸庫日息等數以官省七十七陌展得三十五貫文按官省陌以七十七為一百故二十六貫餘展為三十五貫各以其庫陌紐計按庫陌紐計即以各陌數為一百各得舊會零錢各以三十日乘為大月息以日息减大月息餘為小月息合問分糶推原問有上農三人力田所收之米係用足斗均分各往他處出糶甲糶本郡官場餘三斗二升乙糶與吉安鄉民餘七斗丙糶與平江攬戶餘三斗欲知共米及三人所分各糶石幾何答曰共米七百三十八石三人各分米二百四十六石甲糶官斛二百九十六石乙糶安吉斛二百二十三石丙糶平江斛一百八十二石術曰以大衍求之置官場斛率安吉鄉斛率平江市斛率官私共知者官斛八斗三升安吉鄉斛一斗一升平江市斛一石三斗五升為原數求總等不約一位約衆位連環求等約竒不約偶或猶有類數存者有求等約彼為復乘此各等定母相乘為衍母互乘為衍數滿定去之得竒大衍求一得乘率乘衍數為用數以各餘米乘用併之為總滿衍母去之不滿為所分以原人數乘之為共米草曰置文思院官斛八十三升吉安州鄉一百一十升平江府市斛一百三十升各為其斛原率先以三率求總等得一不約按此題只一數見十不必用復數求總等次以連環求等其安吉率一百一十與平江率一百三十五求等得五以約平江率得二十七按五為中數或約偶或約奇皆可但不約可以冉約者餘皆求等得一不約各得原數以定相乘得二十四萬六千五百一十為衍母各以原率約之得二千九百七十為官斛衍數得二千二百四十一為安吉州衍數得九千一百三十為平江斛衍數官斛安吉平江衍母次以定母滿法去衍數得不滿六十五為官斛奇不滿四十一為安吉奇不滿四為平江奇數定母奇數各以大衍入之求得乘數得二十三為官斛乘率得五十一為安吉乘率得七為平江乘率以乘率各乘寄左行衍數得六萬八千三百一十為官斛用數得一十一萬四千二百九十一為安吉用數得六萬三千九百一十為平江用數次以甲餘三十二升乘官斛用數六萬八千三百一十得二百一十八萬五千九百二十升於上次以乙餘七十升乘安吉用數一十一萬四千二百九十一得八百萬三百七十升於中次以丙餘三十升乘平江用數六萬三千九百一十得一百一十九萬七千三百於下各為總併之得一千二百一十萬三千五百九十升為總數滿衍母二十四萬六千五百一十升去之不滿二萬四千六百升為所求率展為二百四十六石為三人各分米以兄弟三人因之得七百三十八石為共米置分米二百四十六石各以官斛八斗三升安吉斛一石一斗平江斛一石三斗五升約之甲得二百九十六石餘三斗二升乙得二百二十三石餘七斗丙得一百八十二石餘三斗各為糶過及餘米合問數學九章卷一上欽定四庫全書數學九章卷一下宋秦九韶撰大衍積足尋原問欲砌基一假見管大小方甎六門城甎四色令匠取便或平或側只用一色甎砌須要適足匠以甎量地計料稱用大方料廣多六寸深少六寸按即多七寸用小方廣多二寸深少三寸按即多八寸用城甎長廣多三寸深少一寸按即多一尺一寸以闊深少一寸按即多五寸廣多三寸以厚廣多五分深多一寸用六門甎長廣三寸深多一寸以闊廣多三寸深多一寸用厚廣多一寸深多一寸皆不匼匝未免修破甎料禆補其四色甎大方方一尺三寸小方方一尺一寸城甎長一尺二寸闊六寸厚二寸五分六門長一尺闊五寸厚二寸欲知基深廣幾何按題意謂以一尺三寸量基之廣未餘六寸以一尺一寸量之餘二寸以一尺二寸量之餘三寸以六寸量之亦餘三寸以二寸五分量之餘五分以一尺量之餘三寸以五寸量之亦餘三寸以二寸量之餘一寸以求廣也其求深之意亦同答曰深三丈七尺一寸廣一丈二尺三寸術曰以大衍求之置甎方長闊厚為元數以小者為單起一先求總等存一位約衆位列為多者隨意立號乃為元數連環求等約為定母以定相乘為衍母各定約衍母得衍數滿定去之得竒竒定大衍得乘率以乘衍數得用數次置廣深多少數多者乘用少者減元數餘以乘用併為總滿衍母去之不滿得廣深草曰置四甎方長闊厚係八數城甎厚有分為小者皆通之為單大方得一百三十分小方得一百一十分城甎長得一百二十分闊得六十分厚得二十五分六門甎長得一百分闊得五十分厚得二十分錐行置之右列位稍多甎名相互今假八音為號位先以最少者自木二十與革二十五求等得五乃反約木二十為四木四與土五十求等得二以約五十為二十五木四與匏六十求等得四約六十為一十五木四與竹一百求等得四約一百為二十五木四與絲一百一十求等得二約一百一十為五十五木四與石一百二十求等得四反約木四為一以木一與金求等得一不約為木與諸數求等約訖為一變得數具圖如後次以革二十五與土五十按前巳約土為二十五次變不應復用原數然於得數却無礙求等得二十五約五十為二以革二十五與匏一十五求等得五約匏一十五為三以革二十五與竹二十五求等得二十五約竹二十五為一又以革二十五與絲五十五求等得五約絲五十五得一十一以革二十五與石一百二十求等得五約一百二十為二十四以革二十五與金一百三十求等得五約金一百三十得二十六革與諸數遍約訖為二變具圖如後乃以土二與匏三竹一絲一十一求等皆得一不約以土二與石二十四求等得二及約土二得一又不土一與金二十六求等得一不約土與諸數約訖為三變具圖如後乃以匏三與竹一絲十十一求等皆得一又以匏三與石二十四求等得三約石二十四為八又匏三與金二十六求等得一不約匏與諸數約訖以為四變次以竹一與絲一十一與石二十四按巳約為八云二十四誤與金二十六求等皆得一竹與諸數約訖為五變次以絲一十一與石二十四按誤同上與金二十六求等皆得一不約為六變復以石二十四按誤同上與金二十六求等得二約金二十六為一十三至此七變連環求等約俱畢得數為定母列圖如後右定母列右行以相乘得八萬五千八百為衍母以各定母約衍母各得衍數其竹木土定得一者為無金定一十三得衍數六千六百石定八得衍數一萬七百二十五絲定一十一得衍數七千八百竹定一無衍匏定三得衍數二萬八千六百土定一無衍數革定五五得衍數三千四百三十二木定一無衍數各滿定母去之得竒數金得竒九石得竒四絲得竒一匏得竒一草得竒七其絲匏得竒數一者便以一為乘率其金石革三處竒數皆與本定母用大衍求一入之各得乘率列右行金得三石得五絲得一革得一革得一十八各為乘率寄左行衍數各得為用數凡諸用數同類者類必多可互借以補無者先驗革元數二十五與木元數二十為同類求等得五以等五約衍母八萬五千八百得一萬七千一百六十乃於革用數內減出以補木位為木用餘四萬四千六百一十六為革用次驗竹元數一百與土五十為同類以求等得五十以等五十約衍母八萬五千八百得一千七百一十六亦於革用內各借與竹土為用數革止餘四萬一千一百八十四為用得諸定用數按無用數則此條可省借數轉生煩擾非法也其所以可用借補者蓋以同類之元數其較餘之竒偶必同故一數可分用也然惟元數同偶者為然同竒則有不可用者此題可用因題中餘數未過小元數也右行定用始列錐行假號求得今照甎色遷次列之既照甎次序列用數於右行乃驗問題所謂大方甎砌廣多六寸小方多二寸城甎長多三寸城甎闊多三寸厚多五分六門長多三寸闊多三寸厚多一寸對本用列左行各對乘之具圖如後兩行乘畢金得一百一十八萬八千絲得一十五萬六千石得一百六十萬八千七百五十匏得八十五萬八千革得二十萬五千九百二十竹得五萬一十四百八十土亦得五萬一千四百八十木得一十七萬一千六百乃併前八位數共得四百二十九萬一千二百三十分為總滿衍母八萬五千八百去之不滿一千二百三十分約之為一丈二尺三寸為基元廣數乃求其深驗問題大方砌少六寸小方砌少三寸城甎長砌少一寸闊砌少一寸厚砌多一寸六門長砌多一寸六門闊砌多一寸六門厚砌多一寸列為中行次置諸甎元數列為左行課減之具圖如後今以中行多者存之少者用減左行存者左行元數去之所減者左行餘數存之金得七十絲得八十石得一百一十匏得五十革得一十竹一十土一十本一十具圖如後列為左行以對右行定用數具圖如後以左行多餘數對乘右行用數金得一百三十八萬六千絲得六十二萬四千石得五百八十九萬八千七百五十匏得一百四十三萬革得四十一萬一千八百四十竹得一萬七千一百六十土得一萬七千一百六十木得一十七萬一千六百具圖如後併八位得九百九十五萬六千五百一十分為總滿衍母八萬五千八百去之不滿三千七百一十分展為三丈七尺一寸為基地深推計土功問築堤起四縣夫分給里步皆同齊闊二丈里法三百六十步步法五尺八寸人夫以物力差定甲縣物力一十三萬八千六百貫乙縣物力一十四萬六千三百貫丙縣物力一十九萬二千五百貫丁縣物力一十八萬四千八百貫每力七百七十貫科一名春程人功平方六十尺先到縣先給今甲乙二縣俱畢丙縣餘五十一丈丁縣餘一十八丈不及一日全功欲知堤長及四縣夫所築各幾何按題意以四縣修堤總長相同每日所修之長不同以各每日所修之長計總長或適足或有餘以求總長也但不正言其數而設堤闊數各縣物力數一夫力數一夫平方數以取每日所修堤長數故令人不能驟解答曰堤長一十九里二百三十五步五尺甲縣夫築一千二十六丈乙丙丁同乙縣夫築一千七百六十八步五尺六寸甲丙丁同丙縣夫築四里三百二十八步五尺六寸甲乙丁同丁縣夫築同前三縣數按四縣所築堤長等則丈數步數里數皆同今以三數分載三縣下而復注以與某縣同殊混人目術曰置各縣力以程功程為實以力率乘堤齊闊為法除之得各縣日築復數有分者通之互乘之得通數求總等不約一位約衆位曰元數連環求等約竒得定母陸續求衍數竒數乘率用數以丙丁縣不及數乘本用併為總數以定母相乘為衍母滿母去總數得各縣分給里步積尺數以縣數因之為堤長各以里法步法約之為里步草曰置甲縣力一十三萬八千六百貫乙縣力一十四萬六千三百貫丙縣力一十九萬二千五百貫丁縣力一十八萬四千八百貫以程功六十尺遍乘之皆以貫默按貫默乃以一貫千文為法之名與前官陌市陌名相似約之甲得八百三十一萬六千尺乙得八百七十七萬八千尺丙得一千一百五十五萬尺丁得一千一百八萬八千尺各為實次以力率七百七十貫乘堤齊闊二十尺亦以貫默約之得一萬五千四百尺為法遍除諸各實甲得五十四丈乙得五十七丈丙得七十五丈丁得七十二丈各為四縣衆夫每日築長率按大衍術命曰復數列右行以復數按前術以尾數在十以上者為復數此數不合求總等得三大按此條原本皆以丈為寸於義無取今皆改正以約三位多者不約其少者甲得五十四乙得一十九丙得二十五丁得二十四仍為元數次以兩兩連環求等各約之按四縣每日築長數皆以丈為單位非位數也但一等數可以度盡四數必先求總等約之然後可以為元數即此可見總等法不獨用於通數復數也先以丁丙求等又以丁乙求等皆得一不約次以丁甲求等得六只約甲五十四得九不約丁次以丙與乙求等又以丙與甲九求等皆得一不約後以乙與甲九求等得一不約復驗甲九與丁二十四猶可再約又求等得三以約丁二十四得八復乘甲為二十七次以定母四位相乘求得一十萬二千六百為衍母各以定母約衍母甲得三千八百乙得五千四百丙得四千一百四丁得一萬二千八百二十五為衍數滿定母各去衍數甲不滿二十乙不滿四丙不滿四丁不滿一各為竒數以各定母與本竒數用大衍求一術入之各得乘率甲得二十三乙得五丙得一十九丁得一以右行乘率對乘寄左行衍數甲得八萬七千四百乙得二萬七千丙得七萬七千九百七十六丁得一萬二千八百二十五各為用數次驗四縣所築有無不及零丈尺寸今甲乙俱畢為無丙餘五十一丈丁餘一十八丈為有以丙丁二縣餘丈各乘丙丁二用數其丙五十一丈乘丙用七萬七千九百七十六得三百九十七萬六千七百七十六丈為丙總以丁餘一十八乘丁用一萬二千八百二十五得二十三萬八百五十丈為丁總併二總得四百二十萬七千六百二十六丈為總數亦以丈通衍母得一十萬二千六百丈仍為衍母滿去總數不滿一千二十六丈為所求長率以四縣因之得四十一百四丈為實以步法五尺八寸除之得七千七十五步五尺為堤長步以里法三百六十步約之得一十九里二百三十五步五尺為堤通長置長率一千二十六丈以步法約之得一千七百六十八步五尺六寸又以里法約之得四里三百二十八步五尺六寸為各縣所給道里步尺數餘米推數問有米鋪訴被盜去米一般三籮皆適滿不記細數今左壁籮剩一合中間籮剩一升四合右壁籮剩一合後獲賊係甲乙丙三名甲稱當夜摸得馬杓在左壁籮舀入布袋乙稱踢著木履在中籮舀入袋丙稱摸得漆碗在左邉籮舀入袋將歸食用日久不知數索到三器馬杓滿容一升九合木履容一升七合漆碗容一升二合欲知所失米數計贓結斷三盜各幾何答曰共失米九石五斗六升三合環甲米三石一斗九升二合乙米三石一斗七升九合丙米三石一斗九升二合術曰以大衍求之列三器所容為元數連環求等約為定母以相乘為衍母以定各約衍母得衍數各滿定母去之得竒以竒定用大衍求得乘率以乘衍數得用數次以各剩米乘用併之為總滿衍母去之不滿為每籮米各以剩米減之餘為甲乙丙盜米併之為共失米草曰列三器所容一升九合一升七合一升二合為元數連環求等皆得一不約便以元數相乘得三千八百七十六為衍母以各元數為定母以定約衍母得衍數甲得二百四乙得二百二十八丙得三百二十三各為衍數列左行以三定母甲十九乙十七丙十二列右行具圖如後各滿定母去衍數得竒數甲得一十四乙得七得七丙得一十一各以竒定用大衍求一各得乘率甲得十五乙得五丙得一十一各為乘率列右行對寄在行衍數具圖如後以丙行對乘之得用數甲得三千六十乙得一千一百四十丙得三千五百五十三列右行具圖如後既得用數始驗問題三籮剩米列左行對三人所用以兩行對乘之甲得三千六十乙得一萬五千九百六十丙得三千五百五十三併三數得二萬二千五百七十三為總數滿衍母三千八百七十六去之不滿三千一百九十三合展為三石一斗九升三合為三籮適滿細數以左籮剩一合減之餘三石一斗九升二合為甲盜米又為丙盜米以中籮剩米一升四合減之餘三石一斗七升九合為乙盜米併三人共得九石五斗六升三合為所失總米合問程行計地問軍師獲捷當早㸃差急足三名往都下節節走報具甲於前數日申末到乙後數日未正到丙於今日辰未到據供甲日行三百里乙日行二百四十里丙日行一百八十里問自軍前至都里數及三人各行日數幾何答曰軍前至都三千三百里甲行一十一日乙行一十三日四時半丙行一十八日二時術曰以大衍求之置各行里先求總等存一約衆得原里次以連環求等約竒復乘偶得定母以定相乘為衍母滿定除衍衍得乘率以乘衍數得用數次置辰刻正末乘各行里為實以晝六時約之得餘里各乘用數併為總滿衍母去得所求至都里以各日行約之得日辰刻數草曰置甲三百里乙二百四十里丙一百八十里先求總等得六十只存甲三百勿約乃約乙二百四十得四次約丙一百八十得三各為元數連環求等先以丙乙求等得一不約次以丙甲求等三於術約竒不約偶蓋以等三約三因得一為竒盧無衍數乃便徑先約甲三百為一百復以等三兼丙三為九既丙九為竒甲百為偶此即是約竒弗約偶次以一四與甲百求等得四以四約一百得二十五為甲復以四乘乙四得一十六為乙各為定母以定母相乘得三千六百為衍母以各定約衍母為衍數甲得一百四十四乙得二百二十五丙得四百術數各滿衍母去之不滿為竒數甲得一十九乙得一丙得四以各竒數與定母用大衍入之各得乘數甲得四乙得一丙得七各為乘率列右行以乘率對乘寄左行衍數甲得五百七十六乙得二百二十五丙得二千八百各為用數次置甲申末到者其酉初為夜此是甲以全日到為無餘里次置乙於未正到乃於卯時數至未正得四箇半時以四半乘乙行二百四十里得一千八十為實以畫六時約之得一百八十里為乙行不及全日之餘里次置丙於辰未到自卯初數至辰未得二時以因丙行一百八十里得三百六十為實以六時除之得六十里為丙行不及全日之餘里以乙餘一百八十乘乙用二百二十五得四萬五百於中以丙餘六十乘丙用二千八百得十六萬八千加中共得二十萬八千五百為總滿衍母三千六百去之不滿三千三百里為軍前至都里以甲三百除之得一十一日以乙二百四十除之得一十三日四時半以丙一百八十除之得一十八日二時合問按凡總等數必小於連環等數若甚大即為連環等數此題數是也故再約即用求續等法不然不能合也程行相及問有急足三名甲日行三百里乙日行二百五十里丙日行二百里先差丙往他處下文字既兩日又有文字遣乙追付已半日復有文字續令甲趕付乙三人偶不相及乃同時俱至彼所先欲知乙果及丙甲果及乙得日并里次問彼處去此里數各幾何按題意謂三行遲疾不同乙後丙兩日甲後乙半日問幾日幾里可以追及又既及之後三人不能同行及各至彼處之時刻皆與各起程之時刻相同蓋言自此至彼所行皆為整日數也答曰乙果追及丙八日行二千里甲果追及乙二日半行七百五十里彼處去此三千里術曰以均輸求之大衍入之置乙己去日數乘乙行里為實以甲乙行里差為法除之得甲及乙日數辰刻以乘甲行得里次置丙既去日乘丙行里為實以丙乙行里差為法除之得乙及丙日數以乘乙行得里然後置三人日行求總等約得原數以連環求等約得定母以定相乘得衍母各定約衍得衍數滿定去衍得竒竒定大衍得乘率以乘寄衍得用數視甲及乙里為乙率乙及丙里為丙率以乙日行滿去乙率不滿為乙餘以丙日行滿去丙率不滿為丙餘以二餘各乘本用併之為總滿衍去之不滿為彼去此里草曰置乙己去日乘乙日行二百五十里得一百二十五里為實次置甲日行三百里減去乙行二百五十里餘五十里為差法除實得二日五十刻甲果及乙數以乘甲行三百里得七百五十為甲及乙里數次置丙既行二百乘丙日二百里得四百里為實次置乙行二百五十里減丙行二百里餘五十里為差法除實得八百為乙及丙日數以乘乙行二百五十里得二千里為乙得及丙之里數已上為先欲知果及數次列甲乙丙三名日行求總等得五十先約甲丙存得甲六乙二百五十丙四以甲六丙四求等得二以二約甲為三復以二因丙為八次將乙二百五十與丙八相約得二乃約乙為一百二十五復以二因丙為十六定得甲三乙一百二十五兩十六為定母以定相乘得六千為衍母以各定約衍母得衍數甲得二千乙得四十八丙得三百七十五求竒數左上二千以甲三去之竒二左中四十八即為乙竒左下三百七十五丙十六去之竒也各以大衍求得甲二乙一百一十二丙七各為乘率以乘率對乘衍數甲得四千乙得五千三百七十六丙得二千六百二十五為泛用數併三泛得二萬二千一乃多衍母一倍當半衍母六千得三千以消甲四千餘一千又消乙五千三百七十六餘二千三百七十六丙不消各為定用數既得用數次視前草中甲及乙七百五十里為乙率乙及丙一千里為丙率各滿乙丙日行里去之今乙丙二人所行各皆適滿去之無餘雖稱同時俱至乃各係全日所行便以乙丙二人約六千里得三千里為彼去此里數合問按復數求元數用總等法尚屬未密蓋總等約後有當連環求等者有當即求續等者其法不能定也今少為變通凡復數皆見十者先以十為總等遍約之百千萬同為元數俟連環求等畢復以總等十乘一數百千萬同然後再求續等以得定數爰依題數具式於後法列三數於上以十為總等遍約之得甲三十乙二十五丙二十即為元數連環求等以甲與乙約得等數五竒約甲得六偶以甲與丙約得等數二偶約甲得三竒為甲數遍約畢次以乙與丙約得等數五竒約丙得四偶為乙丙二數遍約畢乃以總等十乘乙數得二百五十次求續等以甲與乙與丙相約俱無續等以乙與丙約得續等二偶約乙數得一百二十五竒復乘丙得八則甲三乙一百二十五丙八即為各定數也以三定數連乘得三千為衍母即所問彼處去此之里數較舊術算省而數亦確矣數學九章卷一下
