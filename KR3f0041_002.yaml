也求晨疾初段常度見常中專解於後草曰以伏日隨伏度為右行以見日隨見度為左行以度對度日對日其度於上日於中空其下列之置見日一百一十三減一餘一百一十二以半之得五十六為見率以伏日一十六日九十分併見日一百一十三得一百二十九日九十分為初行法以初行法半之得六十四日九十五分併見率五十六日得一百二十日九十五分為伏率以初行法寄之以伏率歸右下以對見率仍分左右兩行為首圖以首圖伏日一十六日九十分乘伏率一百二十日九十五分得二千四十四日五分五十杪為伏差於右下以首圖見日一百一十三乘見率五十六得六十三百二十八日為見差於左下乃成次圖凡方程之術先欲得者存之以未欲得者互偏乘兩行諸數今驗此圖先欲得日差故存其左右之上下以左右之中伏見日數互偏乘兩行乃以次圖右中伏日一十六日九十分先偏乘左行畢左上得三百一度三十二分七十杪左中得一千九百九日七十分左下得一十萬六千九百四十三日二十分又以次圖左中見日一百一十三偏乘右行畢右上得四百四十日七十分右中亦得一千九百九日七十分右下得二十三萬九百七十八日二十一分五十杪以兩行得變名泛積法而成才圖乃驗才圖左上下皆少用減右行畢行上餘一百三十九度三十七分三十杪為日差實右中空右下得一十二萬四千三十五日一分五十杪為日差法今維圖法多實少除得空度空分十一杪二十三小分六十五小杪不盡十杪五十五小分三十九小杪五十二微分五十微杪收為一小杪為日定差一十一杪二十三小分六十六小秒既得日差乃行初行率置法圖內初行法一百二十九日九十分內減去一日餘一百二十八日九十分乘日差一十一杪二十三小分六十六小杪得空度一十四分四十八杪三十九小分七十七小杪四十微分為寄次置按此下脫三十一字應作次置寄以半法乘之得九度四十分七十三杪四十三小分三十二小杪一十三微杪以得數加伏度三度九十分見度一十七度八十三分共得三十一度一十三分七十三杪四十三小分三十二小杪一十三微分為初行實如初行法一百二十九日九十分而一乃行空度二十三分九十七杪為伏合初日行率餘三杪一十三分分三十二小杪一十三微分棄之求末行率置合伏段日數一十六日九十分乘日差一十一杪二十三小分六十六小杪得一分八十九杪八十九小分八十五小杪四十微分為得數乃以得數減初行率二十三分九十七杪餘二十二分七杪一十小分一十四小杪六十微分為合伏末日行求平行率置初行率二十三分九十七杪併末行率二十三分七杪得四十六分四杪以半之得二十三分二杪為平行率求交段差置合伏日下減全日一百分餘一十分乘末行率二十二分七杪得二分二十杪七十小分為交段差求晨疾初段常度置合伏日一十六日九十分乃收九十分作一日通為一十七日併舊厯所注晨疾初段常日三十得四十七為共日乘合伏初行率二十三分九十七杪得一十一度二十六分五十九杪為寄上按此有第一日行度有逐日遞減之差有前後各段日數有前段積度求後段積也先以共日乘初行率者以最疾為率之共積也下求遞差以減之故為寄乃副置共日四十七減一餘四十六以半之得二十三乘副四十七得一千八十一以乘日差一十一杪二十三小分六十六小杪得一度二十一分四十六杪七十六小分四十六小杪以減上寄一十一度一十六分五十九杪餘一十度五分一十二杪二十三小分五十四小杪為合伏晨疾初兩段共積度按此乃求積差以減上數得共日之積慶也法應於共日內減一日以乘日差得數為共日數初末日行率之較再以共日數乘之得數折半為積差此先折半次連乘得積差其理亦同置共積內減合伏三度九十分餘六度一十五分一十二杪二十三小分五十四小杪為泛次以交段差二分二十杪七十小分減泛餘六度一十二分九十一杪五十三小分五十四小杪為晨疾初段常度注厯乃收八杪五按應作四十六小分四十六小杪為全分常定度按此於共積內減去合伏段積尚有合伏九十分不及一日所差之行分即交段差未減故為泛數再減交段差為晨疾初段常泛度再收為六度十三分始為定常度也求晨疾初段初行率以日差一十一杪二十三小分六十六小杪減合伏末行率二十二分七杪餘二十一分九十六杪為晨疾初段初行率行泛收之為定者也按此以合伏末日之次日為晨疾初段之初日也故置合伏之末行率減一日之差即為晨疾初段之初行率五杪餘收為六杪凡寄零未收名泛數已收名定數下倣此求晨疾初末行率置晨疾初常日三十減一餘二十九日乘日差一十一杪二十三小分六十六十小杪得三分二十五杪八十六小分一十四小杪以減晨疾初段初行率泛二十一分九十五杪七十六小分三十四小杪餘一十八分六十九杪九十小分二十小杪為晨疾初末行率按此求晨疾初段末日之行率也常日減一日乘日差得數為晨疾初段初末二日行率之較也故減初行率得末行率求平行率以晨疾初初行泛二十一分九十五杪七十六小分三十四小杪併晨疾初末泛一十八分六十九杪九十小分二十小分得四十分六十五杪六十六小分五十四小杪以半之得二十分三十二杪八十三小分二十七小杪為晨疾初平行泛乃以三泛收棄為之定按此與求合伏平行率同其言泛棄為定者蓋截去杪下竒零過半則收為一杪也然語意欠明又按五星行度遲疾差回非遞加遞減之數術中僅以合伏與順見二段各取中數至推遂日行度仍用遞加遞減之法故古法之疏五星尤甚原文語多隱晦令悉為解之可以見古今疏密之所在焉數學九章卷二上欽定四庫全書數學九章卷二下宋秦九韶撰天時揆日究微問厯代測景惟唐大衍厯最密本朝崇天厯陽城冬至景一丈二尺七寸一分五十杪夏至景一尺四寸七分七十杪九係與大衍厯同今開禧厯臨安府冬至景一丈八寸二分二十五杪夏至景九寸一分欲求臨安府夏至後差幾日而景與陽城夏至日等較以大衍厯晷景所差尺寸各幾何答曰大暑後五日午中景長一尺四寸八分八十五杪按舊本答數後有二圖舛錯潦草傳寫者失其真也細考圖內所載之數皆與今法頗合知此悉當時實測所定非同臆説也因取其數改正於後置臨安府所測冬至景一丈八寸二分二十五杪以夏至景九寸一分減之餘九尺九寸一分二十五杪為景差以為實置象限度九十一度三十一分四十四杪加一十一度二十五分二十七杪五十小分命度為寸得一百二寸五十六百七十一分五十杪為法以除前差實得空寸九十六百六十四分四十杪不盡棄之自乘得節泛數九千三百四十分不盡棄之先以小暑節乘率二十五乘節率九千三百四十分得二十三寸三千五百分於上次以臨安夏至九寸一分自乘得八十二寸八千一百分為夏至冪乃以夏至冪加上得一百六寸一千六百分為小暑冪以為實以一寸為隅開平方得一尺三分為臨安小暑節景不盡七百分即寸下七毫棄之按各節氣影長皆當時實測所定本不待求今所設求法乃故為溟涬使人不可解也細查其數首以象限加十一度餘為法以除影差得數自乘為節率四每節下又有乘率以乘率節率相乘與夏至影冪相加即為本節影冪是知節率乃強取之數蓋以此數先除各節影冪與夏至影冪之較名為乘率故以此與節率相乘加夏至影冪即各節影冪也數家設術誤人往往如此又以大暑乘率一百九乘節率九千三百四十分得一百一寸八千六十分於頭位仍以夏至冪八十二寸八千一百分加頭位一百一寸八千六十分得一百八十四寸六千一百六十分為大暑冪以為實以一寸為隅開平方得一尺三寸五分八十七杪為大暑不盡棄之又置立秋乘率二百八十九乘節率九千三百四十分得二百六十九寸九千二百六十分於上仍置夏至冪八十一寸八千一百分加於上二百六十九寸九千二百六十分得三百五十二寸七千三百六十八為立秋冪置立秋冪為實以一寸為隅開平方得一尺八寸七分八十一杪為立秋景不盡棄之乃驗陽城夏至景一尺四寸七分七十九杪在大暑後立秋前乃置大暑一尺三寸五分八十七杪併立秋景一尺八寸七分八十一杪得三尺二寸三分六十八杪以半之得一尺六寸一分八十四杪為大暑後九日景又以九日景併大暑景得二尺九寸七分七千一杪以半之得一尺四寸八分八十五杪半為大暑後五日景乃以大暑景得五日景得二尺八寸四分七十二杪半以半之得一尺四寸二分三十六杪少為大暑後三日景又以五日景得三日景得二尺九寸一分二十一杪大以半之得一尺四寸五分六十杪八十七小分五十小杪為大暑後四日景今驗陽城夏至景一尺四寸七分七十九杪為入臨安府大暑後四日景一尺四寸五分六十杪太強乃以四日減五日景餘三分二十四杪太弱為景差以十二時除之得二十七杪五小分二十小杪為法乃置陽城夏至景一尺四寸七分七十九抄減臨安大暑後四日景一尺四寸五分六十杪八十七小分五十小杪餘二分一十八杪一十二小分五十小杪為實後以法二十七杪五小分二十小杪除之實如法而一得商數八有餘命大暑四日午後數八辰得大暑五日寅時景與陽城夏至之日午景等求較以大衍厯晷景所差乃置陽城大暑景長一尺九寸五分七十六杪併陽城立秋景二尺五寸三分三十一杪得四尺四寸九分七杪以半之得二尺二寸四分五十三杪半為次暑後九日午中景置九日景復併大暑景一尺九寸五分七十六抄得四尺二寸二十九杪半以半之得二尺一寸一十四杪太為大暑後五日景今驗開禧厯所推臨安府大暑後五日午中景一尺四寸八分八十五杪半與陽城大暑後五日午中景尺一寸一十四杪太課之乃以臨安府五日景減陽城五日景差六寸一分二十九杪少按此法不過以臨安前後兩節氣影長比例一影長之日數時刻復以所得節氣日數時刻比例一陽城影長與之相較耳題內引大行崇天開禧諸法名目又稱其較同異差數皆故為張皇之語且影差逐日不同皆以平派求之法亦未密也草曰置臨安府所測冬至景一丈八寸二分二十五抄以夏至景九寸一分減之餘九尺九寸一分二十五抄為景差以為實置象度九十一度三十一分四十四杪加一十一度二十五分二十七杪半命度為寸得一百二寸五千六百七十一分半為法除實得空寸九千六百六十四分四十杪以自乘之得空寸九千三百四十分為節率先以小暑乘率二十五乘之得二十三寸三千五百分於上次以臨安夏至景九寸一分自乘得八十二寸八千一百分為夏至景冪以加上得一百六寸一千六百分為小暑景冪開平方以一寸為隅開之得一尺三分為小暑景又以大暑乘率一百九乘節率九千三百四十分得一百一寸八千六十分於上仍加夏至冪八十二寸八千一百分得一百八十四寸六千一百六十分為大暑冪以為實一寸寸為隅開平方得一尺三寸五分八十七杪為大暑景又置立秋乘率二百八十九乘節率九千三百四十分得二百六十九寸九千二百六十分於上仍加夏至冪八十二寸八千一百分共得三百五十二寸七千三百六十為立秋冪以為實以一寸為隅開平方得一尺八寸七分八十一抄為立秋景乃驗陽城夏至景一尺四寸七分七十九杪在大暑後立秋前乃併大暑立秋二景半之得一尺六寸一分八十四杪為大暑後九日景又併大暑景半之得一尺四寸八分八十五杪半為大暑後五日午中景又併大暑景得數半之得一尺四寸二分三十六杪少為大暑後三日景又併五日景一尺四寸八分八十五杪半得數半之得一尺四寸五分六十杪強為大暑後四日景驗得陽城夏至景入臨安大暑後四日乃以四日景減五日景餘三分二十四杪太弱為差以十二時除之得二十七杪五小分二十小杪為法復除陽城景與本日景差二分一十八杪一十二小分五十小杪得八命外為在初五日寅時景等求較以大衍厯晷景所差乃置陽城大暑景長一尺九寸五分七十六杪併陽城立秋景二尺五寸三分三十一杪得四尺四寸九分七杪以半之得二尺二寸四分五十三杪半為大暑後九日午中景復併暑景一尺九寸五分七十六杪得四尺二寸二十九杪半以半之得二尺一寸一十四杪太為大暑後五日暑以較今開禧厯當日景一尺四寸八分八十五杪半差少六寸一分二十九杪少合問接集中皆術在前草次之圖在後此條之例不同天池測雨問今州郡多有天池盆以測雨水但知以盆中之水為得雨之數不知器形不同則受雨多少亦異未可以所測便為平地得雨之數假今盆口徑二尺八寸底徑一尺二寸深一尺八寸接雨水深九寸欲求平地雨降幾何答曰平地雨降三寸術曰盆深乘底徑為底率二徑差乘水深併底率為靣率以盆深為法除靣率得面徑以二率相乘又各自乘三位併之乘水深為實盆深乘口徑以自之又三因為法除之得平地水深草曰以盆深及徑皆通為寸盆深得一十八寸底徑得一十二寸相乘得二百一十六寸為底率置口徑二十八寸減底徑一十二寸餘一十六寸為差以乘水深九寸得一百四十四寸併底率二百一十六寸得三百六十寸為靣率以盆深一十八寸為法除靣率得二十寸展為二尺為水靣徑以底率二百一十六寸乘靣率三百六十寸得七萬七千七百六十寸於上以底率二百一十六寸自乘得四萬六千六百五十六寸加上又以靣率三百六十寸自乘得一十二萬九千六百併上共得二十五萬四千一十六以乘水深九寸得二百二十八萬六千一百四十四寸為實以盆深一十八寸乘口徑二十八寸得五百四寸自乘得二十五萬四千一十六寸又三因得七十六萬二千四十八寸為法除實得三寸為平地雨深合問竹器驗雪問以圓竹籮驗雪籮口徑一尺六寸深一尺七寸底徑一尺二寸雪降其中髙一尺籮體通風受雪多則平地少欲知平地雪髙幾何按籮體通風一語與算術不相涉或籮口所降之雪歸於籮底與前天池測雨題相同然依上步算平地雪深只七寸餘今其數又不合殆故為是語以誤人也答曰平地雪厚九寸三千四百二十九分之七百六十四術曰口徑減底徑餘乘雪深半之自乘為隅以籮深冪乘雪深冪併隅又乘雪深冪為實隅實可約約之開連枝三乘方得平地雪厚草曰列問數各通為寸置口徑一十六寸減底徑一十二寸餘四寸乘雪深一十寸得四十寸以半之得二十寸自乘得四百寸為隅以籮深一十七寸自乘得二百八十九寸為籮深冪次置雪深一十寸自乘得一百寸為雪深冪以乘籮深冪數加隅又乘深冪得二百九十三萬寸為實隅實求等得四百俱約之得七千三百二十五為實得一為隅開三乘方步法不可超乃約實置商九寸與隅一相生得九為下亷又與商相生八十一寸為上亷又與商相生得七百二十九為從方乃命上商除實不盡七百六十四已而復以商生隅入二亷至方陸續又生畢以方亷隅共併之得三千四百三十九分寸之七百六十四為平地雪厚九寸三千四百三十九分寸之七百六十四合問按此法之意不可見然以數考之非通法也設原題雪深為一寸以口徑底徑較四寸乘雪深一寸仍得四寸半之得二寸自之得四寸為隅以籮深一十七寸自之得二百八十九寸為籮深冪雪深一寸自之仍得一寸為雪深冪二深冪相乘仍得二百八十九寸併隅得二百九十三寸再以雪深冪乘之仍得二百九十三寸為實隅實相約得七十四寸二十五百分為實一為隅開三乘方得二寸又六千四百分寸之五千七百二十五是平地雪反深於籮內矣列問數各通為十口徑得一十六寸深一十七寸底徑一十二寸籮中雪髙一十寸乃以底徑減口徑餘四寸乘雪深一十寸得四十寸以中得數二十寸自乘得四百寸為隅以籮深一十七寸自乘得二百八十九寸為籮深冪次置雪深一十寸自乘得一百寸為雪深冪以雪深冪一百寸乘籮深冪二百八十九寸得二萬八千九百寸併隅四百寸得二萬九千三百寸為上置頭位數二萬九千三百寸又乘雪深冪一百寸得二百九十三萬寸為實開三乘方以隅實求等得四百俱為約之得七千三百二十五為實一為隅開之步法不可超乃約實置商九寸與隅相生得九為下亷下亷九又與商九相生得八十一為上亷上亷又與商相生得七百二十九為從方乃以從方七百二十九命上商九除實七千三百二十五訖實餘七百六十四既而後以商生隅入下亷下亷得一十八又與啇九相生入上亷上亷得二百四十三又與商相生入方得二千九百一十六又以商九生隅一入下亷一十八內得二十七又以商九生下亷二十七入上亷二百四十三內得四百八十六又以商生隅入下亷二十七內得三十六為求圖乃以末圓方亷隅四者併之得三千四百三十九為母以實餘七百六十四為子命為平地雪厚九寸三千四百三十九分寸之七百六十四合問圓罌測雨問以圓罌接雨口徑一尺五寸腹徑二尺四寸底徑八寸深一尺六寸並裏明接得雨水深一尺二寸圓法用密率問平地雨水深幾何按此題問平地雨深無關圓法密率句贅若求罌中雨積數則當加此語答曰平地雨深一尺八寸七萬四千八十八分寸之六萬四千四百八十三按答數誤改正見後術曰底徑與腹徑相乘又各自乘併之乘半罌深以一十一乘之為下率以四十二為下法除得下積以半罌深併雨深減元罌深餘為上深以口徑減腹徑餘乘上深為次以半罌深乘口徑加次為靣率以半深除靣率得水靣徑以半深乘腹徑為腹率置靣率與腹率相乘又各自乘併之以一十一乘之為上率以半深自乘為冪以乘下法為上法上法除上率得上積半深冪乘下率併上率為總實口徑冪乘上法為總法除實得平地雨髙草曰置底徑八寸與腹徑二十四寸相乘得一百九十二寸於上又底徑八寸自乘得六十四寸加上又腹徑二十四寸自乘得五百七十六寸併上共得八百三十二寸以乘半罌深八寸得六千六百五十六寸又以一十一乘之得七萬三千二百一十六寸為下率按此下法不合皆為題中圖法句所誤置密率法一十四以所併三因之得四十二為下法以半深八寸併雨深一十二寸得二十寸以減元深一十六寸餘四寸為上深以口徑一十寸五分減腹徑二十四寸餘一十三寸五分以乘上深四寸得五十四寸為次以半罌深八寸乘口徑一十寸五分得八十四寸加次共得一百三十八寸為靣率以半深八寸乘腹徑二十四寸得一百九十二寸為腹率置靣率一百三十八寸與腹率一百九十二寸相乘得二萬六千四百九十六寸於上又以靣率一百三十八寸自乘得一萬九十四十四加上又以腹率一百九十二寸自乘得三萬六千八百六十四併上共得八萬二千四百四寸按此條內落以上髙四寸乘之一層以一十一乘之得九十萬六千四百四十四寸為上率以半深八寸自乘得六十四寸為半深冪以乘下法四十二得二千六百八十八為上法以半深冪六十四寸乘下率七萬三千二百一十六寸得四百六十八萬五千八百二十四寸併上率九十萬六千四百四十四共得五百五十九萬二千二百六十八寸為總實以口徑一十寸五分自乘得一百一十寸二分五釐以乘上法二千六百八十八寸得二十九萬六千三百五十二寸為總法除實得一尺八寸不盡二十五萬七千九百三十二與法求等得四俱約之為一尺八寸七萬四千八十八分寸之六萬四千四百八十三為平地雨深合問按此法有二誤法實皆當用圓冪或皆用方冪今以圓冪率乘實方冪率乘法法實不同類一誤也罌內雨自腹徑截之為雨圓臺體下髙八寸上髙四寸於下體併三冪以髙乘之於上體只併三冪未以髙乘之二誤也有此二誤故得平地雨深少三十五分之十七今依本法改正於後法以腹徑底徑相乘又各自乘併三積以半罌深八寸乘之得六千六百五十六寸為三倍方罌內腹下雨積又以口徑腹徑相減餘一十三寸五分以雨深減罌深餘四寸相乘以半罌深除之得六寸七分五釐與口徑相加得一十七寸二分五釐為雨靣徑與腹徑相乘又各自乘併三積以雨上深四寸乘之得五千一百五十寸二五為方罌內三倍腹上雨積併二雨積得一萬一千八百零六寸二五為方罌內三倍共雨積為實口徑自乘三因得三百三十寸七五為法除實得三尺五寸又一千三百二十三分寸之九百二十為平地雨深若不先用除則以口徑腹徑較與罌深雨深較相乘之五十四寸為雨靣徑口徑較加一半罌乘之數應以半罌除之得雨徑較今不除即如雨徑較以半罌乘之即為雨靣徑口徑較此數既加一半罌乘則諸數皆以半罌乘之得口徑八十四寸腹徑一百九十二寸以口徑與雨靣徑口徑較相加得雨靣徑一百三十八寸與腹徑相乘又各自乘併三冪以腹上雨深四寸乘之得三十二萬九千六百一十六寸為三倍上雨積又以半罌深冪乘前三倍下雨積得四十二萬五千九百八十四寸為三倍下雨積併二積得七十五萬五千六百寸為三倍共雨積為實以半罌深冪乘三因口徑冪得二萬一千一百六十八寸為法除之得數亦同峻積驗雪問驗雪占年墻髙一丈二尺倚木去址五尺梢與墻齊木身積雪厚四寸峻積薄平積厚欲知平地雪厚幾何答曰平地雪厚一尺四分術曰以少廣求之連枝入之以去址自乘為隅以墻髙自乘併隅於上以雪厚自之乘上為實可約者約而開之開連枝平方得地雪厚草曰以問數皆通為寸置去址五十寸自乘得二千五百為隅以墻髙一百二十寸自乘得一萬四千四百寸併隅得一萬六千九百寸於上以雪厚四寸自之得一十六乘上得二十七萬四百寸為實開連枝平方今隅實可求等得一百俱約之得二千七百四為實得二十五為隅開平方得一十寸四分展為一尺四分為平地雪厚合問按此術理法皆確然實用勾股不曰勾股而曰少廣曰連枝者猶有所閉匿而不肯盡發也試以圗明之甲乙為牆上雪厚即平地雪厚乙丙為木上雪厚甲乙丙勾股形與木倚牆所成勾股形同式牆髙為大股木為大弦木去址為大勾甲乙為小弦甲丙為小股乙丙為小勾以牆髙大股自乘木去址大勾自乘併之為大弦冪為實以木上雪厚乙丙小勾冪乘之以木去址大勾冪除之得甲乙小弦冪開平方即為平地雪厚也數學九章卷二下
