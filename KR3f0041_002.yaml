body:
  text: 數學九章卷二上宋秦九韶撰天時推氣治厯問太史測驗天道慶元四年戊午嵗冬至三十九日九十二刻四十五分紹定三年庚寅嵗冬至三十二日九十四刻一十二分欲求中間嘉泰甲子嵗氣骨嵗餘斗分各得幾何按紹定三年庚寅之冬至實紹定四年辛卯之始辛卯距戊午三十四年積年為三十三答曰氣骨十一日三十八刻二十分八十一杪八十小分餘嵗五日二十四刻二十九分三十杪三十小分斗分空日二十四刻二十九分三十杪三十小分術曰先距前後年數為法置前測曰刻分減後測曰刻分餘為率不足減則加紀䇿以紀䇿纍加之今及天道合用五日以上數為實以法除實得嵗餘去全日餘為斗分以所求中間年上距前測年數乘嵗餘益入前測日刻分滿紀䇿去之餘為所求氣骨草曰置前測戊午嵗距前嵗庚寅嵗得三十三為法置前測戊午嵗冬至三十九日日辰癸卯九十二刻四十五分減後測紹定三年庚寅嵗冬至三十二日日辰丙申九十四刻一十二分今後測者少不及前測者以減乃加紀法六十日於後測日內得九十二日九十四日一十二分然後用前測者減之餘五十三日一刻六十七分為率按術當以法三十三餘率須使啇數必得五日以上乃可今率未得五日乃兩度纍加紀法一百二十入率內共得一百七十三日一刻六十七分為刻實如法除之得五日二十四刻二十九分三十杪三十小分不盡棄之為嵗餘乃去全五日得二十四刻二十九分三十杪三十小分為斗分次推嘉泰甲子上距慶元戊午嵗得六以乘嵗餘五日二十刻刻二十九分三十杪三十小分得三十一日四十五刻七十五分八十一杪八十小分益入前測戊午嵗三十九日九十二刻四十五分得七十一日三十八刻二十分八十一杪八十小分滿紀法六十去之餘一十一日三十八刻二十分八十一杪八十小分為所求甲子氣骨之數合問按氣骨者年冬至時距甲子日子正初刻後之日分也嵗餘者嵗實去六甲子之餘日分也斗分者嵗實去三百六十五日之餘分也此未知嵗實之法故先以前後兩氣骨相減餘數為實以積年為法除之嵗餘約五日餘紀日六十故實數內纍加六十日至啇得五日上而止則實數為積嵗餘之數以積年除之得嵗餘日分既得嵗餘以甲子積年六乘之得甲子積嵗餘與前測氣骨相加滿紀法去之餘即甲子氣骨也治厯推閏問開禧厯以嘉泰四年甲子嵗天正冬至為一十一日日辰乙亥四十四刻六十一分五十四杪十一月經朔一日日辰乙丑七十五刻五十五分六十二杪問閏骨閏率各幾何答曰閏骨九日六十九刻五分九十一杪不盡一百六十九分杪之一百二十一閏骨率十六萬三千七百七十一術曰以日法各通氣朔日刻分杪各為氣骨朔骨分其氣骨分如約率而一約盡者為可用或收棄餘分在一刻以下者亦可用然後與朔骨分相減餘為閏骨率以日法約之為閏骨䇿草曰置本厯曰法一萬六千九百先通冬至一十一日四十四刻六十一分五十四杪得一十九萬三千四百四十分二十六小分為實其歷約率係三千一百二十以約之得六十二可用其餘小分二十六乃棄之只用一十九萬三千四百四十為氣骨分次置朔一日七十五刻五十五分六十二杪以本厯日法一萬六千九百乘之得二萬九千六百六十八分九十九杪七十八小分將近一分故於氣骨內所棄二十六小分借二十二小分以補朔內收上得二萬九千六百六十九為朔然後以朔骨分減氣骨分餘有一十六萬三千七百七十一為閏骨率復以日法除之得閏骨䇿九日六十九刻五分九十一杪不盡一百二十一算直命之為一百六十九分杪之一百二十一合問按此題若置冬至日分內減經朔日分餘九日六十九刻五分九十二杪得閏骨䇿此原草僅多一百六十九分杪之四十八盡草中氣骨內棄小分二十六朔骨分內進二十二併之為一百六十九分杪之四十八其不徑相減而必用通分約分纍乘纍除者為向後推算用耳治厯演紀問開禧歷積年七百八十四萬八千一百八十三欲知推演之原調日法求朔餘朔率斗分嵗率嵗閏入元嵗入閏朔定骨閏泛骨閏縮紀率氣元率元閏元數及氣等率因率蔀率朔等數因數蔀數朔積年二十三事各幾何答曰日法一萬六千九百朔餘八千九百六十七朔率四十九萬九千六十七斗分四千一百八嵗率六百一十七萬二千六百八嵗閏一十八萬三千八百四入元嵗九千一百八十入閏四十七萬四千二百六十朔定骨二萬九千六百六十九閏泛骨一十六萬三千七百七十一閏縮一十八萬八千五百七十八紀率一百一萬四千氣元率一萬九千五百元閏三十七萬七千八百七十三元數四百二氣等率五十二因率一百四十四蔀率三百二十五朔等數一因數四十五萬七千九百九十九蔀數四十九萬九千六十七朔積年七百八十三萬九千積年七百八十四萬八千一百八術曰以厯法求之大衍入之調日法如何承天術用強弱母子互乘得數併之為朔餘以二十九日通日法增入朔餘為朔率又以日法乘前厯所測冬至氣刻分收棄末位為偶數得斗分與日法用大衍術入之求等數因率蔀率以紀乘等數為約率置所求氣定骨如約率而一得數以乘因率滿蔀率去之不滿以紀法乘之為入元嵗次置嵗日以日法通之併以斗定分為嵗率以十二月乘朔率減嵗率餘為嵗閏以嵗閏乘入元嵗滿朔率去之不滿為入閏與閏骨相減之得差或適足便以入元嵗為積年後術並不用或差在刻分法半數以下者亦以入元嵗為積年必在刻分法半數以上却以閏泛骨併朔率得數內減入閏餘與朔率求閏縮在朔率以下便為閏縮以上用朔率減之亦得以紀法乘日法為紀率以等數約之為氣元率以氣元乘嵗閏滿朔率去之不滿為元閏虗置一億減入元嵗餘為實元率除之得乘限乃以元閏與朔率用大衍入之求得等數因數蔀數以等約閏縮得數以因數乘之滿蔀數去之不滿在乘限以下以乘元率為朔積年併入元嵗為演紀積年又加成厯年今人相乘演積年其術如調日法求朔餘朔率立斗分嵗餘求氣骨朔骨閏骨及衍等數約率因率蔀率求入元嵗嵗閏入閏元率元閏已上皆同此術但其所以求朔積年之術乃以閏骨減入閏餘為之閏贏却與閏縮朔率列號甲乙丙丁四位除乘消減謂之方程乃求得元數以乘元率所得為之積年加入元嵗共為演紀嵗積年所謂方程正是大衍術今人少知非特置算繁多初無定法可傳甚是惑悮後學易失古人之術意故今術不言閏贏而曰入閏差者蓋本將來可用入元嵗便為積年之意故今止將元閏朔率二項以大衍先求等數因數蔀者仍倣前前求入元嵗之術理假閏骨如氣骨以等數為約數及求乘數蔀數以等約閏縮得因乘數滿蔀去之不滿在限下以乘元率便為朔積年亦加入元嵗共為演紀積年此術非惟止用乘除省便又且於自然中取見積年不惑不差矣新術敢不用閏贏而求者實知閏贏已存於入閏之中但求朔積年之竒分與閏縮等則自與入閏相合必滿朔率所去故也數理精微不易窺識窮年致志感於夢寐幸而得知謹不敢隱草曰本厯以何承天術調得一萬六千九百為日法係三百三十九強一十七弱先以強數三百三十九乘強子二十六得八千八百一十四於上次以弱數一十七乘弱子九得一百五十三併上共得八千九百六十七為朔餘次以日法通朔䇿二十九日得四十九萬一百增入朔餘得四十九萬九千六十七為朔率又以日法乘統天厯所測每嵗冬至周日下二十四刻三十一分得四千一百八分三十九杪為斗泛分驗八分既偶遂棄三十九杪只以四千一百八分為斗定分與日法以大衍術入之得五十二為等數一百四十四為因率三百二十五為蔀率以甲子六十為紀法乘等數得三千一百二十為約率却置本厯上課所用嘉泰甲子嵗氣骨一十一日四十四刻六十一分五十一杪以乘日法得一十九萬三千四百四十分二十六杪為氣泛骨欲滿約率三千一百二十而一故就近乃棄微杪只以一十九萬三千四百四十為氣定骨然後以約率三千一百二十除之得六十二以因率一百四十四乘之得八千九百二十八滿蔀率三百二十五去之不滿一百五十三以紀法六十乘之得九千一百八十年為入元嵗次置嵗三百六十五以日法乘之得六百一十六萬八千五百併斗定分四千一百八得六百一十七萬二千六百八為嵗率却以十二月乘朔率四十九萬九千六百七得五百九十八萬八千八百四率內減去此數餘一十八萬三千八百四為嵗閏以嵗閏乘入元嵗九千一百八十得一十億八千七百三十二萬七百二十滿朔率去之不滿四十七萬四千二百六十為入閏次置本厯所用嘉泰甲子嵗天正十一月朔一日七十五刻五十五分六十二杪以日法乘之得二萬九千六百六十八分九千九百七十八杪為朔泛骨就近收杪為一分共得二萬九千六百六十九為朔定骨數然後乃以朔定骨減氣骨一十九萬三千四百四十餘一十六萬三千七百七十一為閏泛骨置日法以二百歸除之得八十四半為半刻法次以入閏數內減去閏泛骨與入閏相課減之餘三十一萬四百八十九此是閏贏為差半刻法以上乃以閏泛骨併朔率共得六十六萬二千八百三十八以入閏四十七萬四千二百六十減之餘一十八萬八千五百七十八在朔率下便為閏縮次以紀䇿六十乘日法得一百一萬四千為紀率以等數五十二歸除紀率得一萬九千五百按即六十乘三百二數十五之數為一蔀年為氣元率以氣元率乘嵗閏一十八萬三千八百四得三十五億八千四百一十七萬八千滿朔率去之不滿三十七萬七千八百七十三為元閏次置一億按此數似虗設不過取一億之數為限耳此所求過限又將改率數以遷就之矣以入元嵗元千一百八十減之餘九千九百九十九萬八百二十為實以元率一萬九千五百為法除之得五千一二十七為乘元限數乃以元閏三十七萬七千八百七十三餘與朔率四十九萬九千六十七用大衍術求之得等數一因等四十五萬七千九百九十九蔀數四十九萬九千六十七然後以等數一約閏縮只得一十八萬八千五百七十八以因數四十五萬七千九百九十九乘之得八百六十三億六千八百五十三萬五千四百二十二滿蔀數四十九萬九千六百七十去之不滿四百二在乘元限數以下為可用以乘元率一萬九千五百得七百八十三萬九千年為數積年併入元嵗九千一百八十共得七百八十四萬八千一百八十為嘉泰四年甲子嵗積算本厯係於丁卯嵗進呈又加丁卯三年共為七百八十四萬八千一百八十三年為本厯積年合具繪圖如後按此術草內竒定相求有等數又有因數蔀數之異蓋等數即度盡定竒兩數之數因數為竒數之倍數任倍定竒二數相較但得一等數則竒之倍數即為因數蔀數者竒數最大之倍數也任倍竒定至兩邊相等無較數則竒數之倍數即謂之蔀數也等數甚小者因數不患其甚大有蔀數以限之也草中尚多訛舛正之於後按此題術草皆曰何承天調日法而宋書所載何承天法並無甚率且各用數亦與此不同今細按其草日法已有定數所調者朔䇿餘分也然從來朔䇿餘分皆以實測之朔䇿分嵗實分兩母子互乘相通即得並無所謂調法今所載強弱母子四數大約已有朔䇿餘分與日法分相約而得非别有所本乃故設曲折以為竒也試以朔餘分八千九百六十七分為第一條置日法分內減朔䇿餘分餘七千九百三十三為第二條以此二數數取之先置第一條減第二條餘一千零三十四為第三條七因第三條以減第二條餘六百九十五為第四條以第四條減第三條餘三百三十九為第五條二因第五條以減第四條餘一十七為第六條是第五條即強母數第六條即弱母數矣次用第五條第六條轉求第一條以取兩子數置第六條於上二因第五條加之得第五條者二第六條者一共六百九十五為第四條以第四條加第五條得第五條者三第六條者一共一千零三十四為第三條七因第三條以加第四條得第五條者二十三第六條者八共七千九百三十三為第二條以第二條加第三條得第五條者二十六第六條者九共八千九百六十七為第一條是第五條倍數即強子數第六條倍數即弱子數矣至算式中以日法取強母數者則又以第五條第六條再約而得者如以第五條為實第六條為法為法商之初商得十以法乘初商得一百七十為初商積減實餘一百六十九恰與百分日法分之一等故百除日法分為一數又三乘之得五百零七為實以四十九為法初商得十初商積為四百九十減實餘十七乃以商十乘十七得一百七十與前初商積等故加與前餘積等之百分日法分之一得三百三十九為五條之數名之曰強數也次以日法乘朔䇿日得數併朔餘為朔率斗分見偶則棄見竒則收為偶按此係棄分以下數不用也分為偶數即用其數分為竒數則杪微進一分併為偶數如無杪微即加一分又按算中用數以日法分一萬六千九百分為主斗分定為四千一百零八為偶數氣骨分亦定為偶數其各時刻分皆由日分比例而得故變時刻分為日分求之無不合按求入元嵗法用斗分與日法分求等率乘率蓋以六十年之嵗實積分與紀法分相約後以六十除紀法分得日法分為定以六十除嵗實積分得斗分為竒求得蔀數乘數皆與六十年之嵗實積分與紀法分所求者同惟等數則為六十之一故以六十乘之為乘分以約氣骨分然後以乘數乘之滿蔀數去之所得用數為六十年之周數故以六十乘之始為年數此立法之意也然以六十年為周數則六十年之間其氣骨數有合者則不可得故所得年數較以嵗實分紀分相求者為逺也按氣元一萬九千五百乃前蔀數三百二十五以六十乘之之數蓋求入元嵗用六十倍者故此仍用六十倍也又按此皆用六十年嵗實分求得之數與用一嵗實分求得之數同蓋因積年數為六十度盡之數若非六十度盡之數則得數必逺也今依其數另設一題以明其法設宋開禧厯日法一萬六千九百分嵗實分六百一十七萬二千六百零八法紀率分一百零一萬四千分朔率分四十九萬九千零六十七分嘉泰甲子嵗天正冬至距甲子日子正後十九萬三千四百四十分古名氣骨十一月朔距甲子日子正後二萬九千六百六十九分古名朔骨問距歷元甲子子正初刻冬至朔之積年幾何答曰七百八十四萬八千一百八十年法以紀率為紀定紀率除嵗率即嵗實分餘八萬八千六百零八分為紀竒依大衍術求至竒一百零三餘分六百二十四餘分可以度盡上數則命六百二十四為等數一百零三為乘數又求得竒一千六百二十五無餘分則命一千六百二十五為蔀數乃以等數約氣骨分得三百一十以乘數乘之得三萬一千九百三十滿蔀數去之餘一千零五十五即專以氣骨分求得距厯年之積年數也舊法以斗分嵗餘分四千一百零八為竒日法為定求得等數一紀法六十乘之以約氣骨得數以乘數乘之蔀數除之餘數又以六千乘之為積年名入元嵗其術未密詳前故所得積年為九千一百八十其數亦較逺也次以蔀數即嵗實紀法滿一會年數乘嵗率得一百億三千四十八萬八千滿朔率去之餘二十三萬九千四百三十四舊名氣元閏為朔竒朔率為朔定依前法求得等數一乘數六千二百五十一蔀率四十九萬九千零六十七次以前所得積年乘嵗率滿朔率去之餘二十七萬五千二百二十四為前朔距至前分數舊名入元閏以嘉泰甲子氣骨朔骨相減得十六萬三千七百七十一為後朔距至前分數舊名閏骨夫十一月朔常在冬至前退行今前逺後近是已退過一朔䇿則於後閏骨內加一朔䇿再減去入元閏餘三十八萬七千六百一十四為後朔前朔相差之分數舊名閏縮乃以等數約閏縮仍得原數以乘數乘之滿蔀數去之餘四千八百二十九為會數乃以一會年數即前蔀數乘之得七百八十四萬七千一百二十五為朔積年加入前積年得七百八十四萬八千一百八十為嘉泰甲子積年又法仍按本法求之先以嵗率紀率朔率求總等朔率不盡無總等各率朔即為各元數次連環求等朔元不盡嵗元等數等數為六百二十四留嵗元不約約紀元得一千六百二十五分為紀泛定嵗元朔元即為嵗泛定朔泛定次求續等紀泛定嵗泛定等數為十三約嵗泛定乘紀泛定得四十七萬四千八百一十六為嵗定二萬一千一百二十五為紀定朔泛定即朔定三定數連乘得五五八八五五五四六九六為衍母紀定朔定相乘得八一九八三八七五為嵗衍嵗定朔定相乘得二三六九六四九九六六七二為紀衍嵗定紀定相乘得一三四八八為朔衍置各衍數滿各定數去之餘嵗竒四七二九六三紀竒二四七朔竒二三九四三四次以各定各竒求各乘數得嵗乘數此題不用嵗乘數求之以備其數二四九六七紀乘數二八朔乘數六二五一以各乘數乘各衍數得各泛用數嵗泛用二一九八九三二七九四六二五紀泛用四七四一一九五六五四四一三三七六朔泛用六二七五八四八八併三泛用與衍母數等則泛用即為定用乃以氣骨乘紀定用得九一七一三六八八七一九六二八三四五五三四四置氣骨減去朔骨餘十六萬三千七百七十一以乘朔定用得一二六八五三六七六七一二四八併數得九二七四五四二三九六三三八