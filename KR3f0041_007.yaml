body:
  text: 數學九章卷七上宋秦九韶撰營建計作清臺問創築清臺一所正高一十二丈上廣五丈袤七丈下廣一十五丈袤一十七丈其袤當東西廣當南北秋程人日行六十里里法三百六十步钁土鍬土每工各二百尺築土每工九十尺每擔土壤一尺三寸往來一百六十步內四十步上下棚道築高至少半其棚道三當平道五至中半三當七至太半二當五踟蹰之間十加一載輸之間二十步定一返今甲乙丙三縣差夫甲縣附郭稅力一十三萬三千八百六十六乙縣去臺所一百二十里稅力二十三萬七千九百八十四丙縣去臺所一百八十里稅力三十一萬二千三百五十四俱以道里逺近稅力多少均科之臺下鋪石腳七層先用甎砌臺身次用甎疊砌轉道周圍五帶並濶六尺須令南北二平道東西三峻道相間始自臺之艮隅於東外道向南順升由巽隅以西左轉周回厯北復東再升東裏道至巽隅乃登臺頂其東裏道艮隅與北平道兩隅及西道乾隅之高皆以強半其西道坤隅與南道兩隅東外道異隅之高皆以五分之二峻道每級履高六寸其東裏道級數取弱半東外道級數取五分之二西道級數取強半石長五尺濶二尺厚五寸甎長一尺二寸濶六寸厚二寸五分欲知土積定一返步每工人到土及總用功各縣起夫甎石峻平道髙長級數踏蹤各幾何答曰土積一百五十四萬尺定一返二百步一十八分步之五按此條起共十一條數皆誤每工人到土一百四十尺七百二十一分尺之一百四十八總用工四萬五千六百八十六工甲縣差一萬七千一百三十二工乙縣差一萬五千二百二十九工丙縣差一萬三千三百二十五工石四千三百一十七片甎一百一十四萬二千二十四片東裏道峻艮隅高九丈巽隅高一十一丈九尺四寸級五十踏踏蹤二尺二寸九分東外道峻艮隅高六寸巽隅高四丈八尺級八十踏踏蹤二尺一寸五分西峻道坤隅高四丈八尺乾隅高九丈級七十踏踏蹤二尺一寸四分寸之九南平道高四丈八尺北平道九丈按右答數中惟第一條土積未二條南北平道高三數無誤餘數俱有誤處其所以不合之故具詳草後術曰以啇功求之均輸入之倍臺上袤加下袤乘上廣為寄倍下袤加上袤乘下廣併寄乘高為土率如六而一得堅積以築工尺為法除堅積得築工以穿率乘堅積為實以堅率乘钁鍬工尺半之為鍬法除實得钁鍬共工以壤率因堅積如堅率而一為壤積求負土者先列全分及等至高諸母子以母互乘諸子為寄左行以諸母相乘為寄母次列棚道全分及所當鮮母衍子以鮮母互乘衍子為左行以鮮母相乘以乘寄得數又以列位乘之為總母以左右兩行諸子對乘之併之為總子其總母求等約之為定母子以定子乘棚道為次以定母乘平道加次義以踟蹰之數身下加之又以載輸步乘定母併次為統數以定母除統得定一返步亦為列土法有分復通為法置程里通步乘擔土尺有步母則又以步母乘之為到實實如法而一得每工人到土亦為壤法以除壤積得負土工併前鍬築二工為總用工以各縣日程數約稅力各得力率副併為科法以共用工乘未併者各為科實實如法而一各得縣夫求甎者倍轉道濶遍加臺上下廣袤變名上下濶長以甎厚加臺高為臺直次列甎石長濶厚各相乘為甎石積法通廣袤如法乃倍上長加下長乘上濶為寄次倍下長加上長乘濶併寄共乘直得數減土率除如六而一為泛置南北道高子各乘臺高為實如各母而一得五道諸隅高以北道高減臺餘為上停高以南道高減北道高餘為中停高命南道高為下停高以履寸除諸高得級數以上長減下長餘半之為勾以勾乘南道高為實如臺高而一得底率以底率減下長餘為底股以外道級數約底股得外道踏蹤又以底率減底股餘為中股以勾乘中停高為實如臺高而一得中率以中率減中股餘為上股以西道級除上股得西道踏蹤以勾乘上停高為實如臺高而一得中率以中率減中股餘為上股以西道級除上股得西道踏級以勾乘上停高為實如臺高而一得上率以上率併中率共減上股餘為實如裏道級而一得裏道踏蹤次以道濶併下長為補以南北道高併臺高乘補為需次上廣減下廣餘為址以址乘南道高為實以臺高除之得數減下廣餘為南道長以南長併下廣乘南道高加需又以址乘北道高為實以臺高除之得數減下廣餘為北道長以北道長併下廣乘北道高又加需共乘半道濶得數併泛為共率以基腳層數乘石版厚為基高次倍道濶併下濶乘下長為基率次以下廣乘下袤減基率餘乘基高為石率以石率減共率餘為甎率以甎積法除甎率得甎數以石級積法除石率得石版數草曰倍上袤七丈得一十四加下袤一十七丈得三十四丈加上袤七丈得四十一乘下廣一十五丈得六百一十五併寄得七百七十乘高一十二丈得九千二百四十丈為土率以六除率一千五百四十丈以千尺通之按舊本誤為十八通之今改正為一百五十四萬尺堅積以築工九十尺除之得一萬七千一百一十一工九分工之一為築工次以穿率四因堅積得六百一十六萬尺為實以堅率三因钁鍬工二百尺得六百尺為法除實得一萬二百六十六工三分工之二為穿工次以壤率五因堅積得七百七十萬尺為壤積以三為母具圖如後乃以右行母互乘左行子左上得一十二副位得九次得六下得一十八乃變右行名為寄子以諸母相乘得一十八為寄母具圖如後次以棚道全分及所當鮮母衍子三當五及三當七并二當五乃以右行鮮母互乘左行衍子上得四十五副得四十二次得三十下得一十八為右行以鮮母相乘得一十八乃對寄左圖列之乃以左右兩行母子對乘之上得五百四十副得三百七十八次得一百八十下得三百二十四母得三百二十四今以平分術入之併四子得一千四百二十二為總子以列位四乘乘母三百二十四得一千二百九十六為總母乃以總母子求等得一十八俱約之總子得七十九為定子總母得七十二為定母以定子七十九乘棚道四十步得三千一百六十於次以棚道一四十步減往來一百六十步餘一百二十為平道以乘定七十二得八千六百四十加次共得一萬一千八百又以踟蹰十加一放身下加一得一萬二千九百八十仍於次又以載二十步乘定母七十二得一千四百四十併次得一萬四千四百二十為統數以定母七十二除統數得二百步不盡約為一十八分步之五為定一返步乃復通分內子得三千六百五為到法乃置程里六十以三百六十通之得二萬一千六百步乘擔上一尺三寸得二萬八千八十尺以到母一十八乘之得五十萬五千四百四十尺為到實實如法除得一百四十尺不盡七百四十與法求等得五約之為七百二十一分尺之一百四十八為到土復通分內子得一十萬一千八十八又以壤母三因得三十萬二千二百六十四尺為壤法次以到土母七百二十一乘壤積七百七十萬尺得五十五億五千一百七十萬尺為壤實實如法而一得一萬八千三百六工不盡一十四萬九千二百一十六與法求等得三十二俱約之為一萬八千三百六工九千四百七十七分工之四千六百六十三為擔土工次列前土工圖築一萬七千一百一十一工九分工之一及穿工一萬二百六十六工三分工之二各通分內子築率得一十五萬四千穿率得三萬八百擔率一億七千三百四十九萬六百二十五按術當以通率圖諸母互乘諸率令驗擔母九千四百七十七可用築母九約亦可用穿母三約故從省以築母九約擔母九千四百七十七得一千五十三為築率乘數又以穿母三約擔母九千四百七十七得三千一百五十九為穿率乘數各以乘數乘本率名曰就母圖乃以九千四百七十七變名曰就母先以築率一十五萬四千乘乘數一千五十三得一億六千二百一十六萬二千為築分次以穿率三萬八百乘乘率三千一百五十九得九千七百二十九萬七千二百為穿分就以擔率一億七千三百四十九萬六百二十五為擔分併三分共得四億三千二百九十四萬九千八百二十五為總工分實以就母九千四百七十七除之得四萬九千六百八十五工九千四百七十七分工之三千八十為總用功具圖如後置各縣日程約稅力得力率副併為科法工置甲縣力一十三萬三千八百六十六以一日程為之只得此為甲率又置乙縣力二十三萬七千九百八十四以二日約得一十一萬八千九百九十二為乙率又置丙縣力三十一萬二千三百五十四以三日約得一十萬四千一百一十八為內率列三求等得一萬四千八百七十四俱約之甲得九乙得八丙得七各為定率副併得二十四具圖如後乃以總分四億三千二百九十四萬九千八百二十五遍乘三縣定率為各實以就母九千四百七十七乘併率二十四為科法甲得三十八億九千六百五十四萬八千四百二十五乙得三十四億六千三百五十九萬八千六百丙得三十億三千六十四萬八千七百七十五各為實法得二十二萬七千四百四十八為科法除各實具圖如後乃以科法除各實甲得一萬七千一百三十一工不盡一十三萬六千七百三十七為甲縣工乙得一萬五千二百二十八不盡二萬四百五十六為乙縣工丙得一萬三千三百二十四不盡一十三萬一千六百二十三為丙縣工諸縣不盡皆輩為一工甲合科一萬七千一百三十二工乙合科一萬五千二百二十九工丙合科一萬三千三百二十五工按此以上所求擔土定一返數誤其到土工數及總用工數三縣合科工數皆誤蓋題言築臺至少半至中半至太半當自平地至三分之一三分之一至二分之一二分之一至三分之二三分之二至臺頂共四段其分數自下而上逐層數應取兩分數之較草中所列諸分子下設一數上即列三分數其段數既不確又即用各分子全數故求得棚道七十二僅當平道七十九與題中所言二當五三當七當五之數顯然不合矣今推步改正於後法先求分子較以三之一為第一段分數以三之一與二之一分母對乘得六分母互乘分子三之一得六之二二之一得六之三相減餘六之一得第二段分數以二之一與三之二分母對乘得六分母互乘分子二之一得三三之二得四相減餘六之一為第三段分數以三分之二與全臺三分之三相減餘三之一為第四段分數然後列四段母數於右子數於左以各分母連乘又互乘分子得三百二十四為總分母第一段一百零八第二段五十四第三段五十四第四段一百零八為各分子求等數得五十四遍約之總母得六分子第一段得二第二段得一第三段得一第四段得二為各段分母子次列棚道一當平道一為下第一段三當五為第二段三當七為第三段二當五為第四段以棚道數為分母以平道數為分子分母連乘又互乘分子得一十八為總分母第一段得一十八第二段得三十第三段得四十二第四段得四十五為各分子求等數得三遍約之總母得六分子第一段得六第二段得十第三段得一十四第四段得一十五次列前後兩分母分子已約之數各對乘得總母三十六分子第一段得一十二第二段得一十第三段得一十四第四段得三十併諸子得六十六為總子又求等得六各約之得定母六為棚道數定子一十一為平道數此即合全臺數總計凡棚道六當平道一十一也乃以定子一十一乘棚道四十步得四百四十步為次以棚道四十步減一百六十步餘一百二十步為平道以定母六乘之得七百二十步加次共得一千一百六十步以踟蹰加一於身得一千二百七十六步又以載輸二十步乘定母六得一百二十步