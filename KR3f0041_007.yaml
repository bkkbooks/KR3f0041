各合賦役埂長幾何里法三百六十步築曰甲先到人築二千六百二十八步計七里一百八步丙先到人築一千六百四十二步半計四里二百二步半術曰以啇功求之置里通步作尺為積率併諸縣人數為均法法與率可約者約之以科率各乘先到人為實皆法而一各得先築里步為先賦埂長續到人合賦功凖此求之草曰置三十六里五分以里法三百六十步通之得一萬三千一百四十步又以步五尺乘之得六萬五千七百尺為長率併甲乙丙丁縣四縣合科人得七千七百二十為均法合法與率可求等得二十以約之率得三千二百八十五法得三百八十六以長率三千二百八十五尺乘甲縣先到人一千五百四十四夫得五百七萬二千四十人為甲實實如法三百八十六而一得一萬三千一百四十尺以步五尺約之得二千六百二十八步為甲縣先到人所築積步又以長率三千二百八十五乘丙縣先到人九百六十五夫得三百一十七萬二十五尺為丙實實如法三百八十六而一得八千二百一十二尺五寸以步法五尺約之得一千六百四十二步半為丙縣先到人所築步計浚河渠問開通運河就土築堤令面廣六丈底廣四丈上流深八尺下流深一丈六尺長四十八里其堤下廣二丈四尺上廣一丈八尺與河等未知髙以墟四堅三為率秋程入功每名自開運築墟堅共積常六十尺築堤至半為棚道取土上下工減五分之一限一月畢欲知河積及堤積尺共用工并日役工數及堤髙各幾何答曰河積六千二百二十萬八千尺堤積四千六百六十五萬六千尺堤髙二丈一尺七分尺之三共用工二十四萬四千九百四十四日役工八千一百六十四五分工之四按共用工日用工二數俱誤若以共工分工積則每工各得四百四十四尺餘其不合明矣辨詳草後術曰以啇功求之併河上下廣于上併河上下流深乘之又以長乘為實以四為法除得河積以堅率乘河積為實以墟率為法除得堤積併堤上下廣乘堤長半之為法除堤積得堤髙併河堤二積以棚道母半之副置以棚道減工子乘之以棚道減工母除之得數以併其副共為寄以子減母餘乘常尺為增子以母乘常尺為增分併增分增子乘寄倍為用工實以增分乘增子又乘限月日為法除實得用人工數草曰置河上廣六丈併底廣四丈通之折半得五十尺于上又置河上流深八尺併下流深一丈六尺併之折半得一十二尺以乘上數得六百尺為次置長四十八里以尺里法二千一百六十通之得一十萬三千六百八十尺得堤河長以乘次得六千二百二十萬八千尺為河積以堅率三因河積得一億八千六百六十二萬四千尺為實以穿率四為法除之得四千六百六十五萬六千尺為堤積置上廣一丈八尺下廣二丈四尺併之為四十二尺以乘堤長一十萬三千六百八十尺得四百三十五萬四千五百六十尺以半之得二百一十七萬七千二百八十尺為法除堤積得二十一尺為堤髙不盡九十三萬三千一百二十與法求等得三十一萬一千四十俱約之為七分尺之三次置河積六千二百二十萬八十尺併堤積四千六百六十五萬六千尺得一億八百八十六萬四千尺以棚道築至半是二除之得五千四百四十三萬二千尺副之先以減工之子一按此以下法皆誤乘之只得此數為實乃後以減工母五為法除之得一千八十八萬六千四百尺併副五千四百四十三萬二千尺共得六千五百三十一萬八千四百尺為寄以折減工五分之一以子一減母五餘四以乘常尺六十得二百四十尺為增子以母五乘常尺六十得三百尺為增分以二增併之得五百四十乘寄得三百五十二億七千一百九十三萬六千尺以半之得一百七十億三千五百九十六萬八千尺為用工實按此下又有脫誤得八千一百六十四為每日人工數不盡一百七十二萬八千與法求等四十三萬二千俱約之為五分工之四得每日用工八千一百六十四工五分工之四復通分內子得四萬七百二十四以三十日乘之得一百二十二萬一千七百二十為實仍以母五約之得二十四萬四千三百四十四工為共用工合問按草中求堤積至密至捷誠數家之要法也至減工子母乘除而下則法與數皆有誤焉蓋題言棚道減工五分之一是棚道為平道四分之五也四為分母五為分子應以分子五乘上下積五千四百四十三萬二千尺得二億七千二百一十六萬尺以分母四乘副半積得二億一千七百七十二萬八千尺併之得四億八千九百八十八萬八千尺為實以分母四乘常尺六十得二百四十尺為法除實得二百零四萬一千二百工為共工數以一月三十日除之得六萬八千零四十工為每日工數或置分子五乘上半積之得數于上又併分子母得九乘常尺六十得五百四十尺乘上數得一千四百六十九億六千六百四十萬尺為實以分母四乘六十尺得二百四十尺為增母以分子五乘六十尺得三百尺為增子增母子相乘得七萬二千尺為法除實得共工數亦與前同此特不用副半積數然不若前法之省草中以五為分母以一為分子母子既以顛倒而又以餘分為分子後雖易一為四而母子之名未正故其中纍乘纍除之數漫無可據而所差甚逺也圍田先計問有草蕩一所廣三里縱一百一十八里夏日水深二尺五寸與溪靣等平溪闊一十三丈流長一百三十五里入湖冬日水深一尺欲趁此時圍裡成田于蕩中順縱開大港一條磬折通溪順廣開小港二十四條其深同其小港闊比大港六分之一大港深比大港靣三分之一大小港底各不及靣一尺取土為埂髙一丈上廣六尺下廣一丈二尺蕩縱當溪其岸髙廣倍其埂數上下流各立斗門一所須令田內止容水八寸遏餘水復溪入湖里法三百六十步步法五尺欲知田積埂土積大小港底靣深闊冬夏積水田港容水過水溪靣泛髙幾何按題意掘土為港即以其土四邉為埂當溪者髙闊倍之餘三邉等語皆未詳答曰田積一千八百六十六頃八畝二十四步埂土積九百六十五億五千二百萬立方寸大港靣闊六丈一尺七寸底闊六丈七寸深六尺八寸小港靣闊一丈二寸六分寸之五底闊九尺二寸六分寸之五深六尺八寸夏積水二萬八千六百七十四億立方寸冬積水一萬一千四百六十九億六千萬立方寸田容水九千七十二億六千九百一十二萬立方寸港容水九百六十五億五千二百萬立方寸港上者在田內遏出水一萬八千六百三十五億七千八百八十八萬立方寸溪靣泛髙一尺三寸一十三萬一千六百二十五分寸之一萬四千四百一十一按題言大港深比大港靣三分之一答數中大港靣六丈一尺七寸深六尺八寸是九之一不足而非三之一矣此數與題不合以下俱誤草曰先通步法為五十寸通三百六十步得一萬八千寸為里法以里法通蕩廣三里得五萬四千為廣率又通蕩縱一百一十八里得二百一十二萬四千為縱率以縱併廣率得二百一十七萬八千為和以縱率乘廣率得一千一百四十六億九千六百萬為寄三因縱率二百一十二萬四千得六百三十七萬二千于上倍和二百一十七萬八千得四百三十五萬六千加上得一千七十二萬八千為假次以埂上廣六尺併下廣一丈二尺得一十八尺乘半埂髙五十寸得九千寸又乘假一千七十二萬八千得九百六十五億五千二百萬為土積亦為港容水以港闊母六因土積得五千七百九十三億一千二百萬為實以闊子一乘小港二十四條又乘廣率五萬四千得一百二十九萬六千為泛以闊母六因縱率二百一十二萬四千得一千二百七十四萬四千併泛得一千四百四萬為隅開平方按大港闊六分差一尺小港闊一分差一尺故此法不免有差得二百三寸不盡七百三十七萬六千四百收為所得一寸乃得二百四寸為堢以深子一乘之以深母三除得六尺八寸為大小港等深次以深母三因堢二百四寸得六百一十二寸為實如深子一而一得六丈一尺二寸為中以不及一尺半之得五寸加中得六丈一尺七寸按如此則不成分數矣為大港靣闊如母六而一得一丈二寸六分寸之五為小港靣以不及一尺各減大小港靣得六丈七寸為大港底得九尺二寸六分寸之五為小港底次以埂下廣一丈二尺乘假一千七十二萬八千寸得一十二億八千七百三十六萬為址以大港靣六丈一尺七寸乘隅一千四百四萬得八十六億六千二百六十八萬為實以闊母六除之得一十四億四千三百七十八萬為港平以併址一千二億八千七百三十六萬得二十七億三千一百一十四萬減寄一千一百四十六億九千六百萬餘一千一百一十九億六千四百八十六萬為田積寸以步法五十寸自乘得二千五百除積寸得四千四百七十八萬五千九百四十四步為田積步以畝法二百四十步約之得一千八百六十六頃八畝不盡二十四步為田積以址一十二億八千七百三十六萬減寄一千一百四十六億九千六百萬餘一千一百三十四億八百六十四萬乘令容水八寸得九千七十二億六千九百一十二萬為田容水次以夏水深二尺五寸乘寄一千一百四十六億九千六百萬得二萬八千六百七十四億寸為夏積水次以冬水深一尺乘寄得一萬一千四百六十九億六千萬寸為冬積水乃以田容水九千七十二億六千九百一十二萬併港容水九百六十五億五千二百萬得一萬三十八億二千一百一十二萬減夏積水二萬八千六百七十四億寸餘一萬八千六百三十五億七千八百八十八萬為遏出水當以八節乘之嵗日三百六十除之為實今從省先以八節約嵗日三百六十得四十五為率次以里法一萬八千寸通流長一百三十五里得二百四十三萬又乘溪闊一十三丈得三十一億五千九百萬以乘除率四十五得一千四百二十一億五千五百萬為法除遏出水一萬八千六百三十五億七千八百八十八萬得一尺三寸為溪靣泛髙不盡一百五十五億六千三百八十八萬與法一千四百二十一億五千五百萬求等得一百八萬俱以約之為一十三萬一千六百二十五分寸之一萬四千四百一十一為泛髙寸下分母之數合問按草中自求大小港闊深以後既與題問不合且法多疏漏今以立天元一術推明求大小港闊深之法于後至田積水積等不過冪積體積相較初無深義可無論也法立天元一為一分六因之得六元為大港闊減十寸得六元少十寸為大港底闊併之得十二元少十寸以半深一元乘之得十二平方少十元以縱率因之得二千五百四十八萬八千平方少二千一百二十四萬元又以天元一為小港闊減十寸得一元少十分為小港底闊併之得二元少十寸以半深一元因之得二平方少十元以二十四廣率因之得二百五十九萬二千平方少一千二百九十六萬元併二數得二千八百零八萬平方少三千四百二十萬元與土埂共積等而邉各以一萬除之得二十八百零八平方少三千四百二十元與九百六十五萬五千二百寸等三數又求等得三十六遍約之得七十八平方少九十五元與二十六萬八千二百寸等乃以寸數為實以元數為縱以方數為隅開帶縱平方得方邉為一分數五尺九寸二五五三二九即小港闊減一尺得四尺九寸二五五三二九為小港底闊六因一分數得三丈五尺五寸五三一九七三為大港闊減一尺得三丈四尺五寸五三一九七三為大港底闊二因一分數得一丈一尺八寸五一六五八為同深以此轉求共港容水數乃與共土埂原積數相合數學九章卷七下
