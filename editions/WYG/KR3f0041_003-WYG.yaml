body:
  text: 数學九章卷三上宋張九韶撰田域按此卷以方圓斜直冪積相求即方田少廣勾股諸法而術中累乘累除錯綜變換與常法迴然其本則出於立天元一法今擇其難解者以立天元一法明之皆不攻自破矣古池推元問有方中古圓池堙圮北餘一角從外方隔斜至内圓邊七尺六寸欲就古跡修之欲求圓方方斜各幾何荅曰池圓徑三丈六尺六寸四百二十九分寸之四百一十二方面三丈六尺六寸四百二十九分寸之四百一十二方斜五丈一尺八寸四百二十九分寸之四百一十二術曰以少廣求之投胎術按即益積之名入之斜自乘倍之為實倍斜為益方以半寸為從隅開投胎平方得徑又為方面以隅併之共為方斜草曰以斜七十六寸自乘得五千七百七十六倍之得一萬一千五百五十二寸為實倍斜七十六寸得一百五十二為益方按有長方積先求長其長濶較名益方以半寸為從隅開平方置實一萬一千五百五十二於上益方一百五十二於中從隅五分於下於下起歩約得百古池圖乃於實上商置三百寸方再進為一萬五千二百按再進者以百乘之也隅五進為五千按隅五分以百再乗得五千以商隅相生得一萬五千為正方以消益方一萬五千二百其益方餘二百以與商相生得六百投入實得一萬二千一百五十二又商隅相生又得正方一萬五千内消負方二百訖餘一萬四千八百為從方按倍正方減益方之數一退為一千四百八十以隅再退為五十乃于上商之次續商置六十寸與隅相生増入正方得一千七百八十乃命續商除實訖實餘一千四百七十四次以商生隅増又正方為二千八十方一退為二百八隅再退為五分乃於續商之次又商置六寸與隅相生増入正方為二百一十一乃命商除實訖實不盡二百六寸不開為分子乃以商生隅増入正方又併隅共得二百一十四寸五分為分母以分母分子求等得五分為等數皆以五分約其分母分子之數為四百二十九分寸之四百一千二通命之得池圓徑及方面皆三丈六尺六寸四百二十九分寸之四百一十二又倍隅斜七尺六十得一丈五尺二寸併徑三丈六尺六寸共得五丈一尺八寸四百二十九分寸之四百一十二為方斜按此術以立天元一法明之法立天元一為池徑即方邊自之得一平方為方冪倍之得二平方為斜冪寄左次倍斜至歩加天元一得一百五十二寸多一元為方斜自之得二萬三千一百零四寸多三百零四元多一平方亦為斜冪與左相消雨邊各減一平方得二萬三千一百零四寸多三百零四元與一平方等寸數為實元數為較或兩邊各半之得一萬一千五百五十二寸多一百五十二元多半平方與一平方等寸數為實元數半方數共為較術中所用葢次數也然不如前數之便至開方法即有長方積有長濶軗帶縱先求長之法也尖田求積問有兩尖田一叚其尖長不等兩大斜三十九歩兩小斜二十五歩中廣三十歩欲知其積幾何荅曰曰積八百四十歩術曰以少廣求之翻法入之置半廣自乘為半冪與小斜冪相減相乘為小率以半冪與大斜冪相減相乘為大率以二率相減餘自乘為實併二率倍之為從上亷以一為益隅開翻法三乘方得積一位開盡者不用翻法草曰置廣三十歩以半之得一十五自乘得二百二十五為半冪以小斜二十五歩自乘得六百二十五為小斜冪與半冪相減餘四百與半冪二百二十五相乘得九萬歩為小率置大斜三十九歩自乘得一千五百二十一為大斜冪與半冪二百二十五相减餘一千二百九十六與半冪二百二十五相乘得二十九萬一千六百為大率以小率九萬減大率餘二十萬一千六百自乘得四百六億四千二百五十六萬為實以小率九萬併大率二十九萬一千六百得三十八萬一千六百倍之得七十六萬三千二百為從上亷按從上亷平方和數也以一為益隅開玲瓏翻法三乘方歩法乃以從亷超一位益隅超三位約商得十今再超進乃商置百其從上亷為七十六億三千二百萬其益隅為一億約實置商八百為定商以商生益隅得八億為益下亷又以商生下亷得六十四億為益上亷與從上亷七十六億三千二百萬相消從上亷餘十二億三千二百萬又與商相生得九十八億五千六百萬為從方又與商相生得七百八十八億四千八百萬為正積與元實四百六億四千二百五十六萬相消正積餘三百八十二億五百四十四萬為正實又以益隅一億與商相生得八億増入益下亷為一十六億又以益下亷與商相生得一百二十八億為益上亷乃以益上亷與從上亷一十二億三千二百萬相消餘一百一十五億六千八百萬為益上亷又與商相生得九百二十五億四千四百萬為益方與從方九十八億五千六百萬相消益餘八百二十六億八千八百萬為益方又以商生益隅一億得八億増入益下亷得二十四億又以商相生得一百九十二億入益上亷得三百七億六千八百萬為益上亷又以商生益隅一億得八億入益下亷得三十二億畢其益方一退為八十二億六千八百八十萬益上亷再退得三億七百六十八萬益十亷三退得三百二十萬益隅四退為一萬畢乃約正實續置置四十歩與益隅一萬相生得四萬入益下亷為三百二十四萬又與商相生得一千二百九十六萬入益上亷内為三億二千六十四萬又與商相生得一十二億八千二百五十六萬入從方内為九十五億五千一百三十六萬乃命上續啇四十除實適盡所得八百四十歩為田積今列求率開方圖於後按此術以立天元一法明之法立天元一為尖積即大小兩三角積和自之得一平方為和自乘以半廣冪減大斜冪與餘積相乘得二十九萬一千六百歩為大三角積自乘以坐廣冪減小斜冪與餘數相乘得九萬歩為小三角積自乘二自乘數併而倍之内減去和自乘得七十六萬三千二百歩少一平方為較自乘與和自乘再相乘得七十六萬三千二百平方少一三乘方寄左次以大小兩三角積相減餘二十萬零一千六百歩為和較相乘數自之得四百零六億四千二百五十六萬歩與左相等則後歩數為實前平方數為從上亷三乘方數即益隅與草中所取之數悉合又按此苦以小率九萬歩開平方得三百歩即小三角積以大率二十九萬一千六百歩開平方得五百四十歩即大三角積併之得八百四十歩即尖積其法甚易然必如此費算者殆欲用立天元一法不求分積即得所問之總積也正負開三乘方圖術曰商常為正實常為負從常為正益常已上係開三乘方翻法圖後篇效此三斜求積問沙田一叚有三斜其小斜一十三里中斜一十四里大斜一十五里里法三百歩欲知為田幾何荅曰田積三百一十五頃術曰以少廣求之以小斜冪併大斜冪減中斜冪餘半之自乘于上以小斜冪乘大斜冪減上餘四約之為實一為從隅開平方得積草曰以斜一十三里自乘得一百六十九里為小斜冪以大斜一十五里自乘得二百二十五里為大斜冪併小斜冪得三百九十四里於上以中斜一十四里自乘得一百九十六里為中斜冪減上餘一百九十八里以半之得九十九里自乘得九千八百一里於上以小斜冪一百六十九乘大斜冪二百二十五得三萬八千二十五減上餘二萬八千二百二十四以四約之得七千五十六里為實以為一隅開平方以隅超歩為一百乃於實上商置八十以商生隅得八百為從方乃命上商除實餘六百五十六又以商生隅入方得數退一位為一百六十隅退二位為一乃於實上續商四里生隅入從方内得一百六十四乃命續商除實適盡所得八十四里為田積其形長八十四廣一里以里法三百歩自乘得九萬歩乘八十四里得七百五十六萬歩以畝法二百四十除之得三萬一千五百畆又以頃法一百畆約之得三百一十五頃按此術以立天元一法明之法立天元一為三角積倍之得二元自之得四平方為中長冪乘底冪以大斜為底寄之又以小斜冪與大斜冪相加内減中斜冪得一百九十八里半之得九十九里為小分底與底相乘長冪自之得九千八百零一里為小分底冪乘底冪之數又以小斜冪大斜冪相乘得三萬八千零二十五里為小分底冪乘底冪中長冪乘底冪各一内減小分底冪乘底冪之數餘二萬八千二百二十四里為中長冪乘底冪之數與寄數等兩邊各以四約之得七千零五十六里與一平方等里數為實方數即從隅也從二題同此斜蕩求積問有蕩一所正北濶一十七里自南尖穿徑中長二十四里東南斜二十里東北斜一十五里西斜二十六里欲知畆積幾何荅曰蕩積一千九百一十一頃六十畆術曰以少廣求之置中長乘北濶半之為寄以中長冪減西斜冪餘為實以一為隅開平方得數減北濶餘自乘併中長冪共為内率以小斜冪併率减中斜冪餘半之自乘於上以小斜冪乘率減上餘四約之為實以一為隅開平方得數加寄共為蕩積草曰以中長二十四里乘北濶一十七里得四百八乃半之得二百四里為寄以中長自乘得五百七十六為長冪以西斜二十六里自乘得六百七十六為大斜冪以減長冪餘一百里為實開平方得一十里以減北濶數一十七里餘七里自乘得四十九里併長冪五百七十六得六百二十五為内率次置東小斜一十五里自乘得二百二十五為小斜冪又置東南中斜二十里自乘得四百為中冪却以小斜冪併率得八百五十以減中冪四百餘四百五十乃半之得二百二十五自乘得五萬六百二十五里于上又以小斜冪二百二十五乘率六百二十五得一十四萬六百二十五減上餘九萬里以四約得二萬二千五百為實開平方得一百五十併寄二百四里得三百五十四里為泛以里法三百六十自乘得一十二萬九千六百歩乘泛得四千五百八十七萬八千四百歩以畆法二百四十歩約之得一千九百一十一頃六十畆為蕩積計地容民問沙洲一叚形如棹力廣一千九百二十歩從三十六百歩大斜二千五百歩小斜一千八百二十歩以安集民每户給一十五畆欲知地積容民幾何荅曰池積一百四十九頃九十五畆容民九百九十九戸餘地一十畆術曰以少廣求之置廣乘長半之為寄以廣冪併從冪為中冪按實大斜冪以小斜冪併中冪減大斜冪按實中斜冪餘半之自乘于上以小斜冪棄中冪減上餘以四約之為實以一為隅開平方得數加寄共為積以每户給數除積得容民戸數草曰置廣一千九百二十歩乘從三千六百歩得六百九十一萬二千歩乃半之得三百四十五萬六千歩為寄以廣自乘得三百六十八萬六千四百歩為廣冪又以從自乘得一千二百九十六萬步為從冪併廣冪得一千六百六十四萬六千四百步為中冪次以小斜一千八百二十歩自乘得三百三十一萬二千四百歩為小斜冪又以大斜二千五百歩自乘得六百二十五萬歩為大斜冪却以小􅀈冪併中冪得一千九百九十五萬八千八百歩以大斜冪減之餘一千三百七十萬八千八百歩乃半之得六百八十五萬四千四百歩自乘得四十六萬九千八百二十七億九千九百三十六萬歩於上次以小斜冪乘中冪得五十五萬一千三百九十五億三千五百三十六萬歩減上餘八萬一千五百六十七億三千六百萬為實以四約之得二萬三百九十一億八千四百萬為實以一為隅開平方得一十四萬二千八百歩併寄三百四十五萬六千歩共得三百五十九萬八千八百歩以畆法二百四十歩除之得一萬四千九百九十五畆次以頃法一百畆約之為一百四十九頃九十五畆為地積又為實以每户所給一十五畆為法除實得九百九十九户不盡一十畆不及一戸所給數以為餘地一十畆蕉田求積問蕉葉田一叚中長五百七十六歩中廣三十四歩不知其周求積畆合幾何荅曰田積四十五畆一角按六十歩為一角葢四分畆之一也十一歩六萬三千七十分歩之五千二百一十三術曰以長併廣再自乗又十乘之為實半廣半長各自乘所得相減餘為從方一為從隅開平方半之得積草曰以長五百七十六歩併廣三十四歩得六百一十兩度自乘按即自乘再乘得二億二千六百九十八萬一千歩進一位即是以十乘之得二十二億六千九百八十一萬歩定得此數以為實置長五百七十六以半之得二百八十八自乘得八萬二千九百四十四於上又置廣三十四歩以半之得一十七自乘得二百八十九減上餘八萬二千六百五十五為從方以一為從隅開平方得二萬一千七百四十二歩不盡一萬四百二十六歩以商生隅入方又併隅算共得一十二萬六千一百四十為母與不盡及開方田積數皆半之田積定得一萬八百七十一步六萬三千七十分歩之五千二百一十三以畆法二百四十約之得四十五畆一角一十一歩六萬三千七十分歩之五千二百一十三按此術以長與廣相加自乘再乘又以十乘之為長方積以半長自乘半廣自乘相減為長濶較求得闊折半為田積非法也此題中廣甚小故得數較古法多七百餘較密法少二千七百餘若設長為七百零七廣為二百九十三亦以此法求之長廣相加自之再之又十乘之得一百億為實半長半廣各自之相減得十萬零三千五百為長闊較求得闊折半得三萬零四百二十六歩餘為田積依宻法求之實十四萬四千九百餘歩所差甚逺其術之不合顯然矣葢數必三乘而後可以平方求之今再乘之後僅以十進之宜其不可用也漂田堆積問三斜田被水衝去一隅而成四不等直田之狀元中斜一十六步如多長水直五歩如少濶殘小斜一十三歩如弦殘大斜二十歩如元中斜之弦横量徑一十二歩如殘田之廣又如元中斜之勾亦是水直之股欲求元積殘積水積元大斜元中斜二水斜各幾何荅曰元積一百三十八歩一十一分歩之八水積一十二歩一十一分歩一八按應一十三歩一十一分歩之七殘積一百二十六歩元大斜二十九歩一十一分歩之一元小斜一十八歩一十一分歩之一按應一十一分歩之十水大斜九歩一十一分歩之一水小斜五歩一十一分歩之一按應一十一分歩之一術曰以少廣求之連枝入之又勾股入之置水直減中斜餘為法以中斜乘大殘為大斜實以法除實得元大殘以殘大斜減之餘為水大斜以法乘徑又自之為小斜隅以水直冪併徑冪為弦冪又乘徑冪又乘中斜冪為小斜實與隅可約約之閉連枝平方得元小斜以殘小斜減之餘為水小斜以水直乘之為水實倍水小母為法除之得水積按此處法踈以水直併中斜乘徑為實以二為法除之得殘積以殘積併水積共為元積分者通之重有者重通之草曰以水直五減中斜一十六餘一十一為法以中斜一十六乘大殘二十得三百二十為大斜實以法除之得二十九歩一十一分歩之一為元大斜内減殘大斜二十歩餘九歩一十一分歩之一為水大斜以法一十一乘徑一十二按乘徑可省得一百三十二自之得一萬七十四百二十四為小斜隅以水直五自乘得二十五為水直冪以徑一十二自之得一百四十四為徑冪併水直冪得一百六十九為弦冪以乘徑冪按此乘徑冪亦可省葢以此乘復以此除徒為多筭耳一百四十四得二萬四千三百三十六於上又以中斜一十六自乘得二百五十六為中斜冪以乘上得六百二十三萬一十六為小斜實開平方與隅求等得一百四十四俱約之實得四萬三千二百六十四隅得一百二十一開方不盡以連枝術入之用隅一百二十一乘實四萬三千二百六十四得五百二十三萬四千九百四十四為定實以一為定隅開平方得二千二百八十八為實以約隅一百二十一除之得一十八歩不盡一百一十一按一百一十整與法一百二十一俱以一十一約之得一十一分歩之十為元小斜減殘小斜一十三歩餘五歩一十一分歩之一按十訛一故下數誤為水小斜通歩内子得五十六以水直五歩乘之得二百八十為水實倍水小母一十一得二十二為法除之得一十二歩不盡一十六與法俱以二約之為一十二歩一十一分歩之八按應一十二歩一十一分步之七水積置中斜一十六併水直五得二十一乗徑一十二得二百五十二以半之得一百二十六為殘積以水併積共得一百三十八歩一十一分歩之八為元積按應一百三十九步一十一分步之七數學九章卷三上欽定四庫全書數學九章卷三下宋秦九韶撰田域環田三積問環田大小圓田共三段環田外周三十步虗徑八步大圓田徑一十步小圓田周三十步欲知三田積及環田周通實徑大圓周小圓徑各㡬何答曰環田積二十步二百三十六萬二千二百五十六分步之一百二十九萬八千二十五通徑九步一十九分步之九實徑一步一十九分步之九内周二十五步一十七分步之五大圓田積七十九步五十三分步之三周三十一步二十一分步之十三小圓田積七十一步二百八十六分步之四十三徑九步一十九分步之九術曰以方田及少廣率變求之各置圓環徑自乗為冪進位為實以一為隅開平方得周各置環圓周自乗為冪退位為實以一為隅開平方得徑以周冪或徑冪乗各實以一十六約之為實以一為隅開平方得圓積置環周冪乘徑實十六約之為大率置虚徑冪乗内周實十六約之為小率以二率相減之餘以自乗為實併二率倍之為從上亷一為益隅開三乗方得環積置環周自乗退位為實一為隅開平方得通徑以虚徑減通徑餘為實徑其有開不盡者約而命之草曰置大圓徑一十步自乗得一百為徑冪進位得一千為實以一為隅開平方得三十一步不盡三十九為分子乃以隅生方又益隅共得六十三為分母以分子與母求等得三俱以三約之母子得二十一分步之一十三為大圓周三十一步二十一分步之一十三次以徑冪一百乗前實一千得一十萬以十六約之得六千二百五十為實以一為隅開平方得七十九步不盡九為分子乃以隅生方又增隅得一百五十九為分母以分子母求等得三俱以三約母子得五十三分步之三為大圓積七十九步五十三分步之三次置小圓田周三十步自乗得九百為周冪退位得九十為徑實以一為隅開平方得九步不盡九以隅生方又益隅得一十九步之九為小圓徑九步一十九分步之九次以周冪九百乗前實九十得八萬一千以十六約之得五千六十二步五分為實以一為隅開平方得七十一步有不盡數二十一步五分為子以隅生方又益隅得一百四十三為分母以分子母求等得五分俱約之得二百八十六分步之四十三為積次置環田周三十步自乗得九百為周冪退位得九十為實以一為隅開平方得九步不盡九為分子以隅生方併隅得一十九為分母直命之為環田通徑九步一十九分步之九次以環周冪九百乗環實九十得八萬一千以十六約之得五千六十二步五分為大率次置環田虗徑八步自乗得六十四為虗冪進位得六百四十為實以一為隅開平方得二十五步不盡一十五為分子以隅生方又併隅得五十一為分母與子求等得三俱約之得一十七分步之五為環田内周二十五步一十七分步之五次以虗冪六十四乗周實六百四十得四萬九百六十以十六約之得二千五百六十為小率以小率減大率餘二千五百二步五分自乗得六百二十六萬二千五百六步二分五釐為實以大小二率併之得七千六百二十二步五分倍之得一萬五千二百四十五為從上亷以一為益隅開玲瓏三乗方得二十步不盡三十二萬四千五百六步二分五釐為分子續啇無數乃以益隅一益下亷八十併之得八十一為減母次以從上亷一萬二千八百四十五併從方五十七萬七千八百得五十九萬六百四十五以母八十一減之餘五十九萬五百六十四為分母以分子求等得二分五釐俱約之得二百三十六萬二千二百五十六分步之一百二十九萬八千二十五為環田積二十步二百三十六萬二千二百五十六分步之一百二十九萬八千二十五次置環田通徑九步一十九分步之九以虚徑八步減之餘一步一十九分步之九為環田實徑合問按周徑相求以進位退位為實者蓋以徑一周三有竒徑一自之仍得一周自之略與十等故徑冪升一位為周冪周冪降一位為徑冪以省算亦法之巧者其徑求周較宻率約大一百五十七分之一周求徑約小一百五十九分之一然較古率則已宻矣其周冪徑冪相乗十六約之開平方得圓積者蓋周徑相乗四歸得圓積徑自乗為方積故四歸亦展為自乗十六之數約之得四分徑之冪乗周冪之數故開方得圓積至求環積與前求尖田積同但彼立天元一為兩積之和此立天元一為兩積之較耳其式如左法立天元一為環田積即内外兩圓積之較自之得一平方為較自乗以大小率即二圓積各自乗併而倍之得一萬五千二百四十五步内減較自乗得一萬五千二百四十五步少一平方為和自乗與較自乗再相乗得一萬五千二百四十五平方少一三乗方寄之次以大小率相減餘二千五百零二步五分為和較相乗再自之得六百二十六萬二千五百零六步二分五釐與寄數等即為實寄數内平方數即從上亷三乗方數即益隅此圗照問列位以後照草運算乃先置次大徑以上副自乗得中以中進位為次實以一為下隅凡九變至此得大圓徑次求大圓積上副自乗得中以次約之得下為實凡十一變至此得大圓積次求小圓徑一十一變得小圓積次求環田通徑當求環田通徑蓋環田之外周三十步與小圓田外周同則不遇與前七變諸圗一理兹不復繁乃求實徑凡九變得環田内周次求環積開三乗方凡二十變至此得環田積數求實徑但以虚徑减通徑餘一步一十九分步之九為環田實徑均分梯田問户業田一段若梯之狀南廣小三十四步北廣大五十二步正長一百五十步合係兄弟三人均分其田邉道各欲出入其地形難分經官乞分南甲乙北内欲知其田共積各人合得田數及各段正長大小廣㡬何答曰田共積二十六畆二百一十步甲得八畆三角五十步小廣三十四步係元南廣大廣四十步五萬八千七百九分步之五萬二千二百八十四大約百分步之八十九正長五十七步二千四十五分步之百五十三大約一百分步之四十一分乙得八畆三角五十步小廣同甲大廣大廣四十六步八萬四千八百二十六億八千九百五十七萬二千六百五十一分步之六萬五千八百七十四億五千四百八十二萬五千二百八十三計大率約百分步之七十七分半強正長四十九步四億一千二百四十萬六千二百九分步之二千二十七萬六千三百一十九大約百分步之四分九釐丙得八畆三角五十步小廣同乙大廣大廣五十二步係元北廣正長四十三步八千四百三十三億七千九十萬一千九百五分步之四千四百八十八億八千六百二萬九千四十六大約百分步之五十三分強術曰以少廣及從法求之併兩廣乗長得數以分田人數約之為通率半之為各積以長乗各積為共實以長乗南廣為甲從方二廣差半之為共隅開連枝平方得甲截長以甲長除通率得數減小廣餘為甲廣即為乙小廣以元長乗乙小廣為乙從方置共隅共實開連枝平方得乙截長以乙長除通率得數減乙小廣餘為乙大廣即為丙小廣倂甲乙長減元長餘為丙長以元大廣為丙大廣各有分者通之草曰置小廣三十四併大廣五十二得八十六乗長一百五十得一萬二千九百為實以兄弟三人約之得四千三百為通率半之得二十一百五十為各積以法二百四十步約之得八畆不盡二百三十步以角法六十步約之得三角五十步是三人各得八畆三角五十步以元長一百五十步乗各積二千一百五十得三十二萬二千五百為共實以長一百五乗小廣三十四得五千一百為甲從方以小廣大廣餘一十八乃半之得九為共隅開連枝平方開方革更不繁具得五十七步不盡三約為二千四十五分步之八百五十三為甲截長乃以分母二千四十五通全步内子共得一十一萬七千四百一十八為法又以分母乗通率四千三百得八百七十九萬三千五百為實以法除之得七十四步不盡一十萬四千五百六十八與法求等得二俱約之為五萬八千七百九分步之五萬二千二百八十四乃以小廣三十四步於所得全步七十四步内減之餘四十步五萬八千七百九分步之五萬二千二百八十四為甲大廣即為乙小廣今次求乙長乃以分母五萬八千七百九通乙小廣四十步得二百三十四萬八千三百六十内子五萬二千二百八十四得二百四十萬六百四十四又元長一百五十乗之得三億六千九萬六千六百為乙從方又以分母五萬八千七百九通共實三十二萬二千五百得一百八十九億三千三百六十五萬二千五百為乙實又以分母通共隅九得五十二萬八千三百八十一為乙從隅開連枝平方更不立草得四十九步不盡二千二十七萬六千三百十九隅併方共得四億一千二百四十萬六千三百九為母與不盡求等單一不可約乃定為四十九步四億一千二百四十萬六千三百九分步之二千二十七萬六千三百一十九為乙截長以乙長母通全步内子得二百二億二千八百一十八萬五千四百六十為法以乙長七千七百三十三億四千七百一十二萬八千七百為實以法除之得八十七步不盡一百三十四億九千四百九十九萬三千六百八十與法求等得一百四十俱約之為八十七步一億四千四百四十八萬七千三十九分步之九千六百三十九萬二千八百一十二為得數乃以乙小廣母五萬八千七百九乗得數子九千六百三十九萬二千八百一十二得五萬六千五百九十一億二千五百五十九萬九千七百八為泛却以得數母一億四千四百四十八萬七千三十九分乗乙小廣子五萬二千二百八十四得七萬五千五百四十三億六千三十四萬七千七十六為寄數於上乃以小廣母五萬八千七百九乗得數母一億四千四百四十八萬七千三十九得八萬四千八百二十六億八千九百五十七萬二千六百五十一以寄減泛今不及減乃破全步一為分併泛得八十六步十四萬一千四百一十八億一千五百一十七萬二千三百五十九減去小廣四十步及分餘四十六步八萬四千八百二十六億八千九百五十七萬二千六百五十一分步之六萬五千八百七十四億五千四百八十二萬五千二百八十三為乙大廣亦丙小廣求丙長置甲長五十七步二千四十五分步之八百五十六乙長四十九步四億一千二百四十萬六千三百九分步之二千二十七萬六千三百一十九以甲乙分母互乗子甲乙分母相乗得甲正長五十七步八千四百三十三億七千九十萬一千九百五分步之三千五百三十億一千九百八十萬五百四億乙正長四十九步八千四百三十三億七千九十萬一千九百五分步之四百一十四億六千五百七萬二千三百五十五併甲乙長及分共長一百六步三千九百四十四億八千四百八十七萬二千八百五十九分用減元長一百五十步先破一步通分母作八千四百三十三億七千九十萬一千九百五減去甲乙長長餘四十三步八千四百三十三億七千九十萬一千九百五分步之四千四百八十八億八千六百二萬九千四十六為丙正長按此術以立天元一法明之法立天元一為甲正長南北廣差折半得九以乗天元得九元以共正長除之得一百五十分天元之九為甲之半廣差與小廣相加得三十四步多一百五十分元之九再以天元乗之得三十四元多一百五十分平方之九即與每人分田二千一百五十步等兩數各以分母一百五十乗之得三十二萬二千五百步與九平方多五千一百元等步數為實元數為從方平方數為隅得甲正長求乙丙長廣同此但多一帶分故其數較繁數學九章卷三下
