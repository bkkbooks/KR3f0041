九分五釐為夏税本色次以田力一貫二百徧乗右副行併以地物力乗甲原地及納甲得一百一十六貫四百乙得九百三十八貫四百丙得一千一百七十四貫八百各為田物力其甲又置一十一畆七分以乗地紬一尺三寸四分得一丈五尺六寸七分八釐為甲地紬半之得七尺八寸三分九釐各為折紬本色又以甲地乗物力九百得一十貫五百三十為甲地乗力併田物力一百一十六貫四百共得一百二十六貫九百三十文為甲物力列甲乙丙三户共物力各為貫皆以物力和買率三十二貫為法除之甲得三匹九分六釐六毫五絲六忽二㣲五塵乙得二十九匹三分二釐五毫丙得三十六匹七分一釐二毫五絲各為和買率亦各列二位各以七三折之其頭位七折者為和買折帛下位三折者為和買本色折訖其甲得二匹七分七釐六毫五絲九忽三㣲七塵五沙為和買折帛率又得一匹一分八釐九毫九絲六忽八㣲七塵五沙為和買本色率乙得二十匹五分二釐七毫五絲為和買折帛率又得八匹七分九釐七毫五絲為和買本色率丙得二十五匹六分九釐八毫七絲五忽為和買折帛率又得一十一匹一釐三毫七絲五忽為和買本色率各率除端匹外乃以定下分毫皆以四因之收為丈尺寸分甲得和買折帛二匹三丈一尺六分三釐七毫五絲本色一匹七尺五寸九分八釐七毫五絲乙得和買折帛二十匹二丈一尺一寸本色八匹三丈一尺九寸丙得和買折帛二十五匹二丈七尺九寸五分本色一十一匹五寸五分為各户和買數及分本色下畸零數合問均科綿税問縣科綿有五等户共一萬一千三十三户共科綿八萬八千三百三十七兩六錢上等一十二户副等八十七户中等四百六十四户次等二千三十五户下等八千四百三十五户欲令上三等折半差下二等此中等六四折差科率求之問各户納及各等幾何按題言下二等比中等六四折差是次等為中等六分之四下等又為次等六分之四也乃術草中皆以十分之四收之是四分折差而非四六折差矣集中題與術不相應者多類此豈成書之後未能重加校正歟答曰上等一户一百二十四兩一十二户計一千四百八十八兩副等一户六十二兩八十七户計五千三百九十四兩中等一户三十一兩四百六十四户計一萬四千三百八十四兩次等一户一十二兩四錢二千三十五户計二萬五千二百三十四兩下等一户四兩九錢六分八千四百三十五户計四萬一千八百三十七兩六錢術曰列五等户數先以四折下等數加次等户又以四折之加中等户數却以半折之加二等户又以半折之加上等户數不折便為法除科綿得上等一户之綿復半之為副等又半之為中等又四折之為次等又四折之為下等各一户綿却各以户數乗之各得五等共出綿具圖折之上副中次下草曰先置下等户八千四百三十五以四折之得三千三百七十四乃以得數折入次户二千三十五内得五千四百九户訖又以四折次數五千四百九户得二千一百六十三户六分乃以得次數併入中户四百六十四内共得二千六百二十七户六分次以五分折中數二千六百二十七户六分得數次以得數一千三百一十三户八分併副户八十七得一千四百户八分又以五折副數一千四百户八分得七百户四分既得數乃以副數七百户四分併上户一十二户得七百一十二户四分不折便以為法為法累折至等共得七百一十二户四分以為總法乃置科綿八萬八千三百三十七兩六錢為實法法七百一十二户四分而一得一百二十四兩為上等一户所出綿以五折之得六十二兩為副等一户所出綿又五折之得三十一兩為副等一户所出綿乃以四折之得一十二兩四錢為次等一户所出綿又以四折之得四兩九錢六分為下等一户所出綿乃以各等户數各乗一户所出即各得每等共數之綿均定勸分問欲勸糶賑濟據甲民户物力畆步排定共計一百六十二户作九等上等三户第二等五户第三等七户第四等八户第五等十三户第六等二十一户第七等二十六户第八等三十四户第九等四十五户今先觀諭第一等上户願糶五千石第九等户願糶二百石欲知各等抛差石數併數認米數各幾何答曰認該米二十三萬七千六百石上等一户米五千石三户計一萬五千石二等一户米四千四百石五户計二萬二千石三等一户米三千八百石七户計二萬六千六百石四等一户米三千二百石八户計二萬五千六百石五等一户米二千六百石一十三户計三萬三千八百石六等一户米二千石二十一户計四萬二千石七等一户米一千四百石三十六户計三萬六千四百石八等一户米八百石三十四户計二萬七千二百石九等一户米二百石四十五户計九千石術曰以衰分求之置上下户米減餘為實列等數減一餘為法除之得抛差石數以差累減上等米各得諸等米以各等户乗之併之為總數草曰置上等户米五千石減下等户二百石餘四千八百石為實以九等減一餘八為法除實得六百石為每等抛差用減上等餘四千四百石為二等米又減六百得三千八百石為三等米又減六百得三千二百石為四等米又減六百得二千六百石為五等米又減六百得二千石為六等米又減六百得一千四百石為七等米又減六百得八百石為八等米又減六百得二百石為九等米又各乗户數併之得總認米石數二十三萬七千六百石合問均定合解按原本此問無題今増問州郡合解諸司窠名錢户部九十六萬五千四百二十一貫文總所六十四萬三千六百一十四貫文運司一萬六千九十貫三百五十文今諸窠名先催到九千二百五十三貫六百二十文欲照原額分數均定樁收候解合各幾何答曰户部五千四百九十七貫二百文總所三千六百六十四貫八百文運司九十一貫六百二十文術曰以衰分求之置諸原率可約約之副併為法以催到錢乗未併者各為實實如法而一合問草曰列户部九十六萬五千四百二十一貫總所六十四萬三千六百一十四貫運司一萬六千九十貫三百五十文各為原率今原率可約求等得一萬六千九十貫三百五十為等數俱約之户部得六十總所得四十運司得一各為率副併得一百一為法以催到錢九千二百五十三貫六百二十文乗未併數六十四十及一畢得五十五萬五千二百一十七貫二百文為户部之實三十七萬一百四十四貫八百文為總所之實九千二百五十三貫六百二十文為運司之實三實皆如法一百一而一其户部得五千四百九十七貫二百文總所得三千六百六十四貫八百文運司得九十一貫六百二十各為侯解錢按此法今名和數比列即用合解為率亦可増一約分取其數簡也寛減屯租問屯租欲議寛減仍聴以夏麥折納分數官牛種者與減二分私牛種者與減四分每嵗租榖以三分之一許夏折二麥内四分大六分小折色每大麥三石折小麥二石小麥二石折榖三石五斗屯租舊額官種一石納租五石私種一石納租三石今某州屯田去年計官私種共九千七百八十二石共合收租榖三萬九千五百八十六石欲知官私種各數原額今減合催成年夏麥秋榖幾何按此題有官私共種數租數有種一石租數求各種數租數古謂之差分今謂之和較比例折色亦差分也今謂之和數比例大小麥與榖相易古謂之異乗同乗今謂之和率比列答曰請官種五千一百二十石私出種四千六百六十二石原租額共三萬九千五百八十六石官種二萬五千六百石私種一萬三千九百八十六石今減一萬七百一十四石四斗官種五千一百二十石私種五千五百九十四石四斗合催二萬八千八百七十一石六斗官種租二萬四百八十石一分折麥計榖六千八百二十六石六斗六升零三分升之二四分折大麥二千三百四十石五斗七升七分升之一係折榖二千七百三十石六斗六升三分升之二六分折小麥二千三百四十石五斗七升七分升之一係折榖四千九十六石二分正色榖一萬三千六百五十三石三斗三升之一私種租八千三百九十一石六斗一分折麥計榖二千七百九十七石二斗四分折大麥九百五十九石四升係折榖一千一百一十八石八斗八升六分折小麥九百五十九石四升係折榖一千六百七十八石三斗二升二分正色榖五千五百九十四石四斗成年共收夏折榖按即官種私種一分折榖共數九千六百二十三石八斗六升三分升之二大麥三千二百九十九石六斗一升七分升之一小麥三千二百九十九石六斗一升七分升之一秋正榖一萬九千二百四十七石七斗三升三分升之一術曰以粟米求之互易入之列共租共種各以租種率數依本色對之先以各種率互乗諸租騐租數之少者以乗共種得數覆減共租餘為實以二租數相減餘為官種法實如法而一得官種以減共種餘為私種各以租率對乗官私種各得官私種所納租次以減分對乗各納租乃得各減數以減所納餘為合催租乃分别之先以總折分子乗之各為實並以總分母除之各得折色正色數次置折色數二位用夏折大小麥乗之各得與毎折諸率如雁翅列常以多一事者相乗為實以少一事者相乗為法各得所折大小麥其正色數如故為併本色得成年夏折二麥秋收正榖草曰列共租三萬九千五百八十六石併共種九千七百八十二石次各以官種一石納租五石私種實石納租三石各為率對租種本色列之先以種率各一石互乗租數只得共榖次騐租數率三石係少者以乗共種九千七百八十二石得二萬九千三百四十六石為種覆減共租餘一萬二百四十石為種實以租率三減租率五餘二石係官租者為官種法除種實得五千一百二十石為官種以減共種九千七百八十二餘四千六百六十二石為私出種以官租率五石私租率三石各對乗官私種得二萬五千六百石為官租所納租得一萬三千九百八十六石為私種所納租併之得原額租次列官牛種與減二分私牛種與減四分各對乗所納租數得五千一百二十石為官種減租數得五千五百九十四石四斗為私種減租數併之得一萬七百一十四石四斗為今減數乃以官種減租五千一百二十石減官種租二萬五千六百餘二萬四百八十石為合催次以私種減租五千五百九十四石四斗減私種租一萬三千九百八十六石餘八千三百九十一石六斗亦是合催租乃以二等合催租分列之先以毎嵗三分之一以子一減分母三得二乃以一及二皆為子各乗各催租其官種者一分租得二萬四百八十石二分租得四萬九百六十石其私種者一分租得八千三百九十一石六斗二分租得一萬六千七百八十三石二斗並為實此四實並如母三而一其官種一分折得六千八百二十六石六斗六升零三分升之二及二分正色榖得一萬三千六百五十三石三斗三升三分升之一其私種一分折色得二千七百九十七石二斗二分正色榖得五千五百九十四石四斗次置官私種各一分折色數各二位乃用夏折四分大六分小對乗之通係四位乃並四六得一十分約之是並退一位其官種四分大麥者置折榖六千八百二十六石六斗六升三分升之二通分内子得二萬四百八十列二位頭位以四分折之得八千一百九十二石為大麥實下位以六分折之得一萬二千二百八十八石為小麥實次置私種折榖二千七百九十七石二斗列二位頭位以四分折之得一千一百一十八石八斗八升為大麥率下位以六分折之得一千六百七十八石三斗二升為小麥率其圖如後次列折色每大麥三石折小麥二石小麥二石折榖三石五斗為諸率與大小麥實率四數如雁翅列之其六分折小麥勿置大麥折率有母者列母官種者先以大麥率三乗小麥率二得六又乗榖實八千一百九十二石得四萬九千一百二十五石為大麥實乃以小麥率二乗榖率三石五斗得七石又乗母得二十一石為法除實得二千三百四十石五斗七升七分升之一為官種折大麥數仍以母三約本實八千一百九十二石得二千七百三十石六斗六升三分升之二為所折上得大麥榖數次以小麥折二乗榖實一萬二千二百八十八石得二萬四千五百七十六石為小麥實乃以榖率三石五斗乗母三得十石五斗為法除實得二千三百四十石五斗七升七分升之一為官種折小麥榖仍以母三約本實一萬二千二百八十八石得四千九十六石為所折上得小麥榖數私種者先以大麥三乗小麥率二得六又乗榖數一千一百一十八石八斗八升得六千七百一十三石二斗八升為實乃以小麥率二乗榖率三石五斗得七石為法除之得九百五十九石四升為私種折大麥數次以小麥率二乗榖率一千六百七十八石三斗二升得三千三百五十六石六斗四升為實以榖率三石五斗為法除之得九百五十九石四升為私種榖折小麥數次以官種四分大麥二千三百四十石五斗七升七分升之一併私種四分大麥九百五十九石四升得三千二百九十九石六斗一升七分升之一為成年夏折大麥數次以官種六分小麥二千三百四十石五斗七分七分升之一併私種六分小麥九百五十九石四升得三千二百九十九石六斗一升七分升之一為成年夏折小麥數次以官種二分正色榖一萬三千六百五十三石三斗三升三分升之一併私種正色榖五千五百九十四石四斗得一萬九千二百四十七石七斗三升三分升之一合問户税均寛問州郡寛恤近将某縣下三等税户秋科餘欠錢米已與蠲放共錢一千三百五十五貫七百六文米五千二百七十二石一斗九升某本縣下三等物力計三萬七千六百五十八貫五百文今來官員陳述本縣多有樂輸無欠之户今䝉蠲放税尾似反寛潤頑輸之户於理未均遂議将樂輸三等户於明年兩税與照昨來體例減免契勘得三等無欠户物力二十二萬八百一十五貫三百二十一文欲知每百文合減免錢米及共減各幾何答曰毎物力一百文放錢三文六分放米一升四合明年兩税放免錢七千九百四十九貫三百五十一文五分五釐六毫米三萬九百一十四石一斗四升四合九勺四抄術曰以粟米衰分求之置原物力為法除原放錢米得毎百文物力所放錢米率以各率乗今來物力各得錢米為明年兩税合放數草曰以原物力三萬七千六百五十八貫五百文為法先除原放錢一千三百五十五貫七百六文定法百文上得一文為商除得三文六分為物力百文所放錢率次除原放米五千二百七十二石一斗九升得一升四合為物力百文所放米率以今三等户物力二十二萬八千一十五貫三百二十一文徧乗所放錢米二率得錢七千九百四十九貫三百五十一文五分五釐六毫得米三萬九百一十四石一斗四升四合九勺四抄為明年兩税合放數米榖粒分問開倉受約有甲户米一千五百三十四石到廊驗得米内夾榖乃於様内取米一捻數計二百五十四粒内有榖二十八顆凡粒米率每勺三百今欲知米内雜榖多少以折米數科貴及粒各幾何答曰米一千三百六十四石八斗九升七合六勺一百二十七分勺之四十八榖一百六十九石一斗二合三勺一百二十七分勺之七十九合折米八十四石五斗五升一合一勺一百二十七分勺之一百三原米折米共計四十三億四千八百三十四萬六千四百五十六粒術曰以粟米求之衰分入之置様米粒數為法以常榖顆數減之餘與榖為列衰可約約之以共米乗列衰為各實實如法而一各得米數榖數置榖數以粟率折之為榖所折米次以勺率遍乗米數折米得粒數草曰置一捻様粒數二百五十四為法以帶榖二十八顆為榖衰以減法餘二百二十六為米衰此二衰與法皆可約求等得二俱以約之法得一百二十七米衰得一百一十三榖衰得一十四以米米一千五百三十四石遍乗二衰得一十七萬三千三百四十二石為米實得二萬一千四百七十六石為榖實皆如法一百二十七而一米得一千三百六十四石八斗九升七合六勺一百二十七分勺之四十八榖得一百六十九石一斗二合三勺一百二十七分勺之七十九以粟率五十折之得八十四石五斗五升一合一勺一百二十七分勺之一百三為榖折納米數併二米得一千四百四十九石四斗四升八合八勺一百二十七分勺之二十四先通分納子一十八萬四千八十石以勺率三百粒乗之得五千五百二十二億四千萬粒為實以母一百二十七除之得四十十億四千八百三十四萬六千四百五十六粒不盡八十八棄之合問數學九章卷五下
