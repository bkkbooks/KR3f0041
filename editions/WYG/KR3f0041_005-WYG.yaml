body:
  text: 數學九章卷五上宋秦九韶撰賦役按賦役一章即古九章中差分粟米諸法但從來算書設題之數未有如此卷之多者如首題答數至一百七十五條毎條歩算之數至十餘位而得數皆無不合亦可謂能廣其用矣且諸問皆足以明貴賤廩税及交質變易之同異使公私各得其平誠治民之要務也但題語多晦術草中間有與所問不相應者亦於各條下指出俾觀者無惑焉復邑修賦問有海坍縣地今有復漲歳乆鄉井再成申諸剏邑稱土排到六鄉以附郭為甲最逺為已各有田九等開具下項甲鄉共計田十四萬一百九十三畝三角一十二步上等上田五千六百七十八畝一角四十八歩中田四千八百九十二畝三十歩下田六千六百二十一畝五十四歩中等上田八千二百二十五畝二十四歩中田一萬三十五畝六歩下田一萬六千五百三十畝下等上田二萬一千九十畝二十四歩中田三萬二千六十畝三歩下田三萬五千六十一畝三角三歩乙鄉田共計八萬四千一十畝二角二歩上等上田六千七百八十九畝一角三十六歩中田五千九百八十七畝二角下田八千一十畝三角三歩中等上田七千五百四十一畝中田九千一百二十一畝二角一十二歩下田一萬九千六十歩下等上田一萬八千三十七畝一角六歩中田九千四百五十六畝三角五十九歩下田無丙鄉田共計一十二萬九百三十五畝五十八歩五分上等上田四千八百六十八畝二角三歩中田五千九百七十九畝三角六歩下田六千八百八十八畝二角六歩中等上田七千九百八十四畝一角中田一萬四千五十六畝一十二歩下田二萬三千三百三十三畝一十二歩下等上田二萬七千七百五十五畝一十六歩五分中田無下田三萬七十畝三歩丁郷田共計八萬九千六十六畝二歩三分上等上田一萬一千一百二畝一歩中田九千八百七十六畝一角下田八千七百六十五畝一角三十歩中等上田七千五百三十九畝三十四歩三分中田無下田一萬二千九百八十七畝四十二歩下等上田無中田五千四百三十二畝一角六歩下田三萬三千三百六十三畝三角九歩戊鄉田共計二十萬四千四百七十四畝一角二十四歩四分上等上田二萬四千六百三十二畝三十九歩中田一萬三千五百二十一畝二十七歩下田九千九百八十八畝三角三歩中等上田八千八百七十七畝五十六歩四分中田一萬一千三百三十三畝三角下田二萬七千六十七畝下等上田一萬九千八百七十六畝三角六歩中等田七萬九千一百三十五畝三角四十三歩下田一萬四十一畝二角三十歩已鄉田共計一十五萬八千四百六十畝三角一十八歩二分上等上田無中田七千七百八十八畝三角五十一歩下田無中等上田九千九百九十九畝二角三歩中田一萬八百三十六畝五十六歩下田無下等上田三萬二千八十九畝一角四十五歩六分中田四萬三千六百七十八畝二角五十七歩下田五萬四千六十七畝三角四十五歩六分照得昨來本縣原科苗米一十萬三千五百六十七石八斗四升四合三勺和買一萬三千四百九十八匹一丈七尺三寸七分六釐夏税九千八百七十六匹三丈二尺六寸五分八釐其六鄉田係三色甲為上乙丙為次丁戊己又為次先令官物為三差使上比中中比下皆十分外差一次令各鄉九等皆於十分内差一抛科用合租額其乙鄉田最肥次丁次甲次丙次己次戊欲知三色九等毎畝等則及共科數各鄉幾何按題内言田有三色甲為上云云又言乙鄉田最肥云云語若相左葢前言三色者六鄉共科之等後言田肥者每畝所出之異也若易田係三色為科有三差則語意明矣答曰甲鄉上等上田苗三斗二升三合二勺和一尺六寸九分税一尺二寸三分中田苗二斗九升九勺和一尺五寸二分税一尺一寸一分下田苗二斗五升八合六勺和一尺三寸五分税九寸九分中等上田苗二斗二升六合二勺和一尺一寸八分税八寸六分中田苗一斗九升三合九勺和一尺一分税七寸四分下田苗一斗六升一合六勺和八寸四分税六寸二分下等上田苗一斗二升九合三勺和六寸七分税四寸九分中田苗九升六合九勺和五寸一分税三寸七分下田苗六升四合六勺和三寸四分税二寸五分乙鄉上等田苗三斗六升三合三勺和一尺八寸九分税一尺三寸九分中田苗三斗二升六合九勺和一尺七寸税一尺二寸五分下田苗二斗九升六勺和一尺五寸二分税一尺一寸一分中等上田苗二斗五升四合三勺和一尺三寸三分税九寸七分中田苗二斗一升八合和一尺一寸四分税八寸三分下田苗一斗八升一合六勺和九寸五分税六寸九分下等上田苗一斗四升五合三勺和七寸六分税五寸五分中田苗一斗九合和五寸七分税四寸二分下田苗七升二合七勺和三寸八分税二寸八分丙鄉上等上田苗三斗三合五勺和一尺五寸八分税一尺一寸六分中田苗二斗七升三合一勺和一尺四寸二分税一尺四分下田苗二斗四升二合八勺和一尺二寸七分税九寸三分中等上田苗二斗一升二合四勺和一尺一寸一分税八寸一分中田苗一斗八升二合一勺和九寸五分税六寸九分下田苗一斗五升一合七勺和七寸九分税五寸八分下等上田苗一斗二升一合四勺和六寸三分税四寸六分中田苗九升一合和四寸七分税三寸五分下田苗六升七勺和三寸二分税二寸三分丁鄉上等上田苗三斗四升三合二勺和一尺七寸九分税一尺三寸一分中田苗三斗八合九勺和一尺六寸一分税一尺一寸八分下田苗二斗七升四合六勺和一尺四寸三分税一尺五分中等上田苗二斗四升二勺和一尺二寸五分税九寸二分中田苗二斗五合九勺和一尺七分税七寸九分下田苗一斗七升一合六勺和八寸九分税六寸五分下等上田苗一斗三升七合三勺和七寸二分税五寸二分中田苗一斗三合和五寸四分税三寸九分下田苗六升八合六勺和三寸六分税二寸六分戊鄉上等上田苗一斗五升三合八勺和八寸税五寸九分中田苗一斗三升八合四勺和七寸二分税五寸三分下田苗一斗二升三合一勺和六寸四分税四寸七分中等上田苗一斗七合七勺和五寸六分税四寸一分中田苗九升二合三勺和四寸八分税三寸五分下田苗七升六合九勺和四寸税二寸九分下等上田苗六升一合五勺和三寸二分税二寸三分中田苗四升六合一勺和二寸四分税一寸八分下田苗三升八勺和一寸六分税一寸二分已鄉上等上田苗二斗八升二合二勺和一尺四寸七分税一尺八分中田苗二斗五升三合九勺和一尺三寸二分税九寸七分下田苗二斗二升五合七勺和一尺一寸八分税八寸六分中等上田苗一斗九升七合五勺和一尺三分税七寸五分中田苗一斗六升九合三勺和八寸八分税六寸五分下田苗一斗四升一合一勺和七寸四分税五寸四分下等上田苗一斗一升二合九勺和五寸九分税四寸三分中田苗八升四合六勺和四寸四分税三寸二分下田苗五升六合四勺和二寸九分税二寸二分甲鄉苗米一萬九千五百五十石二斗四升八合三勺和買一萬一百九十二丈二尺六寸五分六釐夏税七千四百五十七丈六尺八寸九分八釐乙鄉苗米一萬七千七百七十二石九斗五升三合和買九千二百六十五丈六尺九寸六分夏税六千七百七十九丈七尺一寸八分丙鄉苗米一萬七千七百七十二石九斗五升三合和買九千二百六十五丈六尺九寸六分夏税六千七百七十九丈七尺一寸八分丁鄉苗米一萬六千一百五十七石二斗三升和買八千四百二十三丈三尺六寸夏税六千一百六十三丈三尺八寸戊鄉苗米一萬六千一百五十七石二斗三升和買八千四百二十三丈三尺六寸夏税六千一百六十三丈三尺八寸己鄉苗米一萬六千一百五十七石二斗三升和買八千四百二十三丈三尺六寸夏税六千一百六十三丈三尺八寸術以衰分求之先列本縣色位自下錐行列之又以鄉數對列而乗之副併為法以除官物數得一分之率以率數乗未併者各得諸鄉之數次列各鄉等位自上等置十分每以内分錐行九折之至九等止又各以畝歩乗之副併為鄉法以除諸各鄉所得官物數所得為一分之率以乗未併者各得毎畝税色草曰列本縣色位三自下色例十分中十一分上比中身外加一上得一百二十一中得一百一十下得一百為上中下三率列之右行乃列甲一對上率乙丙共二對中率丁戊己共三對下率列左行乃以左行列數各相對乗右行率數其上得一百二十一其十得二百二十其下得三百乃副置而併之得六百四十一為法置元科苗米一萬三千五百六十七石八斗四升四合三勺為寔以法除之得一百六十一石五斗七升二合三勺為一分之率以未併下率一百乗率得一萬六千一百五十七石二斗三升為丁戊己三鄉各科數以於身下加一得一萬七千七百七十二石九斗五升三合為乙丙二鄉各科數又於身下加一得一萬九千五百五十石二斗四升八合三勺為甲合科數求和買亦用六百四十一為法置元科和買一萬三千四百九十八匹以匹法四丈通之得五萬三千九百九十二丈内零一丈七尺三寸七分六釐得五萬三千九百九十三丈七尺三寸七分六釐為寔以法除之得八十四丈二尺三寸三分六釐為一分之率亦以未併下率一百乗之得八千四百二十三丈三尺六寸為丁戊己三鄉各科數次於身下加一得九千二百六十五丈六尺九寸六分為乙丙二鄉各科數又於身下加一得一萬一百九十二丈二尺六寸五分六釐為甲鄉合科數求夏税亦置六百四十一為法置元科九千八百七十六匹以匹法四丈通之得三萬九千五百四丈内零三丈二尺六寸五分八釐得三萬九千五百七丈二尺六寸五分八釐為寔以法除之得六十一丈六尺三寸三分八釐為一分率亦以未併下率一百乗之得六千一百六十三丈三尺八寸為丁戊己三鄉各科數次於身下加一得六千七百七十九丈七尺一寸八分為乙丙二鄉各科數又於身下加一得七千四百五十七丈六尺八寸九分八釐為甲鄉數次列九等上以十次九八七六五四三二各對乗六鄉九等田畝其田畝下角歩以畝法除之得分釐毫絲忽於畝上對乗之各得率按題内云各鄉九等皆於十分内差一則是逓次九折也術内亦云列各鄉等位自上等置十分每以内分錐行九折之至九等止則其法當為逓次九折益明矣乃草中則云上以十次九八七六五四三二則是逓次減一而非逓次九折矣以此得答數既與題問未合而術與草亦不相應也甲上等上田率五萬六千七百八十四分五釐中田率四萬四千二十九分一釐二毫五絲下田率五萬二千九百六十九分八釐中等上田率五萬七千五百七十五分七釐中田率六萬二百一十分一釐五毫下田率八萬二千六百五十分下等上田率八萬四千三百六十分四釐中田率九萬六千一百八十分三毫七絲五忽下田率七萬一百二十三分五釐二毫五絲乙上等上田率六萬七千八百九十四分中田率五萬三千八百八十七分五釐下田率六萬四千八十六分一釐中等上田率五萬二千七百八十七分中田率五萬四千七百二十九分三釐下田率九萬五千三百三十分一釐二毫五絲下等上田率七萬二千一百四十九分一釐中田率二萬八千三百七十分九釐八毫八絲下田無丙上等上田率四萬八千六百八十五分一釐二毫五絲中田率五萬三千八百一十七分九釐七毫五絲下田率五萬五千一百八分二釐中等