body:
  text: 數學九章卷九上宋秦九韶撰市易積木計餘問原管杉木一尖垜偶不記數從上取用至中間見存九條為靣問原木及見存各幾何答曰原木一百五十三條見存木一百一十七條術曰商功求之堆積入之倍中靣副置減一以乘其副得數半之為原木副置上層減一以乘其副得數半之用減原木餘為見存其非中一層數者各以自地上至面層數立數求之草曰倍中靣九條得一十八副置減一餘一十七以乘副一十八得三百六條以半之得一百五十三條為原木之數副置中靣九條減一餘八以乘副九得七十二以半之得三十六以減原木一百五十三餘一百一十七條為見存木數合問按此即一靣平堆形中層為九上下必各有八層共十七層即原尖堆形上八層即用過尖堆形其義甚明舊餘木圖今刪竹圍蘆束問受給場交收竹二千三百七十四把內筀竹一千一百五十一把每把外圍三十六竿水竹一千二百二十三把每把外圍四十二竿蘆三千六十五束每束圍五尺其蘆原樣五尺五寸今納到圍小合凖原蘆幾束及水筀竹各幾何答曰筀竹一十四萬六千一百七十七竿水竹二十萬六千六百八十七竿合凖原蘆二千五百三十三束一百二十一分束之七術曰以方田及圓率求之置原束差併竹外圍竹數以乘外圍又乘把數為竹實倍圓束差為竹法除之各得二竹數皆以把數為心加入各得竹條數置蘆圍尺數自乘以乘蘆束為蘆實以蘆原尺數自乘為蘆法除實得所凖蘆束數草曰置圍束差六併筀竹外圍三十六竿得四十二竿以乘外圍三十六竿得一千五百一十二竿又乘筀竹一千一百五十一把得一百七十四萬三百一十二竿為筀竹實倍圓束差六得一十二為竹法除實得一十四萬五千二十六竿以把數一千一百五十一併之得一十四萬六千一百七十七竿為筀竹又置原差六併水竹外圍四十二竿得四十八竿以乘水外圍四十二竿得二千一十六竿又乘水竹一千二百二十三把得二百四十六萬五千五百六十八竿為水竹實亦以竹法一十二除之得二十萬五千四百六十四竿以水竹把數一千二百二十三併之得二十萬六千六百八十七竿為水竹數次置蘆圍五尺通為五十寸以自乘得二千五百寸又乘蘆束數三千六十五得七百六十六萬二千五百寸為蘆實以原樣蘆圍五尺五寸亦通為五十五寸以自乘得三千二十五寸為蘆法除實得二千五百三十三束不盡一百七十五寸與法求等得二十五俱以約之得一百二十一分束之七為蘆二千五百三十三束一百二十一分束之七合問寄倉知總按舊本此問無題今增問和糴米運借倉權頓計五十厫每厫濶一丈五尺深三丈米高一丈二尺又借寺屋四十間內二十五間濶一丈二尺深二丈五尺米高一丈內一十五間各濶一丈三尺深三丈米高一丈二尺欲知寺屋及倉容米共計幾何答曰共計米一十六萬六千八十石倉五十厫米一十萬八千石寺屋四十間米五萬八千八十石術曰啇功求之置厫并屋深濶米高相乘併之為實如斛法而一草曰先以厫深三丈通為三十尺乘濶十五尺得四百五十尺又乘高一十二尺得五千四百尺以乘五十厫得二十七萬尺為實以斛法二尺五寸除之得一十萬八千石為倉五寸厫共容米次置寺屋深二十五尺乘濶一十二尺得三百尺乘米高一十尺得三千尺以二十五間乘之得七萬五千尺於上次置深三十尺乘濶一十三尺得三百九十尺又乘米高十十二尺得四千六百八十尺以乘一十五間得七萬二百尺加上共得一十四萬五千二百尺以斛法二尺五寸除之得五萬八千八十石為寺屋四十間共容米以併厫米共得一十六萬六千八十石為共和糴到米方圓同積按舊本此問無題今增問有圓囤米二十五箇內有大囤一十二箇上徑一丈下徑九尺高一丈二尺小囤一十三箇上徑九尺下徑八尺高一丈今出租斗一隻口方九寸六分底方七寸正深四寸並裹明凖尺令凖數造五斗方斛及圓斛各二隻須令二斛口徑正深大小不同各得多少及囤積米幾何答曰方斛一隻口方六寸四分底方一尺二寸深一尺五寸九分二厘又一隻口方一尺底方一尺二寸深一尺一寸四分五厘圓斛一隻口徑一尺二寸七分底徑一尺二寸深一尺二寸一分四厘又一隻口徑一尺三寸底徑一尺二寸深一尺一寸八分五厘囤米計八千六十七石四升七合四勺一抄八撮按共囤米數誤應得二千零一十六石七斗六升一合八勺五抄草內少一四歸故差多三倍術曰以啇功及少廣求之置出斗上下方相乘之又各自乘併之乘深又以五斗乘之為積于上求方斛先自如意立數為斛深又如意立數為底方置深為從隅以底方乘隅為從方又以底乘從方為減率以減上積餘為實開連枝平方得方斛口方不盡以所得數為基增損求之以口底方相乘又各自求併之為法除前上積得深餘分收棄之求圖斛置四數以因前積為寄如意立數為斛深别如意立數為底徑以三因深為從隅以底徑乘隅為從方以底徑乘從方為減率以減寄餘為實開連枝平方得口徑不盡以所得數為基如意求差以口底徑相乘又各自乘併之為法除寄得深餘分收棄之求囤米置各囤上徑下徑相乘又各自乘併之乘高又乘囤數所得之數為積囤有大小以類併之為共積如四而一為實以斛求之得米草曰置出租斗口方九寸六分與底方七寸相乘得六十七寸二分於上又於口方九寸六分自乘之得九十二寸一分六厘加上又以底方七寸自乘得四十九寸又加上共得二百八寸三分六厘乘深四寸得八百三十三寸四分四厘又以五斗乘之得四千一百六十七寸二分為三假斛積于上求方斛如意立一尺六寸為斛深又加意立一尺二寸為斛底以深一十六寸為從隅以底一十二寸乘隅得一百九十二寸為從方又以底一十二寸乘從方一百九十二寸得二千三百四寸為減率以減上積四千一百六十七寸二分餘一千八百六十三寸二分為實開連枝平方得六寸三分五厘為基其積不及一寸一分六厘係有虧數其基數為米可用須合損益基數今益作六寸四分為口方以原立一尺二寸為底方以口方乘底方得七十六寸八分以上又以口方六寸四分自乘得四十寸九分六厘又以底方十二寸自乘得一百四十四寸併以上共得二百六十一寸七分六厘為法以除前積四千一百六十七寸二分得一尺五寸九分二厘為方斛深其積不及一厘九毫二絲收為閏又纍增至一十寸為口方仍以一十二寸為底方乃以口方一十寸乘底方一十二寸得一百二十寸於上又口方自乘得一百寸加上又以底方自乘得一百四十四寸又加上共得三百六十四寸為法亦除前實積四千一百六十七寸二分得一十一寸四分五厘為方斛深其積不及六分收為閏此是求出兩等斛數在人擇而用之求圓斛置四數以因前積四千一百六十七寸二分得一萬六千六百六十八寸八分為寄如意立一尺二寸為圓斛深又如意立一尺為底徑以三因深得三十六寸為從隅以底一十寸乘隅得三百六十寸為從方又以底一十寸乘從方得三千六百寸為减率以減寄一萬六千六百六十八寸八分餘一萬三千六十八寸八分為實開連枝平方得一尺四寸七分為基其實不及二寸四分四厘收為閏次以原立底徑一尺併基一尺四寸七分得二尺四寸七分只減七分為差以餘三尺四寸以半之得一尺二寸為底徑以差七分併底徑得一尺二寸七分為口徑始以口徑一尺二寸七分乘底徑一尺二寸得一百五十二寸四分於上次以口徑自乘得一百六十一寸二分九厘加上又以底徑自乘得一百四十四寸又加上共得四百五十七寸六分九厘以三因之得一千三百七十三寸七厘為法除前寄一萬六千六百六十八寸八分得一尺二寸一分四厘為圓斛正深其實不及二毫六絲九忽八微收為閏又以基一尺四寸七分增三分得一尺五寸併底徑一尺得二尺五寸減一寸為差餘二尺四寸以半之得一尺二寸為底徑以差一寸併底徑一尺二寸得一尺三寸為口徑始以口徑一十三寸乘底徑一尺二寸得一百五十六寸於上又以口徑一十三寸自乘得一百六十九寸加上又以底徑一十二寸自乘得一百四十四寸又加上共得四百六十九寸以三因之得一千四百七寸為法除前寄一萬六千六百六十八寸八分得一尺一寸八分四厘七毫為圓斛深寄餘七厘一毫却收深七毫作一厘通得一尺一寸八分五厘為圓斛深此是求出兩等圓斛在人擇而用之求囤米置大囤上徑一丈通為百寸乘下徑九十寸得九千於上又以上徑自乘得一萬寸加上又以下徑九十寸自乘得八千一百寸加上共得二萬七千一百寸乘高一百二十寸得三百二十五萬二千寸又乘大囤一十二個得三千九百二萬四千寸為寄次置小囤上徑九十寸下徑八十寸相乘得七千二百寸於次又上徑自乘得八千一百寸加次又下徑自乘得六千四百寸加次共得二萬一千七百寸又乘高一百寸得二百一十七萬寸又乘小囤一十三箇得二千八百二十一萬寸併寄共得六千七百二十三萬四千寸為實按應四歸為實草中遺漏故得數誤倍前斛積四千一百六十七寸二分為法除之得八千六十七石四升七合四勺一抄四撮按求方斛積法以上下徑相乘又各自乘併而以深再乘三除之得積求徑深法三因積有二徑以二徑相乘各自乘數併而除之得深有一深一徑以深除積得數內減徑自來餘為實徑為縱開帶縱平方得又一徑或徑自乘深再乘减積除為實以深為縱隅深徑相乘為縱方開連枝平方得又一徑草中求斗積不加三除為三倍斗積五因之為三倍斛積故設正深底徑二數開連枝平方以求口徑既得口徑復設二徑數以求正深也求圓斛徑即如求圓外切方邊當以方圓冪率變圓積為方積故四因前積而以三因正深代三除也求圓囤米尺積先用方斛求積法次變方為圓方斛法用三除變圓法用三因四除合之則三因四除合之則三除並可省惟以四除之即得圓囤積術中詳言之而草中步算遺漏四除故得數誤為四倍也數學九章卷九上欽定四庫全書數學九章卷九下宋秦九韶撰市易推求典本問典庫今年二月二十九日有人取解一號主家聽得當事共算本息一百六十貫八百三十二文稱係前嵗頭臘月半解去月息二分二釐欲知原本幾何答曰本一百二十貫文術曰以粟米求之置積日乘息分數增三百為法以三百乘共錢為實實如法而一得本草曰置前年頭臘月半係四十五日并去年三百六十又加今年五十九日共得四百六十四日為積日乘息二分二釐得一百二十文八釐增三百文得四百二文八釐為法以三百文乘共錢一百六十貫八百三十二文得四萬八千二百四十九貫六百文為實如法而一得一百二十貫文為原本按題意謂前年十一月半典錢去年未取今年二月二十九日取去按日計利共合本息錢一十六千八百三十二文月息每千二十二文問本錢若干法當以積日乘息二十二文以三十日除之得一千文之共息加一千文為一千文之本息共數然後置今本息共數以一千乘之一千之本息共數除之即得今本錢數草中以十文為本以二分二厘為息不以三十除之為共息而以三十乘十文得三百為本其理一也推知糴數問和糴三百萬貫求石數聞每石牙錢三十文糴埸量米折支牙人所得每石出牽錢八百牙人量米四石六斗八合折與牽頭欲知米數石價牙錢米牽錢各幾何按題意買米共用錢三十億每石牙錢三十文共牙錢折米給之共折米每石牽錢八百文共牽錢牙人又折米四石六斗零八合給之求各數答曰糴到米一十二萬石石價二十五貫文牙錢三千六百貫文折米一百四十四石牽錢一百一十五貫二百文術曰以商功求之率變入之置糴本牙錢牽錢相乘為實以牽米為隅開連枝立方得石價以價除本得糴到米以牙錢乘米得總牙錢以價除之得牙米以牽錢乘牙米得共牽錢草曰置糴本三百萬貫乘牙錢三十文得九千萬貫文乘牽錢八百文得七百二十億萬貫按七百二十億貫萬字誤後餘實內萬字同此為價實置牽米四石六斗八合於實數零文之下為立方從隅起步步法常超二位每超一度商進之今隅凡超四度當於實上約定首商二十貫乃以商生隅超四石六斗八合得九十二貫一百六十文乃以為亷又以商生亷得一百八十四萬三千二百貫為方乃以方命上商二十貫除實訖實餘三百五十一億三千六百萬貫復以商生隅四石六斗八合入亷得一百八十四貫三百二十文又以商生亷加入方內得五百五十二萬九千六百貫為方法復以商又生隅四石六斗八合加入亷得二百七十六貫四百八十文為亷法其方法一退亷法二退從隅三退乃於首商之次約實續商五貫以續商生隅四石六斗八合入亷得二百九十九貫五百二十文又以續商生亷入方得七百二萬七千二百貫乃命續商五貫除實適盡所得二十五貫為每石米價以為法以糴本三百萬貫為實實如法而一得一十二萬石為糴到米數以米數乘牙錢三十得三千六百貫為牙錢以石價二十五貫除牙錢三千六百貫文得一百四十四石為糴埸量米折牙錢以牽錢八百乘牙米一百四十四石得一百一十五貫二百文為牽頭得牙人所與牽錢之數以石價二十五貫文約牽錢一百一十五貫二百文得四石六斗八合為牽米折錢合問按此術之意以立天元一解之法立天元一為米每石之價以折牽米四石六斗零八合乘之得四元六八為共牽錢應以每石牽錢八百除之寄分母代除得八百分元之四分六八為共折給牙人米數又以天元一乘之得八百分平方之四分六八為共牙錢應以每石牙錢三十除之寄分母代除得三十分又八百分平方之四分六八為共米數又以天元一乘之得三十分又八百分立方之四分六八為共米價與三百萬貫相等兩邉各以三十乘之又以八百乘之得四立方六八與七百二十億貫等以立方數除兩邉得一立方與一百五十六億二千五百萬貫等置貫數為實開立方得二十五貫為米每石價數草中不除開連枝立方為除之不能盡者便於用也纍收庫本問有庫本錢五十萬貫月息六厘半今令掌事每月帶本約息共還一十萬欲知幾何月而納足并末復畸錢多少答曰本息納足共七箇月末後一月畸錢二萬四千七百六貫二百七十九文三分四厘八毫四絲六忽七微七沙三莽一輕二清五烟術曰以盈朏變法求之置原本以息數退位乘歸本位每出共納纍得月數以末後不及數為足月錢數草曰置本五十萬貫以六釐五毫乘之入共本內得五十三萬二千五百貫文內减初月一十萬餘四十三萬二千五百貫文又以六釐五毫乘之餘本內得四十六萬六百一十二貫五百文又减次月一十萬貫餘三十六萬六百一十二貫五百文又以六釐五毫乘之入餘本內得三十八萬四千五十二貫三百一十二文五分又减第三月錢一十萬貫文餘二十八萬四千五十二貫三百一十二文五分又以六釐五毫乘之得三十萬二千五百一十五貫七百一十二文八分一釐二毫五絲內减第四月錢一十萬貫餘二十萬二千五百一十五貫七百一十二文二分一釐二毫五絲又以六釐五毫乘之入餘本內得二十一萬五千六百七十九貫二百三十四文一分四釐五毫三絲一忽二微五塵內减第五月錢一十萬貫餘一十一萬五千六百七十九貫二百三十四文一分四釐五毫三絲一忽二微五塵又以六釐五毫乘之入餘本內得一十二萬三千一百九十八貫三百八十四文三分六釐四毫七絲五忽七微八塵一沙二渺五莾减第六月錢一十萬貫餘二萬三千一百九十八貫三百八十四文三分六釐四毫七絲五忽七微八塵一沙二渺五莾又以六釐五毫乘之入餘本內得二萬四千七百六貫二百七十九文三分四釐八毫四絲六忽七微無塵七沙無渺三莾一輕二清五烟為第七月納足本息畸錢均貨推本問海舶赴務抽畢除納主家貨物外有沉香五千八十八兩胡椒一萬四百三十包包四十斤象牙二百一十二合以大小為合斤兩俱等係甲乙丙丁四人合本博到緣昨來凑本互有假借甲分到官供稱甲本金二百兩鹽四袋鈔一十道乙本銀八百兩鹽三袋鈔八十八道丙本銀一千六百七十兩度蝶一十五道丁本度蝶五十二道金五十八兩八銖已上共估值四十二萬四千貫甲借乙鈔乙借丙銀丙借丁度蝶丁借甲金今合撥各借物歸原主名下為率均分上件貨物欲知金銀袋鹽度牒原價及四人各合得香椒牙幾何按題意謂甲金乙鹽丙銀丁牒原本不同互借為同本買得香椒牙三色今有互借各物及同本貫數求原本以分所買之物蓋方程而亷衰分之法也甲乙二條內鹽鈔二色實即一色先言鹽袋數乃一鈔之數以鈔數乘之始為鹽數是鈔數既贅又不明言其故皆故為隱晦也答曰甲金每兩四百八十貫文本一十二萬四十貫文合得沉香一千四百八十八兩胡椒三千五十包一十一斤五兩五十三分兩之七象牙六十二合乙鹽每袋二百五十貫文本七萬六千貫文合得沉香九百一十二兩胡椒一千八百六十九包二十一斤二兩五十三分兩之六象牙三十八合丙銀每兩五十貫文本一十二萬三千五百貫文合得沉香一千四百八十二兩胡椒三千三十七包三十九斤五兩五十三分兩之二十三象牙六十一合四分合之三丁度牒每道一千五百貫文本一十萬五百貫文合得沉香一千二百六兩胡椒二千四百七十二包八斤三兩五十三分兩之十七象牙五十合分合之一術曰以方程求之衰分入之正負入之置共錢以人數約之得數列入人數各為行積次置諸色各物數為假子對本色有分者通之可約者約之為定率以第一行為右以第二行為副以第三行為次第四行為左每以下位互遍乘之每驗其積以少减多如同名相减異名相加正無人負之負無人正之如同名相加異名相减正無人正之負無人負之得一假為法以餘積為實除之各得諸價以諸價列右行以各物數列左行以兩行對乘各得本率以諸色求等約之得列衰併諸衰為總法以列衰遍乘各物諸數各為實諸實並如總法而一各得其物除不盡者以斤兩通而除之或又分母命之草曰置估值四十二萬四千貫以四人約之得一十萬六千貫為各積以人數列四位次置甲金二百兩於右上以四袋乘鈔一十道得四十袋按此條以四袋為一鈔相乘為鹽數是二色止為一色不如即用鹽為正於右副為右行次置乙鈔八十八道以三袋乘之得鹽二百六十四袋按此條以三袋為一鈔及銀八百兩為副行次置丙銀一千六百七十兩度牒一十五道為次行次置丁度牒五十二道金五十八兩八銖為左行驗得首圖左行上假金帶八銖是三分兩之一乃以分母遍乘左行諸數只以分子一內入左上金內其左積得三十一萬八千貫左金得一百七十五兩左度牒得一百五十六道為次圖驗次圖四行皆可求等右行求得四十約之副行求得八約之次行求得五約之左行求得一約之各得數為定率圖定率圖右積得二千六百五十貫金五兩鹽一袋副積得一萬三千二百五十貫鹽三十三袋銀一百兩次積得二萬一千二百貫銀三百三十四兩度牒三道左積得三十一萬八千貫金一百七十五兩度牒一百五十六道乃以定圖次行度牒三因左行左積得九十五萬四千貫金五百二十五兩度牒四百六十八道次以定圖左下度牒一百五十六乘次行積得三百三十萬七千二百貫銀五萬二千一百四兩按此下落度牒四百六十八道八字定率圖維圖乃驗維圖左及次行之下度牒等當相減之以積為端當以左之少積減次之多積按術曰同名相減其次行之金空而左行之金五百二十五兩有為正次空為無按術曰正無人負之即以左行之金正加入次行金位為負名成音圖仍置定圖左行諸數乃驗音圖次行積得二百三十五萬三千二百貫正金五百二十五兩負銀五萬二千一百四兩為正餘三行皆正音圖駁圖今驗音次行之負金當以右行之正金補之而其數不等先以右金五約次金五百二十五得一百五以乘音圖右行畢其右積得二十七萬八千二百五十貫金二百五十五兩正鹽一百五袋正其副次左三行如音圖故乃成爻圖今視爻圖右行之金正與次行之金負適等即用右行直加次行按術以同名相加乃以右之金正減其次之金負為空按術以異名相減之其次鹽空為無人按術以正無人正之乃以爻圖右積二十七萬八千二百五十貫加次積二百三十五萬三千二百貫內得二百六十三萬一千四百五十貫其次金空次鹽一百五袋正次銀五萬二千一百四兩正仍置定圖右行數而成政圖政圖卜圖今視政圖從者乃擇其諸行本色可求等首金可鹽亦可蓋金多鹽少乃以政圖副次兩行鹽數三十三與一百五求等得三故以三約三十三得一十一以乘次行又以三約一百五得三十五以乘副行畢其副積得四十六萬三千七百五十貫鹽一千一百五十五袋銀三千五百兩次積二千八百九十四萬五千九百五十貫鹽一千一百五十五袋銀五十七萬三千一百四十四兩皆正列成卜圖宫圖及視上圖副行積少次行積多即以副行求減次行皆是同名相減之既畢仍置定圖副行數其次行乃得積二千八百四十八萬二千二百貫銀得五十六萬九千六百四十四兩列為宫圖驗宫圖次行下只有銀五十六萬九千六百四十四兩獨一數以為法以次積二千八百四十八萬二千二百貫為實實如法而一得五十貫為銀一兩價而成千圖千圖乃以千圖副行銀一百兩乘兩價五十貫得五千貫以減千圖副行之積一萬三千二百五十貫訖副積餘八千二百五十貫其下鹽得三十三袋銀空而成曜圖曜圖支圖乃以曜圖副行之積八千二百五十貫為鹽實以其下鹽三十三袋為法除之得二百五十貫為鹽一袋價而成支圖乃以支圖右行鹽一袋遍乘副行畢其副積只得二百五十貫次以副行直減右行畢右積餘二千四百貫金五兩鹽空而成閏圖乃以閏圖右積二千四百貫為實金五兩為法除之得四百八十貫為金一兩價成定圖次以左金一百七十五兩遍乘右行直減左行訖左積得二十三萬四千貫度牒一百五十六道左金空而成定圖閏圖定圖今驗定圖左積二十三萬四十貫為實以左下度牒一百五十六道為法除之得一千五百貫為度牒一道價而成終圖既得金銀每兩鈔鹽每袋度牒每各色之價次列甲乙丙丁四人乘之終圖後以首圖右金二百兩併左金五十八兩八銖得二百五十八兩以八銖為三分兩之一通分內子得七百七十五於左甲其右價四百八十貫乃以左甲母三約之為一百六十貫於左甲次以右鹽四千袋併副鹽二百六十四袋得三百四袋於左乙以鹽價二百五十貫於右乙次以副銀八百兩併銀一千六百七十兩得二千四百七十兩於左丙以銀價五十貫於右丙又以次行度牒一十五道併左度牒五十二道得六十七道於左丁以度牒價一千五百貫於右丁兩行對乘之以右甲一百六十乘左甲七百七十五兩得一十二萬四千貫為甲原本以右乙二百五十貫乘左乙三百四袋得七萬六千貫為乙原本以右丙五十貫乘左丙二千四百七十兩得一十二萬三千五百貫為丙原本以右丁一千五百貫乘左丁六十七道得一十萬五百貫為丁原本列四人各得原本求等得五百貫皆以五百貫為法除之甲行二百四十八乙得一百五十二丙得二百四十七丁得二百一各為列衰於右行併右行列衰得八百四十八為總法次置博到沉香五千八十八兩遍乘列衰各為沉香實次置胡椒一萬四百三十包亦遍乘列衰為椒實次置象牙四百二十四條以大小各半之得二百一十二合亦遍乘列衰為牙實甲得一百二十六萬一千八百二十四乙得七十七萬三千三百七十六丙得一百二十五萬六千七百二十六丁得一百二萬三千六百八十八各為沉香實以總法八百四十八除之甲得沉香一千四百八十八兩乙得沉香九百一十二兩丙得沉香一千四百八十二兩丁得沉香一千二百六兩甲得二百五十八萬六千六百四十乙得一百五十八萬五千三百六十丙得二百五十七萬六千二百一十丁得二百九萬六千四百三十各為椒實以總法八百四十八除之甲得三千五十包不盡二百四十包以包率四十斤乘之得九千六百斤又以法除之得一十一斤不盡二百七十二斤以十六兩通之得四千三百五十二兩又以法除之得五兩不盡一百一十二求等得一十六約之得五十三分兩之七約甲得椒三千五十包一十一斤五兩五十三分兩之七乙得一千八百六十九包不盡四百四十八包以四十斤乘之得一萬七千九百二十又以法除之得二十一斤不盡一百一十二斤以十六兩通之得一千七百九十二兩又以法除得二兩不盡九十六兩求等得十六約之得五十三分兩之六為乙合得椒一千八百六十九包二十一斤二兩五十三分兩之六丙得三千三十七包不盡八百三十四以四十斤通之得三萬三千三百六十斤又以法除之得三十九斤不盡二百八十八以十六兩通之得四千六百八兩又以法除之得五兩不盡三百六十八兩求等得十六約之得五十三分兩之二十三為丙合得椒三千三十七包三十九斤五兩五十三分兩之二十三丁得二千四百七十二包不盡一百七十四以四十斤通之得六千九百六十斤又以法除之得八斤不盡一百七十六以十六兩通之得二千八百一十六又以法除之得三兩不盡二百七十二求等得十六約之得五十三分兩之一十七為丁合得椒二千四百七十二包八斤三兩五十三分兩之一十七甲得五萬二千五百七十六合乙得三萬二千二百二十四合丙得五萬二千三百六十四合丁得四萬二千六百一十二合各為牙實皆以總法八百四十八除之甲合得牙六十二合乙合得牙三十八合丙合得牙六十一合不盡六百三十六求等得二百一十二約之得四分合之三丁合得牙五十合不盡二百十二求等得二百一十二約之得四分合之一按此條於方程正負之用通分乘除之變多所發明步算雖繁實有條而不紊也推求物價問推貨務三次支物凖錢各一百四十七萬貫文先撥沉香三千五百裹玳瑁二千二百斤乳香三百七十五套次撥沉香二千九百七十裹玳瑁二千一百三十斤乳香三千五十六套四分套之一後撥沉香三千二百裹玳瑁一千五百斤乳香三千七百五十套欲求沉乳玳瑁裹斤套各價幾何答曰沉香每裹三百貫文乳香每套六十四貫文玳瑁每斤一百八十貫文術曰以方程求之正負入之列積及物數於下布行數各對本色有分者通之可約者約之為定率積列數每以下項互遍乘之每視其積以少减多其下物數各隨積正負之類如同名相减異名相加正無人負之負無人正之其如同名相加異名相减正無人正之負無人負之使其下項物數得一數者為法其積為實實如法而一所得不計遍損或益諸積各得法實除之餘倣此草曰置凖錢一百四十七萬貫為三次撥錢為三行積數次置先撥沉香三千五百裏玳瑁二千二百斤乳香三百七十五斤為右行物數又列次撥沉香二千九百七十裹玳瑁二千一百三十斤乳香三千五十六套四分套之一為中行物次列沉香三千二百裹玳瑁一千五百斤乳香三千七百五十套為左行之物各以本色相對列之率圖定率圖其中行乳香有四分套之一便以母四通中行諸數只內子一入乳香假內積得五百八十八萬貫沉香得一萬一千八百八十裹玳瑁得八千五百二十斤乳香得一萬二千二百二十五套以右行求等得二十五俱約之積得五萬八千八百貫沉香得一百四十裹玳瑁得八十八斤乳香得一十五套以中行求等得一十五約之積得三十九萬二千貫沉香得七百九十二裹玳瑁得五百六十八斤乳香得八百一十五套以左行求等得五約之積得二萬九千四百貫沉香得六十四裹玳瑁得三十斤乳香得七十五套列為定率圖三行副置求之今先欲去定圖下位乳香套數一十五與左下七十五互乘左右兩行右積得四百四十一萬貫沉香一萬五百裹玳瑁得六千六百斤乳香得一千一百二十五套左積得四十四萬一千貫沉香得九百六十一裹玳瑁得四百五十斤乳香得一千一百二十五套驗左積少右積多當以左行直減右行畢仍置定圖左行數維圖按以上三圖名舊本未載今依前題補之以便檢閲右積得三百九十六萬九千貫沉香得九千五百四十裹玳瑁得六千一百五十斤次驗中左兩行各有下位假又以左下七十五互乘中行乃以中行下八百一十五互乘左行畢中積得二千九百四十萬貫沉香得五萬九千四百裹玳瑁得四萬二千六百斤乳香得六萬一千一百二十五套左積得二千三百九十六萬一千貫沉香得五萬二千一百六十斤玳瑁得二萬四千四百五十斤乳香得六萬一千一百二十五套驗左積少中積多以左行同名直減中行畢仍置定圖左行數卜圖宫圖中積得五百四十三萬九千貫沉香得七千二百四十裹玳瑁得一萬八千一百五十斤今驗右中兩行數多又求約之其右行求得三十約之右積得一十三萬二千三百貫沉香得三百一十八裹玳瑁得二百五斤中行求得一十約之中積得五十四萬三千九百貫沉香得七百二十四裹玳瑁得一千八百一一十五斤今又欲去中左行之玳瑁乃以中行玳瑁一千八百一十五互乘右行右積得二億四千一十二萬四千五百貫沉香得五十七萬七千一百七十裹玳瑁得三十七萬二千七十五套以卜右玳瑁二百五斤互乘中行中積一億一千一百四十九萬九千五百貫沉香得一十四萬八千四百二十裹玳瑁得三十七萬二千七十五斤今驗宫右積多中積少乃以中行直減右行畢仍置卜圖中行數干圖支圖今驗干圖右行假數只有沉香四十二萬八千七百五十裹以為法以右上積一億二千八百六十二萬五千貫為實實如法而一得三百貫為沉香一裹價便以中行沉香七百二十四乘三百貫得二十一萬七千二百貫減中行五十四萬三千九百貫餘三十二萬六千七百貫為中積便減去中行沉香假之數次以左上沉香六十四乘三百貫得一萬九千二百貫減左積二萬九千四百貫餘一萬二百貫為左積便減左上沉香裹數去之今驗支圖中行其下只有玳瑁一千八百一十五斤以為法中積三十二萬六千七百貫為實實如法而一得一百八十貫為玳瑁價閏圖按此圖舊本亦未載名今補今驗閏圖左行有玳瑁三十斤以乘價一百八十貫得五千四百貫减左積一萬二百貫餘四千八百貫為左積其下只有乳香七十五套以為法以積四千八百貫為實實如法而一得六十四貫為乳香套價此題並係俱正補草數學九章卷九下
